body:
  text: 寓古婁青螺菴沙門晝中智證錄此懺單法立題通別兼舉也慈能與樂悲能苦自他兼利法應爾故國師仗三昧水滌除宿障梵語三昧此云正定亦云正受正定揀非邪定正受明不受諸受水天因此水而成佛果月光因此水而證圓通迦諾迦因此而指神通三昧水既償往日之殷勤能濯今時之極楚悟師于徧覓良毉之後懸憶曩時之預訂獲解陳報于奇泉從果至因靡非因水故揭而標之經云化使立德慈心法門一切不害悲心法門古云萬億神通百千三昧若離慈心總歸魔業須知慈悲是智慧之玅用智慧與慈悲為根本若無智慧焉有慈悲有慈悲者決是智慧人也以故世人之愚癡者見人得樂尚障之安望其能與樂乎見人遭苦惟恐不毒安望其能之又慈悲水揀異果報水通至二禪二揀非惡業水此水徧通三界三煩惱水通大小乘此慈悲水窮盡世出世間天地不能覆載日月莫克較明三灾不能磨折此其所以異也由慈水滋人之善善極得涅槃樂生後發願成德文悲水洗人無明垢故能離生死苦也生後懺悔諸文懺具云懺摩此云請忍謂請前人忍受我悔罪也懺云法者雖請忍之辭實言從佛口字采經文所謂如來廣慈悲之念啟懺悔之門也卷者成裹義對舒而言西域裝經非梵本非坊冊止用軸式故名為卷初覽是法卷者必舒覽已復卷舒時有限卷時偏多故直從卷以始終皆卷故又軸卷是相會相歸性故云卷卷收也收取諸法皆入自性慈悲也能所通別可知略釋懺題竟準經仍分三分初序分一切諸佛愍念眾生為說水懺道場總法雙標能度所度及能說所說水懺道場可知總望別言如梁懺分四十章章名各異是別今標總數不開細相曰總佛言眾生垢重何人無罪何者無𠎝凡夫愚行無明闇覆親近惡友煩惱亂心立性無知恣心自恃言者振圓音而警眾揚玅義以符機益物導迷也又悟自心者名佛迷己性者名眾生由悟迷分生佛耳垢塵穢也喻眾生心中煩惱由身心不淨三毒流穢染汙玅明如塵汙衣似坌覆鏡故喻如垢從垢字開出惑業苦三𠎝即是業罪招苦報惑即無明凡夫有三按大威德呪經云於生死迷惑流轉住不正道故名凡夫有二種一嬰兒凡夫無智慧故二愚暗凡夫頑鈍不可教故或云毛道凡夫心行不定如輕毛隨風轉故愚即無明因心不明不自知過行即近惡自恃等大經三十七云無明是一切諸漏根本眾生無明因緣於陰界入憶想作想名為眾生是名想倒心倒見倒大慧云眾生日用現行無明順無明則生歡喜逆無明則生煩惱佛菩薩則不然借無明以為佛事為眾生以無明為窟宅然非別物永嘉云無明實性即佛性故惡友惡知識也大經二十二云惡象等唯能壞身惡知識身心俱壞惡象等唯壞一身惡友壞無量善身善心惡象等唯能壞不淨臭身惡友能壞淨身淨心惡象等能壞肉身惡友壞法身為惡象等殺不至三途惡友殺必墮三途惡象等但為身怨惡友為善法怨是故菩薩常當遠離惡友親近有二義一互相兢造二宿無信種善根煩惱等者貪瞋癡慢疑邪見六為根本并二十隨煩惱等因煩多故能惱亂淨心古云一絲毫放過即罪同丘山況萬端起滅但在旦夕問無明煩惱定是何物答全體佛性大經云未得無上菩提時一切善惡無記盡名佛性由無明故立性無知近惡友故恣心自恃豪強技藝種族等作頑鈍無耻之人也不信十方諸佛不信尊法聖僧問三寶有濟之恩人反不信何故答不信是疑字由無明覆覺故疑佛煩惱動亂故疑法炙乎惡友故疑僧故華嚴云信為道源功德母也心地觀六云如人無手雖至寶山終無所得無信手者雖遇三寶無所得故又不信三寶即是不信心大經云若人信心無有智慧是人則能增長無明若有智慧無有信心是人則能增長邪見以不信三寶是出世福田故又信有二種一信正二信邪言有因果有三寶是信正反是名信邪雖信三寶不信三寶同一性相雖信因果不信得者亦名信不具足信復有二一從聞生二從思生是人信心從聞生不從思生亦名信不具足又信有二種一信有道二信得者是人信心唯信有道都不信有得道之人亦名信不具足詳如經說法言尊者般若云一切諸佛及諸佛無上法皆從此經出則法為諸佛之師及母也孰尊于此哉不孝父母六親眷屬孝是孝順愛敬從命義梵網經云孝順父母師僧三寶孝順至道之法孝名為戒是諸佛之本源行菩薩道之根本是大眾諸佛子之根本祖師云稽首三界主大孝釋迦尊累劫報親恩積因成正覺曾子曰敢問聖人之悳無以加於孝乎子曰天地之性生也人為貴人之行莫大於孝故孝經云夫孝德之本也道德以之為體教法由是而生梵網云一切男子是我父一切女人是我母我生生無不從之受生故六道眾生皆是我父母而殺而食者即殺我父母葢父母者有生我育我之恩迴乾就濕乳哺養育嚥苦吐甘慈訓長成憐念之心未甞暫捨故須孝順現存者竭力供養發以道心過去者戒善潛資咸令離苦雜藏寶經云雪山中鸚鵡採花果供盲父母父母者今淨梵摩耶夫人是鸚鵡我身是也六親有三一父母兄弟姊妹為根本二父六親伯叔兄弟子孫三母六親舅姨兄弟兒孫眷屬者親眷朋屬各有眷愛之情統屬之誼故盛年放逸以自憍𭝟根恣心自恃來壯盛之年恃血氣之勇故多放逸大經三四云放逸懈怠不修進故說五種退一樂多事二樂說世事三樂睡眠四樂近在家五樂多遊行憍恣也𭝟慢也由恃血氣之勇故旁若無人眼空四海當思形不久住福智羸劣不貪安樂不造眾惡可耳下承憍慢字開列眾罪貪一切財寶貪一切歌樂貪一切女色一普及義切盡際義總該統攝之謂貪財寶則于世味厚而求法之心薄貪歌樂則于淫聲重而法音之心輕貪女色則于穢軀近而清淨法身遠如次與般若解脫法身三德反矣又貪世財與三寶遠失無量利益貪歌詠及竹絲等音樂則微玅法音沉鍾鼓之聲絕昔者乾闥婆王奏樂江河湧沸迦葉起舞佛言眾生顛倒見法流動迦葉頭陀第一尚爾況下凡乎又肇公赴秦宮請媵人私逼之肇不可媵人讚為沙門謔己王召將殺之肇曰姑緩七日當就死王許肇著論訖遂赴刃有將頭臨白刃一似斬春風之句為法求延非邀譽于末劫為度生計耳肇公不近女色尚爾況真以身根研磨不休乎願貪者味之心生貪戀意起煩惱親近非聖媟狎惡友不知懺悔首二句明內因次二句明外緣據相宗集起名心屬賴耶識籌量名意即末那了別為識即前六今心生意起大抵重前六動身發語乃至起惑造業皆前六識為最故戀謂躭著聖正也媟狎也狎親近也字法之變耳知懺悔便可轉煩惱而成智慧矣心地觀云懺悔能燒煩惱薪懺悔能往生天路懺悔能得四禪樂懺悔與寶摩尼珠懺悔能延金剛壽懺悔能入常樂宮懺悔能出三界獄懺悔能開菩提華懺悔見佛大圓鏡懺悔能至於寶所大經二七云黑銕入火則赤出冷還黑而此黑色非內非外因緣故有佛性亦爾眾生煩惱火滅則得聞見或殺害一切眾生或飲酒昏迷無智慧心今日披誠一一懺悔坊本眾生下增偷盜婬妄句藏本無者因前貪財色語攝故晉裴楷呼酒為狂藥四分律云飲酒犯三十六失不孝父母輕慢長友不敬三寶不信經法誹謗沙門訐露人罪恒說妄語誣人惡事傳言兩舌惡口傷人生病之根鬪諍之本惡名流布人所憎嫌排斥聖賢怨黷天地廢忘事業破散家財恒無慚愧不知羞耻無故捶打奴僕橫殺眾生奸婬佗妻偷人財物疎遠善人狎近惡友常懷恚怒日夜憂愁牽東引西持南著北倒溝臥路墮車墜馬逢河落水持燈失火暑月爇亡寒天凍死等是也由飲酒故昏迷因昏迷故無智慧智是心之照用慧是心之性體轉識成智則惑斷證真縱識無智則罪過彌天大經三十一云有智慧時無煩惱有煩惱時無智慧譬如明時無暗暗時無明此煩惱根先以定動後以智如拔堅木先以手動後則易出又云阿難具足八能能持十二部經一信根堅固二其心質直三身無病苦四常勤精進五具足念心六心無憍慢七成就定意八具足從聞生智由無智為本妄犯五戒一殺害眾生二貪財三貪色四內生煩惱外狎惡友豈無妄語五飲酒文義昭然報恩經問五戒幾實罪幾遮罪答四是實飲酒是遮飲與前四同類結為五戒以飲酒是放逸之本如迦葉佛時有優婆塞以酒故邪婬他婦盜殺他雞飲酒亂心一時能犯四戒披誠披露竭誠之心也已上猶經之證信此下猶經之發起序也過去諸罪現作眾惡今日志誠悉皆懺悔未作之罪不敢更作由一一懺謝故過現罪惡悉懺由懺悔力諸罪皆滅淨智自顯大經十九云猶如濁水置之明珠以珠威力水即澄清如烟雲除月則清朗作惡能悔亦復如是前過則湔刷之後過則無重造改往修來故云未作等大經喻如焦炭不還為木壞瓶更無瓶用此文出大金光明經未作二句一懺要旨若恃懺逐日造罪是懺反開罪于人非度人法如水灌漏巵終無乎復故弟子某甲等今日志心歸依十方盡虗空界一切諸佛佛是三界導師四生慈父既已歸命則視佛為師為父故稱弟子某甲稱己名也餘倣此等有二義一禮時運想能禮所禮性皆空寂故等二偕眾共禮禮在各身稱在異口想在眾念悉皆齊等外則身禮佛相威儀可觀口稱佛名和音可聽內則心想佛義聖相宛然志心者精專定向之心也歸歸同身心投佛遵法而行也十方者東西等四正方東南西南等四維方上方下方共成十十方虗空必有河沙世界界中必有度生之佛故問上必求十方聖賢下必普度眾生者何答古云如千鈞之弩不獨為鼷鼠發機三界之尊豈偏令一人離苦問何故虗空二字恒入佛法答虗空是佛法正宗出生死確論如七祖婆須密付八祖偈云心同虗空界示等虗空法證得虗空時無是無非法既無是法又無非法謂之無上佛果菩提亦名真如佛性諸佛指現在諸佛即下所列者諸大菩薩具云菩提薩埵大論翻云佛道成眾生自行修諸佛道化他成就眾生亦云覺有情以自覺覺他彰名自覺異凡夫之不覺覺他異二乘之獨覺對迷屬悟望果屬因以智上求運悲下化故菩薩雖多今止列六亦得名眾諸大二字直冠八部上俱菩薩示現故有大乘懺悔法辟支羅漢四果四向辟支此云獨覺出無佛世觀緣悟道如秋觀黃葉落春睹百華開等羅漢具云阿羅漢有三義所謂無生應供殺賊即第四果斷三界八十八使將盡名初果向盡證初果果進斷欲界五品思證二果向六品思盡證二果果又進斷第八品殘思證三果向九品思盡證三果果更進斷後七十一品思證四果向斷盡思惑證四果果若論斷惑證真先向後果位次尊卑則先果後向達磨論云向者趨向果者證果此名小乘故有小乘懺悔法華嚴云上品十善修治清淨心廣無量故具大悲愍不捨眾生希求諸佛大智修一切諸度廣大行願故成菩薩辟支從上品十善清淨不從他教大悲方便未具惟自覺悟了甚深因緣法成獨覺乘羅漢四果從上品十善以智慧修習心狹劣故怖三界故闕大悲故從他聞聲解了名聲聞乘有說上上品十善乃至修四無量心者即得成佛無量法門不出十善故梵王帝釋天龍八部梵者離欲義梵王色界天主大梵天王是也帝釋欲界天主釋提桓因是也天龍八部中首二禪考云一天二龍三夜叉四乾闥婆即天樂人五阿修羅不飲酒常與帝釋鬪六迦樓羅即金翅鳥神七緊那羅似人頭有角八摩睺羅伽即大蟒神人首蛇身而腹行者也舍利問經云八部鬼神何因既生惡道又常聞正法佛言以二種業一由惡業生惡道二以善業受快樂又問善惡之異可得聞乎佛言可一天神者先以車輦舍宅飲食供養三寶父母賢聖猶懷慳嫉故二虗空龍神修德行施不依正念急性好嗔故三夜叉神好大布施或先損害後加饒益隨功勝負在天上空中地下四乾闥婆者好施有嗔獻伎樂故五阿修羅神志強喜捨不隨善友所作淨福好逐幻偽作諸邪福故六迦樓羅神先修大捨高心凌物故七緊那羅神昔好勸人發菩提心未正其志逐諸邪行故八摩睺羅伽神布施護法性好嗔恚故如是皆由依附邪師以邪亂正俱謂是道以自建立頌云由作二因善不善乃為八部人非人一切聖眾願垂證鑒承上作結願以肯心求聖垂慈證明懺悔之志心也鑒猶視也下列聖賢二位禮佛偈能禮所禮性空寂感應道交難思議我此道場如帝珠毗盧遮那影現中我身影現毗盧前頭面接足歸命禮凡遇佛菩薩只就名號更之如遇釋迦則云釋迦如來影現中我身影現釋迦前等餘例知釋曰首句空假二觀次句中觀第三句喻明後三句總顯中道能禮言能志心以身命歸投而頂禮也所禮即相好光明莊嚴之聖賢也聖凡互對所能歷然感應昭著內成假觀外為俗諦此二性本空寂不勞析體內為空觀外成真諦也帝珠借帝釋天殿上千如意珠所結之綱珠此珠體圓而光盛彼此互燭眾珠之光射一珠中譬眾等志心感于佛一珠之光映眾珠譬佛心應羣品圓光互照感應相生能所不二聖凡一體豈非中道諦觀感應道交不思議也明矣南無毗盧遮那佛毗盧遮那此云徧一切處謂毗盧性海煩惱體淨眾德悉備身土相稱徧一切處乃法身佛即我人之本覺玅性也又云徧寂謂周徧寂靜即法身又翻光明徧照報身也即慈悲之體南無本師釋迦牟尼佛釋現前七佛中釋尊是娑婆教主現在導師成佛之本故云本師化身佛也照前佛是真應一對南無阿彌陀佛阿彌陀此云無量壽亦云無量光體用皆無量故為樂教主今人求生淨土正往彼國也與本師佛成苦樂東西對南無彌勒佛彌勒此云慈氏釋見前彌勒下生時萬億閻浮皆以黃金為地地平如掌秔稻自生衣食自至無量快樂賢愚經云彌勒三會度人無數悉我遺法種福眾生然後乃化同緣之徒偈云彌勒真彌勒分身百千億時時示時人時人自不識南無龍種上尊王佛那伽此云龍勇徤之謂美其性也種是種族義姓氏也上尊謂種中最上最尊者王自在義五住究盡二死永亡往來無閡故聖號收前諸號謂法報化身具足現未自在故南無龍自在王佛隨德彰名餘例上佛可知南無寶勝佛摩尼寶珠超勝眾寶之上如來至寶越乎眾聖之尊一稱佛名尚得滅塵勞及業火益況頂禮乎南無覺華定自在王佛覺華是定名約理說覺是果智表本覺華是玅因表始覺始本不二理智一如不可思議故云覺華定以彼佛常居此定故號之自在王義準前可知南無袈裟幢佛大淨法門經云袈裟晉名去穢大集經云離染以悳彰名據袈裟幢世界是依世界立名也幢者表正佛能摧邪顯正建大法幢等又幢者喻法無上故稱袈裟幢南無師子吼佛師子出窟百獸潛蹤佛師子出羣魔竄伏又大師子一吼小師子勇徤佛師子吼諸菩薩等悉勇猛精進大經云一切禽獸聞師子吼水性之屬潛沒深淵陸行之類藏伏窟穴飛者墮落諸大香象怖走失糞師子子始滿三歲則能哮吼如師子王如來正覺智慧爪牙摧破諸魔軍故又師子吼者名決定說一切眾生悉有佛性如來常住無有變易詳如經說應知佛祖無法與人只與人指路頭耳古德云有所得是野干鳴無所得是師子吼又達多放大醉象欲令踐佛象既見佛即時醒悟佛即伸手摩頂復為說法令得無上菩提畜生見佛猶壞畜生業果況人乎問禮佛可爾何必更禮菩薩答譬如好人偏多交善友昔波羅奈國有屠兒名廣額每日殺無量羊見舍利弗即受八戒經一日夜命終得為北方天王毗沙門子況禮諸大菩薩乎大經云諸佛菩薩是得善法根本處譬如雪山是種種微玅上藥根本處亦如雪山有上香藥名曰娑訶人若見之得壽無量無有病苦四毒難中若觸之者增長壽命念念皆得宿命智佛菩薩亦然若有見者即斷一切煩惱四魔不能干觸者命不少夭念者得無上菩提佛菩薩是真大善知識故南無文殊師利菩薩文殊師利此云玅德在佛為普光大智即玅觀察智大經云了了見佛性猶如玅德等悔過修來積功累德唯智者能故首標之或號曼殊室利此云玅吉祥又號滿殊尸利此云玅首清凉云文殊有三表法一表能信之心二表能起之解三表能證大智且文殊居首有三義一是古佛二諸佛之師三行以智為先無智則驪黃莫辨古語云寶石不吸腐草磁石不引曲鍼皆各得其用也無著問善財云我欲見文殊何者即是財曰汝發一念心清淨即是著云我發一念心清淨為甚麼不見財曰是真見文殊普超三昧經佛言我今得佛皆文殊恩本是我師過去無央數佛皆其弟子當來者亦恩力所致文殊乃佛道中父母也爾時眾念文殊既在佛前何不成佛耶佛言深入善權廣化眾生故未取證當知文殊三佛分三世現過去號龍種上尊王見在北方歡喜世界號歡喜藏摩尼寶積聞名者滅四重罪未來號普現寶積經文殊云願我成佛時以恒沙佛世界為一佛剎名為普見諸菩薩言文殊所得佛剎與彌陀佛剎等不佛言譬如有人析一毛為百分以一分于大海中取一滴水喻彌陀佛剎莊嚴彼大海水喻普見佛剎莊嚴復過于是古云道無方所明之在人法離見聞斷之在智葢業報與道相反亦應云業報無方所脫之在人法離縛解燭之在智南無普賢菩薩梵語邲輸跋陀或三曼䟦陀此云普賢行彌法界曰普位鄰極聖曰賢菩薩中真淨行願第一不外當人塵勞業用觀經大論並翻徧吉望文殊亦有三義一表所信如來藏二表所起玅行三表出纏法界南無大勢至菩薩此菩薩具大德用能除大地眾生黑暗者梵語摩訶那鉢此云大勢至思益經云我投足之處震動三千大千世界及魔宮殿悲華經云願我世界如觀世音等無有異寶藏佛言由汝願取大千世界故今字汝為大勢至觀經云以智慧光普照一切令離三途得無上力故南無地藏菩薩地譬誓願之堅厚藏譬智德之包含本經云地獄不空誓不成佛為幽冥教主又云若未來世聞是菩薩名字或讚歎或瞻禮或稱名或供養乃至彩𦘕刻鏤塑漆形像是人當得百返生於三十三天昔一禪師見佛菩薩像嘆曰只一泥塊裝佛成佛塑菩薩成菩薩欲威則威欲慈則慈種種變化應思人惟萬物之靈反不如一泥塊乎任諸佛千言萬語諄諄教誨奈之何非聾即啞則人不如一土塊多矣南無大莊嚴菩薩稱自性廣大之玅體發應物無邊之玅用莊嚴性海圓成法身全即自性廣大之體故云大莊嚴望前以無緣大慈炤後以同體大悲廣化眾生法華經云定慧力莊嚴以此度眾生即此義大經云具足智慧及福德二種莊嚴詳如經說南無觀自在菩薩具佛五眼見五蘊空觀也度一切苦厄自在也般若真空無五蘊故菩薩依般若斷顛倒夢想究竟涅槃永嘉云不見一法即如來方得名為觀自在詳如心經貫古說菩薩受記經德藏菩薩問佛觀音勢至于何土成佛答彌陀正法滅後觀音成佛號普光功德山王國土號眾寶善集莊嚴般涅槃後得大勢即于其國成等正覺號善住功德寶王永不入滅更無所補吁今者時當叔世佛法世法均之衰殄法河將涸法燈將滅法山已頹法船欲沉法橋已壞法殿已崩法幢已倒法樹欲折善友欲去大怖已至饑荒疫病徧地流行此而不修不禮三寶更待何時文出大經第九餘義恐繁俱置第三卷不憚煩應覽之禮諸佛已次復懺悔首句結前次句生後大經云菩薩具質直心不讚人善不訟彼缺常不犯過設有過失即時懺悔於師同學終不覆藏慚愧自責不敢更作於輕罪中生極重想餘倣此夫欲禮懺必須先敬三寶夫者發語辭必須猶決定不可移易之謂自己無力滅罪須仗三寶力故以先敬示人佛法僧是三寶功成玅智道登圓覺為佛玄理幽微正教誠精為法禁戒守真威儀出俗為僧佛世有相從三寶別相三寶一體三寶佛滅後加住持三寶四中惟一體三寶是總相餘三是別相相從可知別相三者法報化應為佛教理智斷為法三乘階次為僧一體三寶即人性具者是自性常覺為佛自性寂滅為法自性寂炤同體為僧住持三者泥塑木雕圖形裝彩為佛貝多黃卷方冊梵筴為法圓頂方袍精嚴戒律為僧復有大小之異丈六身佛四諦十二因緣法四果四向僧是名小大三若三身十身佛二空理等法三賢十聖僧是為乘乘三三皆稱寶者最尊最貴絕倫絕等非世間異寶可及因人惟知寶為貴故以寶類之有六種相似一世間難得相似無善根眾生曠劫難遇故二無垢相似離一切有漏法故三威德相似具足六通不可思議威德自在故四莊嚴相似離莊嚴出世間故五勝玅相似出世間故六不可改易相似是無漏法世間八風不能動故由六相似故以佛法僧三為寶所以然者三寶即是一切眾生良友福田徵釋三寶能使人悟入佛知佛見離苦得樂能作眾生廣大福田如世善友令人進於善道故良善也佛菩薩作眾生不請之友直欲使之得涅槃樂故云良友福田具三義一知三寶有度人之力起人信敬是敬田二能盡眾生之苦是悲田三能報父母恩是恩田能令行人種一切福故總曰福田田能生五糓百糓三寶能令人生五分法身及百福相好故若能歸向者則滅無量罪長無量福能令行者離生死苦得解脫樂此顯福田中饒益事也歸是歸投向是趨向歸則不逆向則不背若人能歸向仗三寶力其罪根如舜畊田先耘其草也罪滅則福自生如草去則苗自長也眾生有自性一體三寶故能歸向餘三寶三寶有大威猛力大福德力大智慧力大慈悲力故能使行人離苦得樂耳由滅無量罪則惑業苦三障乃至八萬四千塵勞門俱轉轉極則五住盡而二死離由長無量福則初自三德終至河沙性德眾福俱長長之極證得大解脫涅槃樂苗長由田之力樂得由三寶力解脫即大自在也生死智人觀之元非惡事但在盲人決須離之故先云生是死之生死是生之死兩路坦狀乎無彼復無此既無生死又無彼此明明百草頭明明祖師意如天普葢似地普擎一念相應一時清淨此是離生死苦的樣子是故弟子某甲等歸依十方盡虗空界一切諸佛既入道場須聞法要先發起圓常正信歸依一體三寶行大乘懺法立四弘誓願是故乃離苦得樂之故也義見前華嚴玄談云三寶最吉祥故我經初說大經佛告迦葉一切眾生怖畏生死故求三歸以三歸故則知佛性決定涅槃乃至佛名為覺又佛亦名世尊以世法言音不同世人自不能解佛悉知之故云世尊禮懺行人必以三歸為入道之因歸依者自歸其中依此利生也先歸佛不墮地獄凡遇三寶須各禮一拜今人見佛不禮如民見王上不敬不禮佛不惟不超獄且於獄有分在以忘本故例慢君可知觀佛三昧經云曠野鬼神每食小兒有長者子曾歸三寶被鬼執捉稱南無佛佛往救兒降伏鬼神授不殺戒歸依十方盡虗空界一切尊法二歸依法法者正也經律論乃至祖師語錄高僧文集無論入藏不入藏悉是正義超邪見故故歸依法不墮餓鬼又諦緣度法能令行人證三乘成正覺故佛坐樹下捉一枝葉問弟子曰此枝葉多樹上葉多答樹上葉多佛言我所知法如樹上葉我所說法如掌中葉應知佛所知法即眾生本有自性法所說法即世尊慈悲心中隨緣化導而說者歸依十方盡虗空界一切聖僧序分竟下猶經之正宗分也三歸依僧僧即和合眾也菩薩聲聞緣覺及西方東土歷代祖師當今弘法者皆是歸依僧脫旁生苦大經二十八云若值三寶當以衣服飲食臥具房舍醫藥燈明華香伎樂旛葢七寶供養弟子今日所以懺悔者正言無始以來在凡夫地莫問貴賤罪自無量自坊本作相無始者直從過去無量劫來所起罪業欲搜其端本無有始下明此身是罪業根本大經十九云貴者富之根富有二種一象馬種種畜生二金銀種種珍寶象馬雖多不敵一珠眾生亦爾一惡富二善富多作諸惡不如一善佛言修一善心破百種惡如少金剛能壞須彌亦如少火能燒一切如少毒藥能害眾生小善亦爾能破大惡賤者往因愚癡不自悔恤故作眾罪貴者諒必有知故作誤為亦復不免雪峰祖師云為報滿城朱紫道閻王不怕佩金魚罪自無量總標下文總開或因三業而生罪或從六根而起過或者不定之辭或身口意三共作或身等別作身等三為體從體起種種業用善業用必招福惡業用必致苦故應懺也身有殺盜婬口有妄言綺語兩舌惡罵意有貪嗔癡總言三業別名十惡反是即名十善善惡皆由身口意造故大慧祖師云身口意清淨是名佛出世身口意不淨是名佛滅度問如何是護此三業答不毀三寶是護身永淨四事是護口息心清淨是護意經云守口如瓶防意如城從猶因也眼耳鼻舌身意是造善惡業之根起猶生也凡夫不能生福但能生罪過故應懺耳此六即三業加眼耳鼻三六根不染六塵則為玅行故初果不入六塵發大心菩薩不住六塵行施或以內心自邪思惟或藉外境起於染著不藉外境但由往因惡種子生故云內心自問邪何云自心地觀云心如獨行無第二故豈不曰自邪思邪見也大經說因語中云一切惡行因雖無量若說邪見則已攝盡如無上菩提因雖無量若說信心則亦攝盡又云若人樂殺樂行邪見此人即地獄人若不樂殺乃至邪見是人即是天人藉賴也內心望上六根即是六識外境即是六塵染著貪染躭著也由內心邪思故內外交生罪業紛起楞伽經云以心生故種種法生以法生故種種心生如是乃至十惡增長八萬四千諸塵勞門如是疊上三六內外乃至超略之辭塵勞門開八萬四千者約見惑十使謂貪嗔癡慢疑身見邊見邪見見取戒取十使互具成一百歷十法界成一千復約身三口四七支各有一千成七千更約三世成二萬一千又約貪行多者二萬一千嗔行多者二萬一千癡行多者二萬一千等分行者二萬一千成八萬四千以八萬四千律儀對治之則成八萬四千法門懺法能令人出苦入樂故云門亦是顯法之門也然其罪相雖復無量大而為語不出有三一者煩惱二者是業三者是果報先總標次列然者轉上文之辭復音福猶說也謂八萬四千雖似乎多猶多限量如云惑有塵沙豈有量哉是放而言之也總而言之不出三種此則收總歸別且標定耳大猶總也一者下別列此三是一懺大旨生第五怨親章結文及後三障文一部水懺止懺三障貪嗔癡等是煩惱障身口六根等所作罪是業障六道四生等是報障由三障重累所以不能出離生死苦海大經如來呼三障為大病諸菩薩於無量劫修菩提時給施一切疾病醫藥常作是願永斷三障此三種法能障聖道及以人天勝玅好事是故經中目為三障明三障得名之故障礙也蔽也此三能礙一切聖道及人道天中勝玅好事涅槃云多思慮故名人雜心云意寂靜故名人俱舍云光潔自在神用名天聖道即諦緣度等人天好事即五戒十善等葢人天未出三界故有勝玅好事若辦出世業便是無事人大慧云三世諸佛是無事人歷代祖師是無事人古哲云但於事上通無事見色聞聲不用聾所以諸佛菩薩教作方便懺悔除滅此三障滅則六根十惡乃至八萬四千諸塵勞門皆悉清淨方是方法便是便宜下文興七種心是滅罪方便眾生垢滅則塵勞門自淨矣是故弟子某甲等今日運此增上勝心懺悔三障欲滅三障者當用何等心可令此障滅除先當興七種心以為方便然後此障乃可得滅承上文標定七種心也運即前啟運等義增上勝心者心生悔過是勝心仰承諸聖四心及滅罪生福之力故云增上懺悔者經云欲斷起惡勤懺法門欲願清淨念悔法門也欲滅等三句問先當下答興起也猶運也七種心總標因罪從心生懺須心懺心心懺悔罪業自滅此七種心即諸聖教人所作之方便阿毗達磨云有七種懺法意義相若心地觀云三界中以心為主能觀心者究竟解脫心法本元不染塵穢云何心法染貪嗔癡于三世法誰說為心過去心已滅未來心未至現在心不住諸法之內性不可得諸法之外相不可得諸法中間都不可得心法本無形相亦無住處一切如來尚不見心何況餘人得見心法一切法從妄想生故佛說三界惟心何等為七一者慚愧二者恐怖三者厭離四者發菩提心五者怨親平等六者念報佛恩七者觀罪性空徵列菩提居中者以此心最重擔荷前三後三故昔佛說一百二十種菩提心即說一百二十種譬喻中一喻云如人依附于王不畏餘人行人亦然依菩提心大勢力王不畏障葢惡道之難大經云佛住尼連禪河邊告阿難言我欲洗可取衣及澡豆佛既入水一切飛鳥水陸之類及五百梵志皆來河邊各相謂言云何得此金剛身乃至聞佛說佛性義即是我故即發無上菩提心尋時出家修菩提道一切飛鳥水陸之屬亦發菩提心第一慚愧者自惟我與釋迦如來同為凡夫而今世尊成道以來已經爾所塵沙劫數此羞己久淪生死慚者依自法力崇重賢善為性對治無慚止息惡行為業自即己身法謂教法言我如是身解如是法敢作諸惡耶愧者依世間力輕拒暴惡為性對治無愧止息惡行為業謂世人譏訶名世間力輕惡人而不親拒惡業而不作故曰輕拒等我生死因也大經四云譬如二手相拍聲出其中我亦如是眾生業愛三因緣故名之為我自惟者自心思惟久遠劫前佛與我同是凡夫因佛獨于空王佛所發菩提心故能成佛也最初逢事古釋迦等七萬五千佛滿第一阿僧祇劫乃至逢事然燈佛等七萬七千佛滿第二阿僧祇劫乃至逢事勝觀佛等滿第三阿僧祗劫嗣後又經九十一劫修玅相業直至逢事迦葉佛方得圓滿其間上生為天帝下生為轉輪聖王各三十六返又或間為仙人為比丘為小王為婆羅門不可稱數度生無量然據法華壽量品猶為方便其實世尊成佛已來不可思議劫數故云爾所塵沙而我等相與躭染六塵輪轉生死永無出期此實天下可慚可愧可羞可耻而字寓羞耻不乎意相與惡友糾纏也躭染躭洄染著也染塵故八萬四千塵勞門開也生而復死死已又生如輪旋轉故云輪轉生死者三緣和合剎那有生乃至本有未盡已來皆名為生此無而忽有緣會而生也若色心兩不相持剎那有死從本有一盡之時即名為死是有而忽無緣散為死也生死無出期日者皆由躭戀六塵較之釋尊久佛實足羞殺天下人矣須知六塵是中諦境能生種智壞在躭著我即六根躭即六識并塵成十八界本如來藏妙真如性故大經云如被火人為慚愧故以衣覆身以是善心生忉利天復為梵王轉輪聖王不至惡趣常受安樂況以如來為端而興起道心乎再四言可急切之至也如是思惟必須竭誠懺悔改往修來勇猛精進一生取辦菩提與佛無異則羞耻可休懺悔力滿下之六章大意倣是可知第二恐怖者既是凡夫身口意業常與罪相應二怖畏三途恐是內憂怖是外懼既是句躡前同為凡夫語身口意業即能躭六塵者前章我字是總舉此身口意是別開相應猶相當也即永無出期意六根攬六塵若單取者單受報交相著者受交報無纖毫之謬義出楞嚴以是因緣命終之後應墮地獄畜生餓鬼受無量苦如此實為可驚可恐可怖可懼因貪癡為因十惡業為緣盡形壽已即受果報可恐怖處即三途也既有怖畏應覓歸依處二一自性涅槃二無上涅槃地獄是火途從熱得名畜生是血途互相吞噉得名餓鬼是刀途刀杖驅逼得名古語云三途一報五千劫出得頭來是幾時此三途聞之實足駭聽故曰可驚思之實堪寒心故曰可恐想之誠應發畏故曰可怖見之決當消魂故曰可懼大經云如人唯有一子行住坐臥心常念之有過善言誘喻不加其惡菩薩亦然見諸眾生若墮三途或人天中心不放捨亦不生嗔第三厭離者相與常觀生死之中唯有無常苦空無我不淨虗假如水上泡速起速滅往來流轉猶如車輪此厭離穢身也大經云厭離之本是正知見正見之本是三昧三昧有本是安隱安隱有本是遠離遠離有本所謂喜心喜心有本所謂不悔不悔有本所謂持戒持戒有本所謂法雨應知修行聞法為本相與等者教先以觀察智照知生死虗幻不實唯有等者如來一代時教不出無常苦空無我不淨即四念處一觀心無常二觀受是苦三觀法無我四觀身不淨此四正與常樂我淨四德相反又心無常者有二一念念滅一切有為法二謂相續法壞此四亦是十六行觀中觀苦四相也仁王經有四無常偈昔斑足太子欲登王位受外道教應取千王頭以祭家神自登位得九百九十九王頭因少一王即北行萬里遇一王名善明白斑足言願聽一日飯沙門禮三寶斑足許之時普明即依過去七佛法請百法師敷百高座一日二時講般若波羅蜜八萬偈第一法師為王說四偈初無常理偈劫火終訖乾坤洞然須彌巨海都為灰颺天龍福盡於中凋喪二儀尚殞國有何常二說苦理偈生老病死輪轉無際事與願違憂悲為患欲深禍重瘡疣無外三界皆苦國有何賴三說空理偈有本自無因緣成諸盛者必衰實者必虗眾生蠢蠢都如幻居聲響俱空國土亦如四說無我偈識神無形假乘四蛇無明寶象以為樂車形無常主神無常家形神尚離豈有國邪上文總標下別釋先釋無常如來等四句出大經文殊對純陀語前二句釋無常風擊水成泡豈能久立觀萬法如浮漚不實淨名云是身如泡不得久立念念無常忽有忽無故云速起滅也二往來二句釋苦空上喻明下法生老病死八苦交煎無時暫息法合上輪轉譬八苦者生老病死是四加求不得愛別離冤憎會五陰熾盛成八如是八種皆言苦者生如活剝牛皮死如生龜脫殻餘可知眾等相與但觀自身從頭至足其中但有三十六物三釋無我不淨與共也勉一切行人觀察己身三十六物總標下文別列先觀己身若何佛言三事和合得受此身一父二母三中陰既從三緣生豈潔淨常久之物乎既從緣生豈實有我乎然三教皆云無我而義不同孔子以謙光義說無我佛觀五蘊皆空說無我老子以長而不宰說無我問除人身亦有不藉三緣者乎答大經云孔雀聞雷震聲便得有身青雀飲雄雀淚有身命命鳥見雄者舞便得身應云智者聞般若法得生法身又三十六物分三謂外次中先列外十二𩬊毛爪齒眵淚涕唾垢汙二便眵音癡目汁凝也涕經作洟字鼻中液也二便屎尿也𩬊等皆不淨無我之物故聖賢皆施與人如太子出家因車匿請還宮遂截其𩬊如釋于閃婆為眾所擯欲向異域請佛遺物以為供養佛授以𩬊遂住異域便得佛果爪手足甲也不可盡菩薩及求善法天子等皆捨手足甲華齒菩薩及六牙象王等捨齒布施下次十二皮膚血肉筋脉骨髓肪膏腦膜人身筋有九萬脉有八萬清淨藏菩薩金色天子金色鹿王等捨身皮膚法作菩薩月思天子等捨血無悔安隱菩薩及一切施王等捨肉及髓等三中十二脾腎心肺肝膽腸胃赤白痰癊生熟二藏脾是土藏腎是水藏肺是金藏肝是木藏血不行則痰聚胸中水病也癊心病也善德菩薩及自遠離諸惡王等捨大膓小膓肝脾肺腎如是九孔常流承上文以結之雙出苦集不淨義也眼耳鼻口孔有七加水道殻道成九其不淨可知常流應前無時暫息意下引涅槃經證是故經言此身眾苦所集一切皆是不淨何有智慧者而當樂此身身者積聚義謂積聚眾苦經云如是身城諸佛棄捨凡夫味著是身種子精血究竟不淨諸佛所訶是身不如魔羅耶山生于旃檀九孔常流種種可惡諸蟲共處亦不能生優鉢羅華分陀利等心地觀云觀自身本性不淨如人厭炭色設諸方便以水洗之經無量時黑色仍舊乃至炭盡終無所益我身亦爾有漏不淨洗盡海水亦復無益老子云吾有大患為我有身無身何患肇公云約天地為高下約日月為東西約身為彼此約心為是非總是有為法耳何字本經作誰責辭也智慧與煩惱相反故於此身不生好樂涅槃經梵志問身與煩惱孰先答身及煩惱俱無先後然亦要因煩惱而得有身終不因身而有煩惱又云菩薩自觀身如病如瘡如癰如怨如箭入體是大火聚是一切善惡根本雖復不淨猶故視養為善法故為於涅槃不為生死乃至為法輪王不為轉輪王若不獲身命則不全不得受持讀誦為他廣說思惟其義故如渡者獲筏陸人獲馬田夫獲糞寒人獲火癲者獲毒藥耳生死既有如此種種惡法甚可患厭結問如何得脫離生死答德山云汝但無事於心無心於事自然虗而靈空而妙何患生死關不徹乎須知生死中有不生死者在昔商那和修問毱多曰汝生幾耶答我年十七曰汝身十七性十七耶答師𩬊已白為𩬊白心白耶答我但𩬊白非心白也毱多曰我身十七非性十七也第四發菩提心者因慚恐厭離等故發菩提心當捨不淨幻身樂求清淨法身也大經迦葉讚佛云發心畢竟二不別如是二心先心難自未得度先度他是故我禮初發心夫菩提心以智悲願三為體有五位一發心菩提十信二伏心菩提三賢三明心菩提前七地四出到菩提後三地五無上菩提佛果者字疊前標文言經言當樂佛身佛身者即法身也梵語修多羅此云契經經通教理教能契理理能契機故名契經取涅槃經當樂句立發心章張本樂願也求也欲求佛真法身應發菩提心及廣大行願以無量智慧修無量法門始得生故大經云如來身者是常住身不可壞身金剛之身非雜食身即是法身無量億劫堅牢難壞非人天身非恐怖身心地觀文殊問佛心無形相亦無住處凡夫行者最初發心依何等處觀何等相佛言凡夫所觀菩提心相猶如清淨圓滿月輪於胸臆上明朗而住若欲速得不退轉者在空寂室端身正念結金剛縛印冥目觀察臆中明月作是思惟是滿月輪五十由旬無垢明淨內外澄徹最極清涼月即是心心即是月塵翳無染妄想不生自然身心清淨大菩提心堅固不退詳如經說下明法身生處從無量功德智慧生此句是總下去是別大經文殊云如是光明名為智慧智慧者即是常住常住之法無有因緣從六波羅蜜生六即施戒忍進禪智波羅蜜此云彼岸到修此六法度慳貪等河到涅槃彼岸也到已不惟法身生報身亦生也後倣此從慈悲喜捨生即四無量心也已上俱名正道從三十七助菩提法生三十七助道品即四念處四正勤四如意足五根五力七覺支八正道註現後二卷障學文中從如是等種種功德智慧生如來身結上文六四正三十七助法種種功德是反前種種惡法句合上無量功德語大經二云世間知字不知義何等為義無我者名為生死我者名為如來欲得此身者當發菩提心求一切種智常樂我淨薩婆若果前發心為因得如來身是果果身非菩提智等決不能生故勸當發智有三種內法內名外法外名能知能解者名一切智即二乘智能用諸佛一切道法發起眾生一切善種差別分別無謬者名道種智即菩薩智能知一切道知一切種名一切種智即佛果智常樂我淨涅槃四德常者即真常之體不遷不變萬古恒如非對斷言常也樂者安隱寂滅離二生死苦樂雙融非對苦言樂也我者主宰義具八自在得大安樂即我無我不二之真我非凡夫外道邪妄等我也淨者三業清淨三惑永斷如大圓鏡了無纖翳非對染言淨也大經云世間知字不知義何等為義我無我現前夫無常者聲聞緣覺常者如來法身苦者一切外道樂者即是涅槃不淨者即有為法淨者佛菩薩所有正法是名不顛倒遠離四倒者惟此常樂我淨又常等四德是勝三修較前第三厭離章苦無常無我是劣三修涅槃以勝三斥劣三斷奠聲聞入秘密藏亦如法華斷奠聲聞咸趣一實薩婆若多秦言一切智相因名般若果名薩婆大品云此是聲聞辟支佛智非佛菩薩智據果字即一切種智亦無妨也報恩經云菩薩發菩提心修行漸得無上菩提不發終不能得淨佛國土成就眾生於身命財無所恡惜恡吝同首句上求佛果次句下化眾生由內證種智則心淨心淨即佛土淨也至此則依正無礙六依中現依正中現正正中現依依中現正依中現依正正中現依正如斯自利由前利他成就眾生而成於身二句出大經引以作結謂此上求下化應以施度居先內之身命不憐惜外之財寶不慳吝也第五怨親平等者於一切眾生起慈悲心無彼我相五心離分別申明前章妙行耳怨是怨讐能害身命者親是親愛能衛我身心者一體同觀不起憎愛是為平等圓覺云觀彼冤家如己父母祖師云至道無難唯嫌揀擇但莫憎愛洞然明白報恩經云達多惡心不息養利指爪甲下藏毒藥掐足藥化為甘露竟無所為又排山下石斷佛命根止傷佛足佛慈悲心冤親平等如來終不於眾生計有恩計則破於平等由平等故無彼我何以故爾若見怨異於親即是分別以分別故起諸相著相著因緣生諸煩惱煩惱因緣造諸惡業惡業因緣故得苦果徵何以必須無彼我相耶若見下出過異二也分別揀別是親非親也相著謂著彼此之相也由異則不一故分別由分別故著彼我怨親之相因緣者內心分別以因外境人我怨親為緣生憎愛煩惱又煩惱為因起諸惡逆業用為緣所以招致三途苦報之果耳起念分別是生死根源先德云瞥起是病不續是藥不怕念起惟恐覺遲覺即是佛大慧云佛者覺也為常覺故謂之大覺亦謂之覺王皆從凡夫中做得出來彼既丈夫我寧不爾若多相著應念佛偈云心不妄取過去法亦不貪著未來事不於現在有所住了達三世悉空寂第六念報佛恩者如來往昔無量劫中捨頭目髓腦支節手足六證覺報恩舉佛曠劫檀度二先施內財捨施也冠下文先要知恩然後報恩知恩自發菩提心報恩教一切眾生發心髓骨中脂也腦頭中脂也昔大光明王捨頭與婆羅門語云我以慈心愍汝不逆汝意以頭施汝令我來世得智慧頭勝上身菩薩及寶髻天子捨頂上寶天冠并剝頭皮與人愛作菩薩及月光王等捨眼安隱菩薩等捨肉及髓法自在菩薩等捨身支節一切大小堅精進菩薩捨手足指不可盡菩薩等捨手足甲乃至智勝菩薩及迦尸王等破胸出心施于眾生常精進菩薩及堅意王等捨手至無怨菩薩及勝去天子等刵耳劓鼻施人如是等不可枚舉觀者應信受國城妻子象馬七珍二明外財施人大經善見王太子思惟正法得辟支佛父王即捨國位如棄涕唾出家修道得大勢至菩薩及勝功德月天子等捨四天下大地及一切莊嚴與人況一國一城乎不退菩薩及莊嚴王等捨妻子等與貧乏人至愛莫過己身尚施與人況妻子乎國城尚捨況七珍乎七珍尚捨況象馬乎其細微不必言矣為我等故修諸苦行出大經二卷中為以也如迦毗王等捨身與貧窮苦惱眾生作給使侍者等大悲菩薩及善眼天子等入于地獄救苦眾生所以修此行者斷我法顯真中也如來為眾生故修此諸行耳此恩此德實難酬報古語云人但見父母生身不知承佛恩力多劫作忘恩背義人是故經言若以頂戴兩肩荷負於恒沙劫亦不能報承上難報之故引法華經證荷任在肩負任在背謂便使立地成佛一肩擔荷作佛長子亦不能報萬分之一先德云便就今日成佛去樂邦教主已嫌遲其是之謂乎我等欲報如是恩者當於此世勇猛精進捍勞忍苦不惜身命建立三寶弘通大乘廣化眾生同入正覺此示酬報之法也如是疊指已上恩言恩望義說如佛與父皆曰恩君與師皆曰義恩有二一等度之恩二令人成佛之恩直欲一生答盡故云當於此世必抖擻塵勞不許煩惱亂心一心向往故云精進離諸懈怠屏除放逸果敢直前故云勇猛不避懶偷安故云捍勞不求安樂故云忍苦求妙王菩薩及速行大王等受一切苦惱薩陀波崙菩薩及金堅王等為求法故賣身刳肉破骨出髓精進菩薩為求法故入大火坑等皆不惜身命樣子也佛常出南洲以三事勝故一能斷婬二釋念力三能精進三事尚勝諸天況北洲乎若三寶將頹當忘身忘命忍苦建立之大乘妙法有欲遏絕而不行者當精進勇猛捍勞而弘通之若此苦行不為自求正為廣化羣生共至寶所庶幾酬佛恩萬分之一也捨字一章大旨象馬七珍等是資生施捨頭目乃至精進忍苦等是無畏施弘大乘化生成佛是法施阿含經云如來出世必為五事一為轉法輪利生二為度多生父母報其恩故三為無信人立信地故四未發菩薩意者令發意故五授當佛記故為此五事故出世也第七觀罪性空者罪無自性南藏加無有實相句今從北從因緣生顛倒而有七觀罪性本空如熱水即寒氷業累即解脫故大經云諸法本無有性如人有筆紙墨和合成字而紙中本無有字以本無故假緣而成若本有者何須眾緣亦如青黃合成綠色當知青黃本無綠性若本有者何須合成亦如眾生因食得命食中實無有命若本有命未食之時食應有命故心地觀云復具四德住阿蘭若持戒清淨莊嚴自身一觀察自無本性伏斷二執證無我故二他身亦無本性於怨親所離憎愛故三身心快樂心心所法無分別故四得平等智生死涅槃無差別故從因下出無性之故妄識為內因幻境為外緣故有心見想三顛倒由三倒故造多罪業此顛倒句明生有之故既從因緣而生則可從因緣而滅從因緣而生者狎近惡友造作無端從因緣而滅者即是今日洗心懺悔首二句承上生有以生滅字顯罪性空罪既從緣生本無生因緣別離滅實非滅生滅雙空生與有亦空故云無性後四句承上生滅出滅生之相前二句造罪之由後二句滅罪之相由自心貪等為創因外狎惡友為助緣無端造作也無端有三一不正義因內多邪見外逼邪友造諸不端之罪二無端不作言罪之多甚者八萬四千塵勞門悉開三無端由無故從無端處以巧邪惡知見尋求罪釁耳洗心則心垢自除是淨因向諸聖懺悔仗三寶力滅罪為助緣因緣二字具三觀中論云因緣所生法我說即是空一名為假名亦名中道義用此三觀為洗心之玅藥承諸聖慈悲之水以祛自心重垢耳是故經言此罪性不在內不在外不在中間故知此罪從本是空引淨名經顯罪性本空良以心為罪福之本心空故罪性亦空也未曾有經妙吉祥菩薩見人造殺業因轉問佛佛言汝從何心而起業相若現在心現在心不住過未可知由心無所住不在內外中間心無色相非青黃赤白心無邊際無限量無取捨非善惡無動轉非生滅若虗空無障礙非染淨離一切相故因悟罪性本空亦不生怖畏之想心地觀蘭若品我法二執及罪相於三世中不可得自身他身無有二一切諸法亦如是故知二句結成罪性本空生如是等七種心已緣想十方諸佛賢聖擎拳合掌披陳至到慚愧改革舒歷歷時本作瀝非心肝洗蕩腸胃先結前緣想下示懺悔法在三業虔誠緣想是意業表佛有他心通擎拳等身業表佛有天眼通發言懺悔是口業表佛有天耳通又緣想則一心三觀圓成一體三身齊現一心三智普照披露至禱是垢皆陳也改是更惡為善義革是革去宿惡義舒是發露義即不覆藏歷從前罪過一一自陳也蕩是滌去的意思舒歷二句廣前洗心句宗鏡云洗濯身心清淨無餘毫無邪念乃為真懺罪相自空若不洗心求懺自欺欺人安能滅罪如此懺悔亦何罪而不滅亦何福而不生承能懺作結罪滅自離生死苦福生得趨涅槃樂若復不爾悠悠緩縱情慮躁動徒自勞形於事何益復又也責辭不爾言不能三業精誠洗心而懺也悠悠怠惰貌緩則不能急急于心縱則仍落恣恃窼臼躁動則不澄靜安能滌煩惱垢乎既不能如法懺則空自勞身滅罪事胡益且復人命無常喻如轉燭一息不還便同灰壤此以無常迅速勵之也轉去聲變也燈燭本明息之則變明成暗光不還來如人不過一口氣而已氣絕神逝便同冷灰舊壤豈復隨識妄動哉無常有三義一纔生即死二比上三界時分極促三念念遷謝即生即滅故一息法喻雙明約喻滅燭光不還明約法氣絕即同灰壤正法念經云有於胎藏中死有生已命終有能行能走皆歸于死方等經問云何命終時得見于諸佛聞說清淨法不受於苦惱答他有所求令滿足信解深法捨嚴具三寶福田勤供養臨命終時見諸佛三途苦報即身膺受不可以錢財寶貨囑託求脫杳杳冥冥恩赦無期獨嬰此苦無代受者膺當也親也陽網疎漏賄囑可脫陰𮊁細密多賂難逃故云不可以錢等三途渺漠受苦年長故云杳冥等恩悲心苦也赦寬宥也嬰受也自作自受影響相符父子至親豈能相代大經云如人為王嗔能以輭語貢上財寶便可得脫死王不爾雖以軟語錢財珍寶貢之亦不得脫況三途極苦乎莫言我今生中無有此罪所以不能懇禱懺悔經中謂言凡夫之人舉足動步無非是罪先䇿發自恃之流如云我生無罪何須懺悔次引經證成大經云舉足動步不依律行安得無罪譬如二手相拍聲出其中又云見修善者名見天人行惡者名見地獄何以故定受報故不特今生有罪過去之罪尤多故下云云又復過去生中皆悉成就無量惡業追逐行者如影隨形若不懺悔罪惡日深語云萬般將不去惟有業隨身其惡業追行者意乎如影隨形言不相離也日深句生二卷中日深日厚偈文故知包藏瑕疵佛不許可說悔先罪淨名所尚故使長淪苦海實由隱覆故字承上不懺罪惡日深來包藏包含覆藏也瑕疵譬隱顯二過瑕玉之內病也譬隱過天眼所見疵黑類也譬顯過肉眼共見法華云護惜瑕疵是小智維摩云不著佛求不著法求惟在反觀諸身而求故云說悔等先罪已作之罪也長淪句根日深義來隱覆即隱匿覆藏近根包藏義遠承不懺義淪沒溺也大經云心初無悔不能修善覆藏瑕疵雖有過去一切善業悉為是罪之所垢汙所有現受輕報轉為地獄極重惡果楞嚴云十方如來色目覆藏同名陰賊菩薩觀覆如戴高山履于巨海是故弟子某甲等北藏無等字今日發露懺悔不復覆藏結訖洗心發露罪滅福生作悔文一小結局佛言覆藏者漏不覆則無漏發露悔過是無漏又若覆罪罪則增長發露慚愧罪則消滅惟智者不覆罪若不信因果信業信報不能諮啟智人不近善友便是闡提如迦摩羅疾世醫拱手亦如死屍醫不能治所言三障者一曰煩惱二名為業三是果報此三種法更相由藉因煩惱故所以起諸惡業惡業因緣故得苦果是故弟子某甲今日至心懺悔所言疊前重標然後依次懺悔三障又名三道若三障淨便成圓覺即是如來更相互相也三世迭遷遞互相資而起煩惱雖分大小隨等實不出根本六中貪嗔癡三此三能成三界因果資始為因助因為緣又展轉感果為因互相由藉為緣因親緣疎故分釋既有惡因緣必有善因緣對治善因緣有深淺小乘生滅因緣是淺大椉無性因緣是深中論因緣所生法我說即是空空即無性義淺因緣對治外道自然計上總指三障明三世因果是故下結第一先應懺悔煩惱障而此煩惱皆從意起所以者何意業起故則身與口隨之而動惑業苦三煩惱居首故懺亦先之煩惱總有二十六貪嗔癡慢疑邪見六為根本隨煩惱有二十小隨十中隨二大隨八名相具如百法明門隨之而動者言身口七支隨意家所有煩惱而動動即是業業必感報大經云如人小時拾取土塊糞穢瓦石枯骨木枝置于口中父母見已恐為其患左手捉頭右手挑出菩薩亦爾見諸眾生法身未悟或行身口意業不善見已即以智力之免其流轉生死意業有三一者慳貪二者嗔恚三者癡闇惡心是過患根本於順境起貪違境起嗔以護自身將為主宰住貪嗔中不知是患名癡此三由根本無明有故別明意業舉數立名由癡闇故起諸邪見造諸不善是故經言貪嗔癡業能令眾生墮于地獄餓鬼畜生受苦由三毒為業因致三途苦果大經云一切眾生不見佛性故為煩惱繫縛生死見佛性故諸結煩惱所不能轉解脫生死得大涅槃經言者華嚴云由貪嗔癡發身口意作諸惡業無量無邊等最勝王經佛告阿難陀我昔雖具煩惱貪嗔癡等能於三途五趣中隨緣救濟令得出離耳若生人中得貧窮孤露兇狠頑鈍愚迷無知諸煩惱報此出三毒之餘報也三途報畢方來人道得字貫到報字上貧則無財貪財寶之餘報窮則無交狎惡友之餘報孤則無親不孝六親之餘報露則無覆藏過慢三寶之餘報其心最兇力最狠性最頑質又鈍遠慈悲智慧士於感愚迷無知報耳意業既有如此惡果是故某甲等今日至心歸命諸佛求哀懺悔坊本以此節移在後今依兩藏結意家惡果興至心哀悔求哀語淚雙行也夫此煩惱諸佛菩薩入理聖人種種訶責專指意業佛與三椉及諸祖師皆斥煩惱為怨賊等可惡不一故云種種訶責句總標下別開亦名此煩惱以為怨家何以故能斷眾生慧命根故一訶煩惱如怨家次徵釋煩惱菩提原非兩物但逐于物即菩提是煩惱若能轉物即煩惱是菩提故巖頭祖師云却物為上逐物為下亦名此煩惱以之為賊能劫眾生諸善法故二訶煩惱如惡賊劫善法財所以恒受貧窮之苦殺法身怨截智慧命所以久沒愚迷之海亦名此煩惱以為瀑河能漂眾生入於生死大苦海故三視煩惱如瀑河波濤衝逆為瀑河瀑流之河也楞嚴云譬如瀑流流急不見非是無流喻煩惱心心相續無少間歇故古德勸人要在急水灘頭一篙撐住便是好手大經云涅槃者名為洲渚何以故四大瀑河不能漂故一欲暴二有暴三見暴四無明暴漂飄同心地觀云凡夫不觀自心故漂生死海佛菩薩能觀心故度生死海到於彼岸三世如來法皆如是受苦深遠了無邊涯喻如大海亦名此煩惱以為羈鏁能繫眾生於生死獄不能得出故四見煩惱如羈鏁羈紲也繫也如馬之韁人繫之亦自業力致之人被煩惱繫是無繩自縛急以智刀斷之非為早也大經云如大香象能壞鐵鎖自在而去智慧者善業力多惡業羸弱能發露懺悔除諸罪業惡業既除何患生死獄不破而身心不自在耶所以六道牽連四生不絕惡業無窮苦果不息當知皆是煩惱過患由如怨賊之煩惱羈鏁眾生于瀑河大海故有六道等六道者一天道三界諸天二人道能持五戒守五常三修羅道鬼畜人天所攝四地獄道八寒八熱等五餓鬼道九種十類等六畜生道胎卵濕化等亦名六趣六道果報總有三種謂苦樂捨由惡業為因感三途苦報由善業為因感人天樂報四州六欲由不動業為因感上界差別報色無色界又三界中苦樂身是別業正報所居勝劣器界即苦樂依報牽連亦名輪轉謂生已復死死已更生生死不停如天上死人間生等傳傳分柝可知無常經云循環三界內猶如汲井輪四生胎卵溼化也依殻而生曰卵含藏而出曰胎假潤而生曰溼無而忽有曰化業有三一善二惡三不動此三業用能招六道不絕不息三界因果輪迴無間故煩惱過患即惑業苦應上諸煩惱報不能懺悔不遇善友不聞正法即是三障今既幸逢佛菩薩大清淨智慧人又遇清淨究竟解脫法自可翻三障成三德矣是故今日運此增上善心求哀懺悔是故指煩惱過患三障之故也運即行人清淨心中志誠力慚愧力懺悔力默密齊轉也善心即前七種心翻惡從善故又藉佛菩薩慈悲心力令能悔過是于善心加上一層故云增上所謂煩惱成般若矣所謂罪過成法身矣所謂怨賊瀑河羈鎖等大患轉成解脫矣如斯善利皆從上求佛菩薩悲哀心力及行人懺悔力而得也又善心有二一即前七種心二如相宗說善謂信慚愧無貪等三根勤安不放遲行捨及不害上引聖言及懺悔竟下列罪業名某甲等自從無始以來至于今日或在人天六道受報有此心識常懷愚惑繁滿胸䘳心識等根前意業來心識是能藏愚惑無智不信不求解脫故是所藏懷者包藏也愚即無明標諸惡心所之本繁多也既曰常懷又曰多滿則惟惡無善生後無邊量惱亂文胸襟胸次襟懷也或因三毒根造一切罪貪嗔癡是根本六中之三藏于藏識則諸善心所為之消忘故云毒又能生長一切罪惡故曰根三毒轉便是三聚淨戒矣三毒根是業因由因作業故云造一切罪下倣此或因三漏造一切罪三漏出阿毗達磨論一欲漏欲界二有漏上二界一切煩惱除無明三無明漏三界無明令心連注流散不絕漏落三界故名漏或因三苦造一切罪三苦三受為因一苦受生苦苦三界已苦欲界更苦二樂受生壞苦樂壞時苦等於三途三不苦不樂受生行苦即處中苦通於無色或緣即因字三倒造一切罪心顛倒想顛倒見顛倒為三由三倒故苦者計樂樂者計苦常計無常無常計常無我計我我計無我不淨計淨淨計不淨豈非顛倒出涅槃經第二或貪三有造一切罪欲有色有無色有即是三界三界因果不忘曰有如是等罪無量無邊惱亂一切六道四生今日慚愧皆悉懺悔如是等罪總收上三毒至三有罪作結後倣此大經云夫無量者名曰無邊邊不可得故名無量又復某甲等自從無始以來至于今日或因四識住造一切罪識南藏無色識住受識住想識住行識住是為四出阿毗曇雜論或因四流造一切罪一欲流欲界惑除見癡二有流上二界惑除見癡三見流三界見四無明流三界癡亦名四軛并下四取皆出唯識論或因四取造一切罪欲取見取戒取我語取為四能取自身相續不絕故名取或因四執造一切罪一生執不生二不滅執滅三斷執不斷四不常執常執猶取也并下四緣出圓覺疏或因四緣造一切罪一因緣諸法和合二次第緣心心數法三所緣緣法無所依四增上緣法無所得或因四大造一切罪四大即妄身地水火風假合而成者內四大也其外四大可知或因四縛造一切罪貪縛嗔縛戒取縛見取縛此四不出三界不得解脫故俱名縛亦名四結出唯識論或因四貪造一切罪情色食婬為四貪徧攷經論惟涅槃有四愛即愛著飲食等四事供養也圭峰禪師愛貪四句料簡是貪非愛如人愛忙非是貪忙是愛非貪如人愛看相打相殺誰肯貪求亦貪亦愛即名利財色等非貪非愛謂乖情之境或因四生造一切罪胎卵濕化為四生出瑜伽論下結義現前如是等罪無量無邊惱亂六道一切眾生今日慚愧皆悉懺悔又復某甲等自從無始以來至于今日或因五住地煩惱造一切罪五住地者一見一切住地三界見分別惑二欲愛住地欲界九品思三色愛住地色界四地各九品思四無色愛住地有四地各九品思五無明住地所知障或因五蓋造一切罪葢以覆真實為義止觀云貪欲追昔五欲忘失正念嗔恚想他惱我忿怒相續睡眠心神昏昧烏暗沉黑掉舉作無益事心中憂悔疑非障理疑乃障定疑為五蓋或因五慳造一切罪住處慳有房舍不欲人居家慳惜門徒家不欲他人相識他施如失己物亦名護他物慳稱讚慳不揚人美恐勝己故財慳法慳出成實論或因五見造一切罪一身見執我我所二邊見隨身計斷常墮二邊故三見取執前諸見為勝為能或執一切有漏等法妄謂常樂我淨四戒取非因計因五邪見撥無因果或因五心造一切罪一率爾二尋求三決定四染淨五等流是為五心如是等煩惱無量無邊惱亂六道一切眾生今日發露皆悉懺悔又復某甲等自從無始以來至于今日或因六情根造一切罪情字南藏無一眼根喜怒視相二耳根聽審相續三鼻根愛香憎臭四舌根甞甘苦等味五身根貪滑嫌澀六意根審察思量此六俱識情之根故名六情根或因六識造一切罪眼識玄黃不真耳識苦樂音異鼻識觀氣旋光舌識辨說邪正身識隨機現儀意識緣慮旋空能轉六識成六神通矣或因六想造一切罪析玄云眼等六識各有相應想謂眼識相應想乃至意識相應想也或因六受造一切罪六根皆能領納六境曰受空品云眼受色乃至意受法是矣或因六行造一切罪眼等六根各有所司則各有所行也法句經云昔有人河邊學道二十年但念六塵心無寧息佛徃度之化作沙門樹下共宿其夜月明龜從河出野干欲噉龜縮頭尾四足藏甲狗不得便而去龜還入水道人見此語沙門曰龜有護命之鎧野干不得便沙門對曰世人不若此龜放恣六情外魔得便復說偈曰藏六如龜防意如城慧與魔戰勝則無患須知無為能殺其賊或因六愛造一切罪毗曇云眼等六根各有所觸而生愛眼觸生愛乃至意觸生愛或因六疑造一切罪淨名疏云貪嗔癡慢疑覺六者俱有疑亦名俱生惑大經問慳貪嫉妬因何生答因無明生無明復因何生答因放逸生放逸又因何生答因顛倒生顛倒又因何生答因疑心生疑故則生顛倒見佛聞法疑網即除疑除故倒除倒除則慳等并除矣如是等煩惱無量無邊惱亂六道一切眾生今日慚愧發露皆悉懺悔時本無慚愧字又復某甲等自從無始以來至于今日或因七漏造一切罪或因七使造一切罪或因八倒造一切罪七漏者一見是漏自性二諸根是漏相應三忘是漏所依四惡是漏所引五親近是漏所發六愛是漏所雜七念是漏所知障七使者首楞云欲使恚使愛使慢使無明使見使疑使也外道獨具八倒一我見二眾生三壽命四士夫五常六斷七有八無凡夫小乘共計八倒凡夫四者一無常計常二無樂計樂三無我計我四不淨計淨二乘四者一常計無常二樂計無樂三我計無我四淨計不淨出涅槃經或因八垢造一切罪或因八苦造一切罪如是等煩惱無量無邊惱亂六道一切眾生今日發露皆悉懺悔八垢者念煩惱不念煩惱念不念煩惱我煩惱我所煩惱自性煩惱差別煩惱攝受煩惱亦名八妄想煩惱自性汙染故名垢出涅槃八苦者生老病死冤憎會愛別離求不得五陰熾盛又復某甲等自從無始以來至于今日或因九惱造一切罪此因九結造一切罪一惱我身二憎我親三讚歎我怨此三通過現未三世各三故成九惱出淨名經結是結集不散意以能和合苦故一愛結二恚結三慢結四無明結五見結六取結七疑結八嫉結九慳結結則與解脫相反也或因九緣造一切罪或因十煩惱造一切罪九緣者明緣空緣根緣境緣作意緣根本依緣染淨依緣分別依緣種子緣頌曰眼識九緣生耳識唯從八除明緣鼻舌身三七除明緣空緣後三五三四後三最後三識也即第六意第七末那第八阿賴耶五三四如次配三識則意識五緣生不藉明空根境四緣故末那惟三緣不藉餘六秪資染淨依緣分別依緣種子緣故阿賴耶惟四緣生比第七識加根本依緣根本依即阿賴耶染淨依即第七分別依第六識也十煩惱者一忿二惱三恨四覆五諂六誑七憍八害九嫉十慳此十廼二十隨煩惱之半詳現百法明門論或因十纏造一切罪或因十一徧使造一切罪十纏者一嗔心忿恚纏二覆心隱覆自罪纏三睡意識昏迷纏四眠五情暗冥纏五戲嬉遊纏六掉三業躁動纏七無慚屏處起罪不自羞纏八無愧露處起罪不羞他纏九慳財法不能惠施纏十嫉他榮心生熱惱纏纏縛也縛于生死而不得脫也十一徧使者能使惡道周徧流轉故一不信二懈怠三不慚四不愧五多貪六多嗔七多癡八昏沉九放逸十慳悋十一毒害反是名十一善心所或因十二入造一切罪或因十六知見造一切罪十二入者入以互相涉入為義眼耳鼻舌身意為內六入屬能能見聞覺知故色聲香味觸法為外六入屬所著見聞覺知之處所也亦名十二處十六知見者智論云一我者知見起我我所二生者知見如父有子三受者知見命根成就四命者知見能舉事故五有情者知見蘊和合生六養育者知見因緣故長七眾數者知見諸法有數八人者知見妄計我是人九作者知見手足能所十使作者知見力能役他十一起者知見作後世業十二使起者知見亦令他作十三受者知見苦樂果現十四使受者知見厭於苦樂十五知者知見五識名知十六見者知見日觀色像般若名十六我或因十八界造一切罪或因二十五我造一切罪根塵識各六為十八界界有三義一分別辨析義二種族義三界畔義二十五我即二十五冥諦出百論一冥初世間本性生覺二從覺中陰生我心三從我心我慢生五塵色聲香味觸五塵生地水火風空五大五大生眼耳鼻舌身五知根手足口并大遺根小遺根五業根心平等根共十一根兼前總成二十四加神我主諦成二十五我或因六十二見造一切罪色受想行識各具四句如云陰大我小我在陰中我大陰小陰在我中離降是我即陰是我一陰具四句五陰成二十歷三世成六十加根本斷常二見成六十二或因見諦思惟九十八使百八煩惱晝夜熾然見諦攝欲界三十二使苦諦下十使集滅二諦下各七除身邊戒三道諦下八使除身邊二見色界二十八使苦下九使除嗔集滅下各六除嗔身邊戒道下七使除嗔身邊無色界二十八使苦下九使除嗔集滅下各六除嗔身邊戒道下七使除嗔身邊共八十八使思惟攝欲界四使一貪二嗔三癡四慢此四使從斯陀含向入修道斷至阿那果九品方斷色界三使一貪二癡三慢竝是阿羅漢向修道斷無色界三使一貪二癡三慢故三界合有十使并前見惑成九十八使但此三使是阿羅漢向至果方盡使者驅使為義能使行人心神流轉三界故百八煩惱即九十八使加無慚愧等十纏成一百八使也此百八使于十二時中如火熾然即有微善之薪皆為灰燼何不警歟開諸漏門造一切罪惱亂賢聖及以四生徧滿三界彌亘六道無處可避諸漏門八萬四千塵勞門也賢聖有二一小椉四果為聖四向為賢大椉三賢十聖總未至無餘涅槃城皆作漏門中出入之客三界是造罪受苦的處所四生六道是造罪受苦的有情徧是周義亘是盡義彌是滿義良由惑業襲習報應綸輪故六道徧滿三界報應綸輪惑業襲習所以晝夜熾然開諸漏門只進不出三界火宅晝夜熾然故說無處可避也問何故云無可避處答乘有漏因感有漏果依有漏果又造有漏因因果相資連貫不絕故說彌亘徧滿更無隙地避之也下示逃避之方今日至禱向十方佛尊法聖眾慚愧發露皆悉懺悔至禱至誠懇禱也十方者四正四隅并上下方成十俱有佛剎及三寶故慚愧是出火宅之心發露是出漏門之口具此心口則諸漏塞火宅出也發露如倒樹然先發開四圍之土露出根芽樹自倒矣上承三寶力以慚愧利鍬發去覆藏心吐露自心咎則罪林傾而業根拔矣上文廣舉罪相懺滌竟下文發願不論有罪無罪皆應懺悔有罪懺則罪滅無罪禱令福生加以至誠不惟福增并智慧功悳自然成就下次第發願圓滿功德但懺罪不發願如淨琉璃瓶不貯獅子乳也下倣此願某甲等承是懺悔三毒一切煩惱所生功德生生世世三慧明三達朗三苦滅三願滿三毒重提前總相中第一法一切煩惱該攝漏苦倒有諸三煩惱所生下明罪滅福生不止現在未來多生皆然下例此三慧者一聞耳門二思心門三修中道觀門聞而不聽無受潤因聽而不思無深旨趣思而不修終無證理所以當明三達者達明也一天眼智明二宿命智明三漏盡智明此三當朗義見中卷三苦名義現前三願者一願一切眾生得證知法二願以無厭心為眾生說法三願捨身命護持正法此願當滿應知無漏善法不止于此但略舉耳何則無漏無盡故前惡法可懺除有漏有窮故願承是懺悔四識時本加住字非等一切煩惱所生功德生生世世廣四等心立四信業滅四惡趣得四無畏四等即四無量心一慈能與樂二悲能苦三喜慶彼樂四捨冤親等此四心當廣廣則無量無量必等等則無偏向也四信業者一信佛樂常讚佛二信法利益樂欲聽法常念修行三信僧能行二利樂供養眾四信戒樂離五欲此四信要立立則不為魔外搖動也四惡趣一地獄八寒八熱等二畜生水陸空行等三餓鬼三類九種等一重類饒火節焰不聞漿水之名二中類伺求蕩滌膿血糞穢三輕類時薄一飽九種即三財九品鬼一無財三品一炬口鬼火炬炎炎常從口出二針咽鬼腹大如山咽如針孔三臭口鬼口中腐臭自惡受殃二少財三品一針毛鬼毛利如針行便自刺二臭毛鬼其毛既利而復臭氣三大癭鬼咽埀大癭自抉噉膿三多財三品一得棄鬼常得祭祀所棄食故二得失鬼常得巷陌所遺食故三勢力鬼夜叉羅剎富類人天四修羅鬼畜人天所攝此四趣最惡當滅四無畏出智論一總持一切智無畏二知根漏盡無畏三決疑說障道無畏四答報說苦盡道無畏於大眾中廣說自他智斷決定無失故無恐懼相此四誓願得之願承是懺悔五葢等諸煩惱所生功德度五道豎五根淨五眼成五分德字下例前應補生生世世四字五葢見前等即等取五住至五心文五道即天人地獄餓鬼畜生汩生死苦皆當度之五根者一信根消除疑網二進根三念根四定根五慧根義見二卷中此五根應等豎豎建立也五眼者金剛經註云內外空寂名肉眼見自真性自在平等名天眼見自性般若之智名慧眼見一切法無一切法見一切相空一切相名法眼見前無煩惱可斷中無自性可守後無佛位可求三際清淨名佛眼智度論云菩薩初發心時以肉眼見苦眾生心生慈愍學諸禪定修得五通以天眼徧見六道受種種身益加哀憐故求慧眼以救濟之得見眾生心相種種不同云何令彼得是實法故求法眼引導令人法中後求佛眼得一切智成就佛法涅槃頌云天眼通非礙肉眼閡非通法眼惟觀俗慧眼了知空佛眼如千日照異體還同圓明法界內無處不鑒容如此五眼急當淨之五分者釋籤云一分無作戒防非止惡為戒身二分無漏淨禪息慮靜緣為定身三分無漏智慧破惑證真為慧身四分三種解脫正習俱斷為解脫身五無生了了覺照為解脫知見身此五身須成前三從因顯德後二就果彰能又第四是盡智第五無生智願承是懺悔六受等諸煩惱所生功德生生世世具足六神通滿足六度業不為六塵惑常行六妙行六神通者如意天眼天耳他心宿命漏盡是也如意通任運自在有三種一能到身飛行如鳥無閡移遠令近不往而到此沒彼出一念能至二轉變能以大作小小作大一多亦然三聖如性此如意通惟佛有之天眼通徹視大千有二種一修得二報得天耳通洞聽十方一切聲他心通者悉知種類及他人喜嗔怖畏宿命通知過去等三世事漏盡通四漏欲漏有漏無明漏見漏四漏俱盡如斯六種俱須具足餘如中卷釋六度業者善戒云一布施得富報二持戒得具足善道報三忍辱得力及端正有相好報四精進得壽及神通報五禪定得安樂及生天報六智慧得辯才及破煩惱報此六度善業須滿足六塵惑者一色如熱金丸執之則燒二聲如塗毒鼓聞之必死三香如敝龍氣嗅之則病四味如沸蜜湯又如塗蜜刀䑛之則傷五觸如臥師子近之則囓六法如萬象紛紜此六皆不可被其惑也六妙行者色界初禪云厭下界苦麤障行忻上界淨妙出行又願承是懺悔七漏八垢九結十纏等一切諸煩惱所生功德生生世世坐七淨華浴八解水具九斷智成十地行文有四一翻七漏而成七淨華一戒淨身口意始終淨即正語正業正命二心淨三椉制煩惱斷結漏盡即正精進正念正定三見淨見法真性不起妄想即正見正思惟四度疑淨見染疑斷即見道初果位五分別道淨是道宜行非道宜捨六行斷知見淨所行所斷通達分明上二皆修道二三果位七涅槃淨得無生法忍即無學道四果七淨約所修因故曰華曰坐下八解約八法流故曰水曰浴八解水詳見中卷此八解水濯前八垢等十誦律云如來巡視僧坊見僧抱疾糞穢污體扶浴令淨仍為說法病即痊可即得聖道此是佛浴此入解水是法浴九斷智者一乾慧地五停心總別相念處二性地煗頂忍世第一已上伏見思三初果斷三界八十八使見惑盡見真諦四二果斷欲界六品思惑五三果斷欲界殘思盡六四果斷三界見思盡七支佛斷見思盡更侵習氣八菩薩斷三界正使盡修六度行九佛位頓斷三界見思殘習坐木菩提樹下生草為座成劣應身能斷此九者為具智翻破九結等成十地行華嚴云登十地斷十障證十真如初歡喜地斷異生障證徧行真如二離垢地斷邪解障證最勝真如三發光地斷暗鈍障證聖流真如四燄慧地斷細惑現行障證無受真如五難勝地斷下乘涅槃障證無分別真如六現前地斷麤相現行障證染淨真如七遠行地斷細相現行障證智所依真如八不動地斷無相加行障證不增減真如九善慧地斷不欲利他障證所依真如十法雲地斷法未目在障證法無分別真如是為十地十行成翻破十纏等障矣願以懺悔十一徧使及十二入十八界等一切諸煩惱所生功德願十一空能解常用栖心自在十一空出涅槃經一內空六根無體二外空六塵無相三內外空六識無有四有為空生滅相無五無為空無相亦無六無始空體本元虗七性空法本常無八無所有空俱無亦無九第一義空功用投現十空空病去藥除十一大空小椉法無此十一空必願能解常用心既解空故得栖心自在若菩薩得此十一空即住空平等地翻前十一徧使而成者能轉十二行法輪法華經及鹿苑皆法輪三轉一示相轉二勸修轉三作證轉每轉有四謂苦集滅道三四成十二第一示相轉云此是苦逼迫性此是集招感性此是滅可證性此是道可修性第二勸修轉云此是苦汝應知此是集汝應斷此是滅汝應證此是道汝應修第三作證轉云此是苦我已知不復更證此是集我已斷不復更斷此是滅我已證不復更證此是道我已修不復更修以苦等四法三唱令知故云三轉輪喻也如世車輪有摧碾義運轉義以是四法運入眾生心摧滅煩惱疲證涅槃故云十二行法輪此輪惟極聖能轉餘未能也具足十八不共之法十八不共者一身二口三意三皆無失四無不定心五無異想心六無不知捨心七欲八念九精進十智慧十一解脫十二解脫知見上六種皆無減十三身業十四口業十五意業上三業皆隨智慧行十六以智慧知過去十七知見在十八知未來上三皆無礙惟佛獨具不與二椉及菩薩共故無量功德一切圓滿發願已歸命禮諸佛功德言無量以無能盡述也下結前生後禮佛即禮三寶以法是佛說僧是佛弟子故歸命禮佛即禮三寶且佛是主義該法僧運想須兼到南無毗盧遮那佛南無本師釋迦牟尼佛南無阿彌陀佛南無彌勒佛南無龍種上尊王佛南無龍自在王佛南無寶勝佛南無覺華定自在王佛南無袈裟幢佛南無師子吼佛南無文殊師利菩薩南無普賢菩薩南無大勢至菩薩南無地藏菩薩南無大莊嚴菩薩南無觀自在菩薩禮諸佛已次復懺悔結前起後眾生有煩惱病仗佛菩薩作大醫王能施甘露藥故大經云大慈愍眾生故令我歸依善拔眾毒箭故稱大醫王又云世尊甘露藥以施諸眾生眾生既服已不死亦不生夫論懺悔者本是改往修來滅惡興善往字生後兩先字承上文釋之謂改往日已作之過修來世之良因滅前所陳三毒等惡興前所願三慧等善也惡有二種謂真惡假惡真即三業實造之罪假惡是世人嫉妬他善造言生謗之惡令人無處措辨諺云眾口鑠金是也問假惡既造于人口與我何罪答無因致謗由宿業障所感人不見察因謗成信信謗即信我惡故雖假亦惡人之居世誰能無過學人失念尚起煩惱羅漢結習動身口業豈況凡夫而當無過誰能句與前貴賤罪自無量呼應效聖賢修道業者稱學人識心達本源者亦如三果四向暫時不在即同死人故云失念羅漢證無學果者結習即過去煩惱結之種子雖證無學出三界外但斷現行種子猶在動身發語無不是業出纏上士尚爾況在纏下愚乎但智者先覺便能改悔愚者覆藏遂使滋蔓改悔則復于無過覆藏則又增自欺大經開二愚法一作罪二覆藏知己有過不惟不改反文飾之語云小人之過也必文所以其罪日增如水之滋潤乎蔓草也此立定二種下雙承雙釋所以積習長夜南藏長夜積習曉悟無期若能慚愧發露懺悔者豈惟止是滅罪亦復增長無量功德豎立如來涅槃妙果先逆承愚者之所以即覆藏使蔓之故也長夜譬無明生死中無智慧明故由滋蔓故所以積集惡習種子惑重難悟如長夜之難曉致三途劇苦莫知所終故云無期若能下次承智者便悔來慚愧與愚者相反發露與覆藏互違無量劫來惑業有習氣種子如大樹之有根必先發開其泥露出其根枯槁立待若不惟不去其土而反覆之以泥滋之以水必然蔓莚矣功德多極曰無量圓滿之極則豎立如來妙果此滅罪長德近承滅惡興善遠應離苦得樂義竪立句立四種觀行第三段文若欲行此法者先當外肅形儀瞻奉尊像內起敬意緣於想法懇切至禱生二種心懇坊本作慊非此雙承上智者及慚愧二節示懺悔之方且標二心也身形儀表肅然不敢妄動是身業致敬也眼則仰望住持三寶若有來儀則能禮所禮歷狀假觀之端也內心則生恭敬攀緣聖境依前想法不惟空觀就中觀亦圓也尚須誠懇急切至極祈禱發二種心華嚴云一者禮敬諸佛法華維摩等皆云瞻仰尊顏目不暫捨何等為二一者自念我此形命難可常保一朝散壞不知此身何時可復若復不值諸佛賢聖忽逢惡友造眾罪業復應墮落深坑險趣徵釋一念此身無常形則假借四大命則識息煖三電光石火能幾何時光陰不惜散壞是死字四大分張此形永棄矣復音伏還也一旦失却何時還得古云人身一失袈裟下萬劫千生不復追是也下言不遇清淨良友滌除罪𠎝反逢惡伴造三途因又當久沉三界矣三界難出如深坑三途八難受苦無捄如險難處二者自念我此生中雖得值遇如來正法不為訓求佛法紹繼聖種淨身口意善法自居二自察幸得人身不信三寶縱遇佛法甘心不求不願捨家剃度雖或薙染不肯興隆三寶紹法王位繼菩薩志培聖種子遇而不遇真可惜也淨身下出聖種義三業淨則三慧明而心垢蕩善法居則惡伴遠而諸聖近居者四威儀中常在其中也而今我等私自作惡而復覆藏言他不知謂彼不見隱慝在心慠然無愧此實天下愚惑之甚既不求佛法淨三業植聖種反恣意作惡為地獄種子惑之甚也慝惡之隱于心者慠然憍𭝟凌人也作惡不悔是無愧也私自作於人所不知見處而故為政不知佛菩薩五眼三智何所不燭故悟老痛責云實是天下第一等愚惑之人故云甚耳隱慝應上私惡自不肯向清淨大眾前悔滌也即今現有十方諸佛諸大菩薩諸天神仙何曾不以清淨天眼見於我等所作罪惡既瞞不得諸聖天眼則心所隱慝身所私作謂他不知見者實惑也般若經云天眼能見十方沙界眾生成就身語意業惡行誹毀賢聖邪見因緣身壞命終當墮惡趣楞嚴云阿那律見閻浮提如觀掌中菴摩羅果諸菩薩等見百千界十方如來窮盡微塵清淨國土無所不矚眾生洞視不過分寸又復幽顯靈祇注記罪福纖毫無差言不止佛菩薩已也更有幽冥中鬼使地祇顯靈中聰明正直神等條記欵數注疏明白秋毫不爽者在上明業因無差竟下明果報不謬夫論作罪之人命終之後牛頭獄卒錄其精神在閻羅王所辯覈是非當爾之時一切怨對皆來證據各言汝先屠戮我身炮煑蒸炙或先剝奪於我一切財寶離我眷屬我於今日始得汝便兩先字去呼應前徃字夫者承上惡因不差以起趨果相當也錄者依昔記而執之也閻羅正云閻魔羅此云靜息以能靜息造惡人之不善業故或翻為遮遮令不造惡故或云琰魔此云雙王鬼官總司也有二義一自受果報此王苦樂竝受故云雙王二兄妹為王兄治男事妹治女事兄妹竝稱獄主故云雙王古云兄與妹而雙王苦與樂而同受是也此南洲下過百踰繕那有琰魔王國縱廣亦爾然有二類一大菩薩化作二實有情鬼趣所攝由治罸鬼兼地獄主故生地獄非地獄趣如人治罸諸畜生等覈考之使實也各以言辯論明是非等證據者證成據實也屠戮是殺字炮燔炙也乾煏曰炮水燒曰煑上乾下水曰蒸用油而炒曰炙剝奪剝削劫奪人財也是盜字離平聲分開也因剝奪故驚散父南子北兄東弟西故云離我眷屬始去聲望前兩先字看言方始為之也禮記月令桃始華蟬始鳴若本初之始則上呼始得便者謂向業果未熟似乎未便今正臨案對據誠難逃脫故云得便於時現前證據何得敢諱唯應甘心分受宿殃諱猶隱藏也其往為人時許其私作惡心隱慝似可欺己欺人至此始知昔者欺人之罪皆自欺也甘心分受者以情真罪當分所應受其苦故甘心默默無辯也宿殃往罪也應前兩先字如經所明地獄之中不枉治人若其平素所作眾罪心自忘失者臨命終時造惡之處一切諸相皆現在前各言汝昔在於我邊作如是罪今何得諱是時作罪之人無藏隱處於是閻羅王切齒訶責將付地獄歷無量劫求出莫由臨命終時本作是其生無量時本作劫窮非此引經證成分受甘心之義楞嚴云臨命終時未捨煖觸一生善惡俱時頓現一切二句應前一切怨對皆現在前語各言下出執對之辭昔字收前先字今何得諱與前今何敢諱呼應無藏隱處者業鏡臺前不容你如前再覆藏再隱慝也至是妙辯默默巧計蒙蒙慠心始挫矣非真惑而何於是下申明前文在閻王所覈定是非所以切齒痛恨而訶責之也付地獄與前分受宿殃照應訶責者如云癡人獄種汝在世時不孝父母邪慢無道無有慚愧汝今生處名阿鼻地獄等將付者竟以罪人付無間獄也請君自思果有隱業及時懺悔毋待臨期此事不遠不關他人正是我身自作自受雖父子至親一旦對至無代受者雖父下一十三字時本無申明分受宿殃義此事指曠劫難出之苦事由自作其因故不遠至親莫若父子極苦無如地獄一朝怨對現各自趨楚饒君有至慈之父無肯代子須臾極孝之兒孰能替父少頃有二義一事在兩難父子各自有業各自趣苦何暇代受二無間最苦苦境消魂孰能敢觸故無代者世間有家無二犯之寬典止五刑之法或可代耳我等相與得此人身體無眾疾各自努力與性命競大怖至時悔無所及是故至心求哀懺悔此勸人勤悔無怠也體無眾疾者諸病不生康泰時也努力方言勉力也與性命競者勸人𢬵性命與光陰競言有一寸光陰努力一寸不少怠也大怖至時即前證據訶責付獄等事是故下結某甲等自從無始以來至于今日積聚無明障蔽心目隨煩惱性造三世罪此下二章舉無始無明懺三世之過惡也無始有二義一過去世無有始故二諸惑瞥爾而生故古語云自從無始迷心海曠劫漂沉生死波積聚者不能發露故無明者無智慧妙明之用故不了境唯心心隨境轉故造諸惡所以慧心法眼被其障蔽心目二字楞嚴一經之要旨性是種性但隨煩惱種故造三世罪也此總標下十一節別列或躭染愛著起貪欲煩惱或瞋恚忿怒懷害煩惱一貪心所躭渾身沒在其中也染染指希望意愛則念念不捨著則時刻不離故起貪海欲叡煩惱大經云五欲難滿如火獲薪如海吞流如駞食蜜如牛食苗終無厭足二嗔心所嗔者無慈心恚忿怒即嗔之等分此等在懷自然害人十誦律一僧根鈍佛以偈教曰守口攝意身莫犯如是行者得度世僧隨誦之遂得聖道或心憒惛懵不了煩惱或我慢自高輕慠煩惱三癡心所憒心亂也是散心懵心不明也是昏心名凡夫者以昏散故昏散是生死根本無量劫中非昏即散所以佛祖說明靜止觀以治之如天台智者說摩訶止觀小止觀等佛說定慧如楞嚴圓覺等四慢心所自心貢高輕藐一切凌人慠物耳慠不敬也如十誦律中有一老人無依欲投佛出家舍利弗等神力觀之見無善根不許老人悲泣出門遇佛外來把其臂曰佛當與汝作歸依處度其出家遂登聖道可見無論勝劣人來皆當恭敬不可忽慢此間或字冠下八節文首疑惑正道猶豫煩惱謗無因果邪見煩惱五疑心所疑惑則不信能障信三寶等善法猶豫則不決心無決斷為魔所縛外道惡友是其伴侶所以正道遠而苦海淪也已上是五鈍使下去五利使亦名五見六邪見不信善惡因果所以作惡不慚行善不勤口撥無因果是邪見也如云天堂是妄造地獄非真說等不識緣假著我煩惱迷於三世執斷常煩惱七身見不知四緣假合不了四大本空因執身見自生煩惱著者堅執義即前第一貪心中躭染愛著義八邊見內迷中道外迷三世妄起堅著各執一邊故曰邊見斷常即有無一異之別名朋狎惡法起見取煩惱僻稟邪師造戒取煩惱九見取同志同類曰朋親愛附近曰狎其所朋狎惟惡法故妄執身邊戒取等見自以為勝為能及執一切有漏等法妄謂樂淨即是涅槃故十戒取僻邪也邪僻之心稟受也因內心自僻外受邪熏戒取者非因計因如執持牛狗等戒為生天因乃至𩬊熏鼻臥棘等皆是僻南作辟乃至一切等四執橫計煩惱流通本無等字十一總收諸計乃至一切等者上文止從總中別開十使此十使是八萬四千塵勞門根本云一切等盡該之矣四執者一生執不生二不滅執滅三斷執不斷四不常執常從無中妄執故云橫計今日至誠悉皆懺悔時本作皆悉結至謂盡心之極懺而不誠如魯禘既灌而往雖懺何益誠尚能動物況佛菩薩至聖乎下文準此又復無始以來至於今日守惜堅著起慳恡煩惱此章共十七節前六節承前章前六心所明乖於六度也一慳心所由貪為主心既慳吝自不能施故乖檀度不攝六情奢誕煩惱心行弊惡不忍煩惱二奢誕攝收也六情喜怒哀樂愛惡也怒與惡是嗔之等分此六種情識縱之不收故成奢侈虗誕不實之惑既不能檢點意業縱身口妄為違於戒度三不忍弊惡麤獷剛暴之類六度之中忍度最要能修六度古云一忍能令百禍消如釋尊五百世作忍辱仙之類今人不明事理如如故不能忍豈非癡之等分乖於忍度怠惰緩縱不勤煩惱疑慮躁動覺觀煩惱四不勤怠者不敬惰者不勤緩則不急縱則不慎心懷慠慢度乖精進五覺觀麤心相名覺細心相名觀初緣心中發相名覺後分別籌量好醜炤了名觀疑不決義疑者心多思慮身口必然躁動在定亦多覺觀智度論云入初禪定名有覺有觀初禪二禪中間名無覺有觀從二禪乃至非有想非無想定名無覺無觀此根前疑中亂心大乖禪度觸境迷惑無知解煩惱隨世八風生彼我煩惱六愚迷觸著境界不能了心故大經云譬如蒼蠅為唾所粘不能自出永嘉云觸途成滯或說時似悟對境即迷楞嚴云如說藥人真藥現前汝不能識此無知解根前邪見橫計與慧度相反七不平等心八風者四順四逆一利得可意事二衰失可意事三毀背後誹撥四譽背後讚美五稱當面稱揚六譏當面誹撥七苦逼惱身心八樂適悅身心隨逐世人八種口風互生彼此種種迷惑也諂曲面譽不直心煩惱獷強難觸不調和煩惱八口曲心諂是卑屈承奉語從不直心流出故云曲譽平聲揚人善而過實也面譽猶面諛當面奉承則違質直無諂行九卒暴心獷麤惡也若惡犬之獷獷不可附近強是剛暴橫逆也難觸言不可輕犯犯必釀禍流通本作強獷易忿難悅多含恨煩惱嫉妬擊刺狠戾煩惱十嗔恨心小人易怒而易悅君子難怒而難悅出世高流應以無住降心并忍力化之十一狠戾心由嫉能妬賢故口中常出東敲西擊語刺音七暗傷人也孟子刺人而殺之此從古也若讀次是譏刺也亦通狼戾兇狠乖戾不聽從于人也凶險暴害慘毒煩惱乖背聖諦執相煩惱十二酖毒心嗔之等分心兇危險剛暴害人慘心毒人如達多之推山壓佛等慘毒如惡友之害善友太子等暴害可知十三執著心慳貪等分乖是互反意背音佩是違悖意聖諦即中道第一義諦及二椉所修四諦瓔珞經云三諦亦聖諦攝聖諦圓融執相難入故云乖背故般若經教人離諸相修一切善法乃至離一切相即名諸佛等於苦集滅道生顛倒煩惱十四顛倒心苦集滅道四諦也苦即三苦八苦集即二十六種煩惱等滅是寂滅二乘所證有餘涅槃如化城者道即三十七品助道法此四法真實無謬故皆云諦又苦集世間因果倒執之而不棄道滅是出世間因果反捨之而不修豈非顛倒此乖聲聞業隨從生死十二因緣輪轉煩惱十五生死輪轉心生死是果無明是因行支為緣而生識名色六入觸受五支又以愛取有三支為因致未來生死果此二椉所修順觀生死十二輪轉門今重煩惱故但明順觀生起不言逆觀還滅從順也但隨順生死不隨順涅槃故須懺此乖緣覺業乃至無始無明住地恒沙煩惱十六無明心乃至是超略語無明住地障人成佛者恒沙煩惱是塵沙惑能障菩薩行者起四住地構於三界苦果煩惱無量無邊惱亂賢聖六道四生十七見思二惑四住因無明生故云起攝論云見一切住地欲愛住地色愛住地有愛住地加上無明即五住地構結也四住結成三界苦因苦果耳煩惱即上四住生死結惑三界苦因也生死八苦等三界苦果也由煩惱無量故惱亂無邊若得懺盡無明一切煩惱亦隨之而化也賢聖等者能翻無明成大智慧即四生六道是諸佛菩薩若不能懺雖本賢聖一任隨無明流亦不免四六之患況博地凡夫乎今日發露向十方佛尊法聖眾皆悉懺悔結訖總別雙陳罪咎仗三寶力以除之已上廣舉三世罪業懺悔竟下文次第發願轉成功德智慧願某甲等承是懺悔意業所起貪嗔癡等一切煩惱所生功德生生世世折憍慢幢竭愛欲水已上種種惑業皆承懺悔之力銷之內有十句法喻兼舉憍倨傲慢喻如高幢惟忍力足以折伏愛欲潤生如四海水惟智日足以竭盡滅嗔恚火破愚癡暗斷疑根裂諸見網嗔根本六中之一恚即前十纏十使及十一徧使等皆具恚是嗔之等分故兼舉嗔心能毀一切善法如火能燎一切物用慈悲水以滅之愚癡能蔽三智如黑暗能障三光須用慧光以破之疑亦根本六中之一疑則羣惑俱起如樹有根則莖枝與葉皆萌須用信力而斷之諸見即八十八使及六十二見等邪見縛人于生死海而不能出如網之捉魚于鏊付死地而莫逃應以金剛劒般若鋒裂而出之深識三界猶如牢獄四大毒蛇五陰怨賊六入空聚今有識得破忍不過者到底識不深透耳但知到見到便能深體力行是謂深識深識字貫下五句菩薩法眼觀三界如牢獄無非受苦處豈可貪住又當深識此身是幻不過地水風火假合暫住皮囊如四大毒蛇二上二下同處一篋故次要深識人身不過色等五陰共成猶如怨家惡賊皆足以劫法財殺慧命故大經云五陰是生煩惱之根本是故急須令斷五見及六十二是生死相續因故菩薩防之不近但守護菩提心如護赤子亦如瞎者護此一目行人護于導者又云比丘觀五蘊無我我所得阿羅果又深識六入猶如空聚謂眼等六入猶如空間聚落既無衛護官城又無同居良善惟是大盜小賊久踞其中心地觀云菩薩應觀四法能護禁戒妙行增修趣求佛智一觀察五陰生滅二觀十二處如空聚落三觀十八界性同法界四於俗諦無捨無著言空聚落者以無主宰故不捨俗諦為度生故愛詐親善修八聖道斷無明源正向涅槃不休不息首句總結言此愛欲誠如怨家欲來害我詐為親善急先識破不能為害大經云深觀愛結如怨詐親今文云善喻如世間相善之友也須修八正道以治之經有二種魔一強魔百怪俱怖二軟魔愛詐親善八聖道者聖正也一正見二正思惟三正語四正業五正精進六正定七正念八正命詳見二卷障學文處世如墮蛇蠍坑怨賊室須尋出路也斷無明源者無明是生死萬苦之本如大海為萬派之源故當首斷無明名所知能障二椉不成佛道二椉尚障況博地凡夫乎應知了心者是根本智了性者是後得智二智不顯實繇無明無明不斷佛法難成正向等者謂修此八正道不惟可以作斷無明之先鋒抑亦可以直向涅槃城也梵語摩訶般涅槃那此云大滅度如次配知三德秘藏且具四德不休息是無休歇意文具四心修八正不顛倒心斷無明向涅槃第一心不休息是常心下文助道十度廣大心三十七品心心相續十波羅蜜常得現前三十七是助道品三四二五單七隻八是也三四者一四念處觀身不淨觀受是苦觀心無常觀法無我二四正勤已生惡令斷未生惡不生未生善令生已生善增長三四如意足欲念進慧二五者一五根信進念定慧二五力即信等五力單七者謂七覺支念覺分擇法覺分精進覺分喜覺分輕安覺分定覺分捨覺分隻八者即八正道詳見中卷障學文十波羅蜜是十度華嚴云一施二戒三忍四進五定根本定守本名六慧一切智守本名七方便八願九力并上願從禪定開出十智并上方便從般若開出後四度助前六者故尋常止云六度耳涅槃經云修戒定慧解脫解脫知見六波羅蜜三十七品以為船筏依乘此筏渡煩惱河到於彼岸常樂涅槃正此意也心心常得兩句互有文拘義通者懺悔已至心信禮常住三寶首句結前次勸以至誠心深信三寶而作禮也三寶義見前但法寶者至理可尊曰法寶契之于心為法形之于言曰教法有自相共相教有遮詮表詮常住者不生滅曰常無去來曰住無住無不住有求皆應無禱不從常在世間捄苦眾生令得解脫如釋迦世尊常在娑婆化度眾生耳
