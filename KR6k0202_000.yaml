body:
  text: 序夫水懺隨聞録者乃晝中禪師注釋也昔悟達國師患人面之瘡若不感諾迦尊者現澗泉之水焉能不復為冤始知因緣會遇定孽難逃宿纏不解果報無差古德所云欲出苦輪莫先持戒欲淨戒根莫先懺悔是以包藏瑕疵佛不許可説悔先罪淨名所尚自茲妙製靈文分為三卷名曰水懺竊思懺典法門高廣因果分明言簡意賅深不可測如不縷析條分凡愚昧者未易覺悟耳屆於人心不古世風日下將視佛菩薩之經文懺典為迂談腐論而不可信從者矣故晝中禪師注隨聞一録文而不夸辨而不爭裒輯繁富極稱賅備凡善惡禍福之理燭照靡遺開示一切微妙之門至矣切矣不但以資冥福且以為迷津寶筏無出此也況禪師晝公佛門中之龍象也教演禪府無不咨詢三教百家靡不綜練是故學者宜究心焉非惟自警亦將以為未得未證者砭艾也嗟乎兵燹坂無存置於同袍亦未得見此書為憾想當時刷印未多故流傳甚少余渴慕亦有二十餘年矣先在同袍處始得一部殘闕不全後遇清源沈居士處竟得全璧若有冥相而默助之者也余敬閲一過急欲付梓冀以流傳其時正逢常住開工奈何囊鉢蕭然故而因循未彰今蒙諸同袍等慨然樂助果余願矣願與同志者共參之時光緒二十一年歲次乙未宮四月佛浴日杭州古靈鷲義吾寺住持沙門傳天台教觀裔孫瑞斌謹序隨聞録序證福菲德涼秪可結菲裹足緣慳智澀尤宜閇戶薶頭悔遍奢之夙孽制搖拽之心魚涮泌水以銷𠎝涸蒲團而卒歲然恐深負佛慈虗投禪閫且也懺社塞城未逭烏焉亥豕慧鏠韜匣艱穿漆桶皮燈茲者悟達國師學兼內外識洞古今創濯冤之懺猶工部之詩詞邇而旨遐事湫而理灝匪管見之可窺寧野心之頗鑑竊思縱狂眸而藐視鼓頑舌而談胸得無舛乎聖意褻瀆玄章智者聞之心寒識者覩之毛竪所以先核兩藏之原文次簡諸賢之疏釋托其確當綴以詒芳引住世出世之嘉言勗已信未信之良友妄乃捐衣鉢以壽梓藉檀那而贊刻啓達士善善之本懷豁初學賢賢之雅愫共光佛祖之徽猷罄淨吾人之積孽雖則智證一時之願力尚覬四方明哲之推敲故敢災木遐播殊方爾古苕高峰淨名菴午日證道人槃談識重刻水懺隨聞録序夫心源本自澄清性體原無純雜祇以一念之參差遂致千生之謬戾往來三界出沒四生靜言思之良可慨也是以諾迦尊者觀羣生昏憒因示以迦摩羅疾欲興懺文緣起故報膝上人面瘡將袁朝十生冤業自此消除蜀嶺三卷懺文從茲成就集華藏之玄文作現生之懺悔奈根基頑鈍者非但未通其理抑且不解其文亦何從而通微合漠哉晝中禪師慈悲念切拯度情殷注隨聞一録使禮懺者恍然於果報之不爽毅然以改過而自新惟是流布未普梨棗無存遍查名剎書皆罕見所存秖有法藏院訥公雖一部流傳奚能永固於是勸募重刊公諸同好佛法為不朽云大清咸豐九年己未端陽日天台教觀後學海門彥淨謹識武林後學闡宗校對晝中禪師釋水懺敘夫真性如如罪福胡有必命揀罪揀福是眼中著屑鏡上安塵旨哉毗婆佛言罪福皆空毗舍浮言罪福如幻拘那含佛言能知罪性空諦觀七佛偈真懺法之鼻祖也水懺作于悟公抑又何歟公在漢為袁子恐因七國稱兵建議殺朝錯錯歷思報復因其世為高僧無隙可抵適今為國師受享過隆遂得附膝為人面瘡痛楚徹髓盧扁莫治示名利不宜貪著為後來知識之戒矣悟公憶異僧語尋至茶隴雙松處命以巖泉濯之立愈後因作水懺此載本傳甚悉若是建天下之大計必犯天下之大難而排天下之大患必蒙天下之大疑盎之與錯兩可無憾胡為乎復索償方錯議削七國時其父已憂之云劉氏安矣如朝氏何豈其父亦有殺錯之心哉及吳楚發難盎遂不惜一人以謝七國亦心乎為劉氏耳庸暇為朝氏計乎噫事可鑒矣向嘗執經生見謂罪原不可懺罪而可懺待為亂臣賊子作護身符矣今參佛乘是義不然使罪不可懺是絶天下自新之路而見性無期佛命亦幾殞滅如彼衣垢必資裕浣浣去衣存垢復何在悟公作此懺真有利於後世今晝公之疏此懺大有功于今人宜其勤勤闡譯急付之欹厥氏也但佛説見聞非見聞則掃盡疑團不留剩義是知罪原無相懺本無住併疏亦非詮吾願閲隨聞録者當作如是觀金沙佛弟子大貞書慈悲水懺序序緒也如繭之得緒盡一繭之絲懺之得序盡知一懺之旨序主姓名莫稽竊謂聖教經律論藏譯席所翻之外爾後羣賢製作未有無所感而為之者乎竊私竊也未彰于口先私心念之大聖之教分經律論三藏經詮理智律詮戒行此外人所作大抵遇事感心者多生下即此等言若條陳枚舉品別而言未易紀極即此靈文而曰水懺者請言其由逐欵而陳每事而舉品類別開難窮其數就此靈驗之懺請試言其端由耳昔唐懿宗朝有悟達國師知玄者唐代名李淵叔德之後出製懺時也懿宗能信三寶之帝主禮悟達為師者國師之號由是而興悟達號也知玄諱也未顯時嘗與一僧邂逅於京師忘其所寓之地資參時曾與異僧休夏王都不期而會其邸地則忘之矣其僧乃患迦摩羅疾衆皆惡之而知玄與之為鄰時時顧問略無厭色迦摩羅疾惡病也大淋瘋故衆人皆厭之此聖僧示現惡疾一試達老之心二示將禍之兆為鄰所謂鄰單也久而益勤解苦之端玄獨憐之時為將理因分袂其僧感其風義祝之曰子向後有難可往西蜀彭州茶隴山相尋其山有二松為志解制各別病僧感其高風道義知達公後必有難故祝之向後有難者他日必有榮遇夙障自發也西蜀省名今四川彭州州名茶隴山一曰九隴山此異人現比丘身度生及出達老脫苦處也相尋互相尋訪患必療治長松二株豎出雲表志謁也後悟達國師居安國寺道德昭著長安安國寺學識既富洪闡法筵聲德光顯此出致榮之繇下出昭著之實懿宗親臨法席賜沉香為法座恩渥甚厚咸通十二年上幸安國寺以沉香諸寶為法座署為國師故曰恩渥甚厚自爾忽生人面瘡於膝上眉目口齒俱備每以飲食餧之則開口吞啖與人無異遍召名醫皆拱手默默爾疊恩渥甚厚句人面總説眉目口齒別明既具口齒飲食自受餧飼之也啖食也既生此瘡必大苦痛遍召明醫莫之或治惟拱手無言眼定口默而已時本無異下有其痛苦不可勝言七字因記昔日同住僧之語竟入山相尋值天色已晚倣徨四顧乃見二松於煙雲間信期約之不誣記追思也因名醫拱手無可救藥乃追憶未顯時患僧之語遠詣成都茶隴山當天色正晚四望無他惟長松蒼翠逈出煙雲多年之期千里之約信不謬也言與境而雖符達共迦而未偶即趨其所崇樓廣殿金碧交輝其僧立於門首顧接甚歡因留宿遂以所苦告之彼云無傷也巖下有泉明旦濯之即愈趨急入也客僧速入主僧候門回顧接迓甚為歡欣因而留宿詢問來因乃以惡疾仰白聖僧迦曰無妨此巖之下有泌其泉清湛映心詰朝浣之速瘥濯洗也泉即三昧水黎明童子引至泉所方掬水間其人面瘡遂大呼未可洗公識達深遠考究古今曾讀西漢書袁盎朝錯傳否曰曾讀既曾讀之寧不知袁盎殺朝錯乎公即袁盎吾即朝錯也錯要斬東市其冤為何如哉掬兩手捧水也瘡遂大呼口吐人言也未可洗欲訴瘡由也漢景帝時吳楚等七國反以景帝之削其地也宛不知殺朝錯也反不殺亦反而袁盎與錯並為相盎嫉錯説景帝曰請退左右錯當趨避東廂心知盎之進言則時人呼錯為智囊可驗已後錯果腰斬于東市此舌劒殺人之冤也冤重恨深不能相忘故下有文纍世求報云云纍世求報于公而公十世為高僧戒律精嚴報不得其便今汝受人主寵遇過奢名利心起於德有損故能害之多生求報前冤因世世相繼持守淨戒仇不可復故報不得便戒神護蔽故下出得報之由遇猶相待也人主寵遇即前親臨法席賜沉香座署為國師過于奢侈名韁利鎖既纏精嚴戒德有損方能加報故云害之應知享福是損德之魁造惡是致苦之本欲求出世須精律行不但怨不可結日用尤宜惜福今蒙迦諾迦尊者洗我以三昧法水自此以往不復與汝為冤矣迦諾迦尊者之號出自瘡口所謂異僧也三昧水即慈悲心中三昧之水由此水故洗去積世挾怨垢心自後兩釋無憾可知昔日患僧為達公而現迦摩羅疾為達公而示苟無此舉達老之冤何由釋水懺何由興可知事必有繇耳悟達聞之凜然魂不住體連忙掬連忙掬時本作急握水洗之其痛徹髓絶而復蘇覺來其瘡不見絶而復蘇死而更生也怨心剋骨附體由佛法猛力解除畢竟解脫既得再生膝復如故乃知聖賢混迹非凡情所測再欲瞻敬回顧寺宇不可復見自同童子汲泉再欲瞻禮重回顧寺無能再見應知不特迦諾迦為達老而混迹塵寰達老亦不過為衆生而示患往昔現宰官身造惡因今日現比丘相償殺報且隔十世報在剎那示因果不昧也及其解脫瘡也諾迦也童子也寺宇也悉叵復見俱成夢幻然梵宇未嘗無也現者雖沒新者繼興因卓菴其所遂成招提逮我宋朝驗知序主宋時人至道年中賜名至德禪寺有高僧信師古作記紀其事甚詳就山樹剎表向所現之崇廣者雖沒而招提又傑然新出矣逮及也至道年號也是年敕賜招提額曰至德禪寺信師古未考悟達當時感其殊異深思積世之冤非遇聖人何由得釋因述為懺法朝夕禮誦遇字應前顧接字誅茆結菴製懺禮誦忘名利鑠人我以了餘生深培道種述者撮大藏之綱要成雪罪之懺文也後傳播天下今之懺文三卷者乃斯文也蓋取三昧水洗冤業為義命名曰水懺此悟達感迦諾迦之異應正名立義報本而為之云耳因懺文緊峭章句字法鮮嚴詞可以醒人事足以警聽故傳播天下後世也蓋取下出立名之由為之作水懺也今輒敘夫故實標顯先猷庶幾開卷若禮若誦者知前賢事迹之有端由歷劫果因之不昧也序主自言擅敢敘夫舊時實事標明先代嘉猷庶幾令末世有緣得遇此懺者稱名瞻禮跪誦悔文減罪增福亦粗知唐賢達老始而風義動人中而人主寵厚及宿冤得便乃至脫苦卓菴述懺各有端由頭緒因果不昧以警後世之妬賢嫉能舌劍傷人之必有定報也戒之哉讚佛偈見佛必須伸讚表歸投恭敬之誠為成佛因默具于心朗彰乎口令有緣得聞鼓其宿因亦身心歸投彼此兼益於道日增善友日多於惡日減斯讚佛偈可缺乎應釋之大慈大悲愍衆生二句美成佛之因慈悲喜捨菩薩所具四無量心也四皆無量故皆曰大又聲聞行四等未能實益衆生今菩薩行四等實能普利故慈能與樂不止在一時一處一衆生縱歷無量時無量處度無量衆生與無量樂隨衆生欲如日垂影如母應子而此與樂之心不休不息直令衆生得大涅槃中四樂故曰大慈耳大經云調心莫如調嗔譬如家犬不畏于人山林野鹿見人怖走嗔心難去如守家犬慈心易失如彼野鹿又如畫石其文常存畫水速滅勢不久住嗔如畫石諸善根本如彼畫水又如大火聚其明久住電光之明不得暫停嗔如火聚慈如電光是故此心難得調伏又云一切佛法如三十七助等及知他心智諸神通知本際智聲聞智緣覺智菩薩智佛智等法皆與慈為根本以慈即如來即大乘即菩提道即大梵即一切衆生父母即不可思議諸佛境界即衆生佛性等又慈即是常常即是法法即是僧僧即是慈慈即如來即一切菩薩無上之道即甘露具如經中説乃至云達多教闍王放醉象踏殺佛及弟子佛入慈定于五指出五師子象見心怖失糞舉身投地敬禮佛足乃是修慈善根力故令彼調伏大悲者悲能拔苦其救苦之心於時處衆生悉皆無量隨衆生所遭逆境所欲脫者悉皆之如援溺之手拔疔之藥而此拔苦之心常精常進追斷衆生二種生死之苦而後已衆生生死不息悲心不休衆生苦海甚大故佛菩薩之悲心亦大也苦言者苦從前生惡惑種來業水恆滋苦根深入徹骨徹髓如油入麵如釘入木既久且紐非大士無量悲心之力何以而出之世間父母亦有慈悲愛惜兒孫止於一世子若不孝背恩違義則心生恚恨慈心薄少故不名大諸佛菩薩慈心不爾見苦衆生悲心益重乃至入于五無間獄大火輪中代諸衆生受無量苦如是慈悲過於父母無量無邊故名為大愍衆生者愍是哀愍憐惜之謂衆生對諸佛言十法界中除佛法界俱名衆生唯佛不墮諸數故菩薩正斷塵沙即等覺地尚有生相無明聲聞緣覺無明二字尚未夢見六道衆生父母與己三緣和合乃至五陰四大衆法共生故名衆生又土木金石等無情衆生因宿生修偏枯死定故墮無知諸佛為菩薩時亦發願度之成圓滿寶覺故曰情與無情同圓種智大喜大捨濟含識喜是慶己慶人皆離苦得樂也捨者內外二財悉施于人也乃至憎愛心冤親想度生念涅槃樂如此心想樂念于大圓鏡智中略無纖毫影子故二俱名大耳濟是濟渡言用此四無量心為渡苦海之巨航博濟衆生同到彼岸也含識者含靈抱識六趣四生也大經云四無量心能令無量無邊衆生發菩提心是故菩薩繫心親近行人了知一切衆生皆歸一道一道者大乘也心地觀云大慈等四法能生一切福德智慧利益安樂無量衆生速證菩提已上二句首四字是能度末二字是所度愍濟二字雙兼能所總明諸佛因中感報之由竟相好光明以自嚴此明繇因所剋之果也佛有三身謂法報化法身無形故不得見唯佛與佛乃能究盡今所讚者報應二身並有粗細三十二相八十種好及八萬四千光明故以因也自非自他之自乃自然之自也緣因四心皆得無量皆已究竟故致果上相好光明三者皆得自然而然不假神力任運莊嚴致人天之禮敬也衆等志心歸命禮前三句讚佛之妙因妙果可敬可承此句明竭誠以作結衆對獨言單己曰獨三人為衆乃至十百千萬即名大衆也等者平等一心無能所等異念以一會大衆皆運至心深患生死苦樂涅槃樂故志者意念專一也志心者一心向佛更無異想也梵語南無此云歸命亦云歸身蓋自反為歸以佛非心外之佛乃自心本佛今歸投大覺即反本有之覺心也由見即心之佛具足無量慈悲喜捨普被衆生深感于衷故齊捐身命專心志意而歸投焉是即血肉幻妄之軀覿體便成金剛不壞之體即識心連持之命而成佛果智慧之命也禮謂敬禮凡夫以大聖為師必須五體投地尊敬作禮也此句含蓄甚妙收盡上三句衆字合上衆生含識等字合上慈悲喜捨四心俱大志心字合上愍濟歸命字合上相好光明禮字合上以自嚴既達乎理又通於文自發智慧如斯運禮其功德可涯量哉啓運慈悲道場懺法啓開也佛法心三皆有開義先達遺此懺法有文可覽理可會故令人開卷得益生慶幸想是法開義又此懺雖係文字語言其實先聖本意在開示悟入衆生佛之知見即文言是真淨妙法覺本自心是佛開義既知佛法二義便知有事懺理懺大乘小乘懺法雖殊不外自悔一念真淨妙心立地心華發明見自心本佛度生真體是心開義果得此三義何患教不明禪不透哉故昔慈恩懺主從修懺處悟明心體運默轉也謂默轉慈悲之想廣利羣生彼此得益方成大乘懺法也道場二字有事有理事即阿蘭若香華燈燭等莊嚴及見相稱名等理則清淨心中普運慈悲即空假中等懺者具云懺摩此云悔過懺云陳露先罪悔云改往修來謂之斷相續心一斷永不復造又懺謂止斷未來非未作之罪不敢更作等悔謂自耻心于往犯已作之罪願乞除滅等法者執持義軌謂軌生物解如上佛法心三義等持謂任持自性令人知此懺法自性本具自性清淨亦知罪無自性罪性本空空不透脫須仗佛力今以懺法成範列左懺具十法一明信因果二生重怖畏三深起慚愧四求滅罪方法五發露先罪六斷相續心七起護法心八發大誓願度脫衆生九常念十方諸佛十觀罪性無生懺悔三義一立懺悔名首伏白黑改往修來慚愧等名二示懺悔處別教以次第三觀為處圓教以妙三觀為處三作懺悔法身口意三依法又復應知大小二乘各有三種懺悔大乘三者一作法懺身口依法稽顙求哀等儀有五法一袒右肩二右膝著地三至心合掌四頭面禮足五説己罪名二取相懺心有目想相起為期等三無生懺一向攝念罪福無主法華方等般若各有事儀要制期限方等十二夢王菩薩戒見光見華等為助端坐念實相為正小乘三者一作法經藏輕重俱許懺律不許夷但許下四二取相阿含犯欲作蛇口想罪即滅等三無生析法空觀一心歸命三世諸佛一是純一精專之謂即志心意夫懺悔雖重在行人自心一念竭誠豁然開悟然必藉諸佛愍濟默佑故要一心歸命過現未為三世生下八佛名梵語佛陀此云覺者佛是主義體即無漏五蘊假者也覺體是慧覺察斷障覺照真俗自覺覺他覺行圓滿如次配凡夫二乘菩薩唯如來獨到彼岸跨十方而為主握五性以稱師三覺圓明故名為佛三世諸佛是標下列號若知三世一時便知三身一體南無過去毗婆尸佛南無此云歸身亦云歸命以凡身歸聖身所以有為身證無為體且轉八識命歸智慧命耳過去二字應冠到毗舍浮上以三佛皆過去劫教主故毗婆尸一名維衛此云勝觀人壽八萬歲時出世釋迦於空王佛所發菩提心後於是佛出世三僧祇滿故居七佛之首壽八十千劫此及下二佛皆剎利家生皆姓拘鄰此佛于波吒羅樹下得無上菩提三集聲聞第一弟子一名吉沙二名看茶侍者名無憂子名成陰父名槃頭母名槃頭意城名槃頭付法偈云身從無相中受生猶如幻出諸形像幻人心識本來無罪福皆空無所住乃過去莊嚴劫第九百九十八尊佛也南無尸棄佛尸棄此云持髻人壽七萬歲時出世又名式棄大論翻火依其種姓同前于芬陀利樹下證果亦三集聲聞弟子一名勝二名自在侍者名離畏子名不可量父名鉤那母名勝城名阿樓那跋提過去三十一劫出世彼劫復有毗舍浮佛自後無量劫空過無佛至賢劫中有四佛即拘留孫以至釋迦也付法偈云起諸善法本是幻造諸惡業亦是幻身如聚沫心如風幻出無根無實性過去莊嚴劫第九百九十九尊佛也南無毗舍浮佛毗舍浮此云遍一切自在壽二千劫種姓同前娑羅樹下得果再集聲聞第一弟子一名星宿二名上侍者名寂子名善智父名阿樓那天子母名稱意城名隨意偈曰假借四大以為身心本無生因境有前境若無心亦無罪福如幻起亦滅過去莊嚴劫第一千尊佛也南無拘留孫佛拘留孫此云所應斷又云作用壽命十四小劫此及下二佛皆婆羅門種皆姓迦葉憂頭跋樹下得果一集聲聞第一弟子一名疾二名力侍者名智子名上父名功德母名廣彼天子名無畏城亦名無畏付法偈曰見身無實是佛身了心如幻是佛幻了得身心本性空斯人與佛何殊別此乃現在賢劫第一尊佛初減人壽六萬歲時出成佛道為賢劫千佛之首南無拘那含牟尼佛拘那含牟尼此云金寂仙大論名迦那迦牟尼秦言金仙壽命三十小劫于尸利沙樹下得果一集聲聞第一弟子一名活二名毗頭羅侍者名親子名勝父名大德母名難勝天子名莊嚴城亦名莊嚴偈云佛不見身知是佛若實有知別無佛智者能知罪性空坦然不怖于生死此現在賢劫第二尊佛也次減人壽四萬歲時出成佛道南無迦葉佛迦葉此云飲光壽二十小劫于尼拘律樹下得果第一聲聞弟子一名輸那二名頗羅墮侍者名迦天子名導師父名淨德母名善財天子名知使城亦名知使即波羅奈城是也偈曰一切衆生性清淨從本無生無可滅即此身心是幻生幻化之中無罪福此現在賢劫第三尊佛人壽減至二萬歲時出成正覺當賢劫中第九小劫南無本師釋迦牟尼佛目法化生現在歸依故云本師第二劫滿遇然燈佛第三大劫滿正當治世號釋迦牟尼此云能仁寂默惟能仁故不住涅槃遍入塵勞度生惟寂默故不淪生死常住涅槃自在壽期一百年亦剎利家生姓瞿曇太子時名悉達此云一切義成世出世間之義皆成就故于阿説他樹下得果一集聲聞第一弟子一名舍利弗二名目犍連侍者名慶喜子名羅睺羅父名輸頭檀王母名摩訶摩耶城名迦毗羅又能仁者仁慈化導利他之號寂默者自在證真利己之稱付法偈云法本法無法無法法亦法今付無法時法法何曾法是賢劫第四尊佛也人壽百歲時出世欲知增減者人壽八萬四千歲過百年減一歲減至十歲又過百年增一歲乃至增到八萬四千歲如是一增一減為一小劫如是二十番增減為一中劫八十小劫為一大劫當知一增一減計一千六百八十萬年住劫初至第九減劫人壽百歲時該一萬五千一百一十九萬年減至十歲猶有一萬年在後可知南無當來彌勒尊佛前佛是三世中過現此當未來治世故云當來彌勒一譯旃怛麗此云慈氏姓也阿逸多此云無能勝名也現在知足內院説法後降生堪忍界翅頭末國城中大婆羅門家托胎長成身長三十二丈胸廣十丈面長五丈人壽皆八萬歲身長一十六丈相貌端嚴衣食化生不須勞苦七寶滿藏無人視之無災患寒暑盜賊諸不吉祥事于華林園內龍華樹下而成正覺住劫內第十小劫人壽八萬四千歲減至八萬歲時出三會度人初會度九十九億聲聞第二會度九十六億聲聞第三會度九十三億聲聞禮懺必先七佛如世間立宗祖之七廟也如世弟子孝順七世父母故凡禮佛必須觀想心役名運身由觀顯觀即一心空假中身即一身法報化想禮佛偈作觀頂禮人根有利鈍之殊慧心分淺深之異佛身及德不可思議於行人心隨力隨分而想觀之福不唐捐如飲海水各令飽滿故應于禮佛之次攝心入觀諦想成就即得諸佛現前三昧以我有限之身心運無窮之企想必期自他雙利而懺回向菩提道無不剋慈無不廣者矣讚法偈佛是能證法是所證能證既已伸讚所證豈得默然良以龍證繇所證得尊所證緣能證方顯是故其次以偈歎法無上甚深微妙法連以三義歎法法字承上三義初無上法者佛法最上更無一法可以加之故能證諸佛謂之無上士所證之法謂之無上法超等覺故等覺名有上士如須彌卓逈落羣峰之峻故甚深法者佛法最深更無一法能徹其源非權乘菩薩及二乘等所能窺測譬如大海非百川之淵可比故微妙法者佛法理趣幽微圓妙不可思議衆生第能由之不能知之所謂衆生日用而不知者是即凡夫粗惡之法全體聖人微妙之法耳百千萬劫難遭遇法華云無量無數劫空過無有佛無佛則無從聞法矣故云難遭又難遇者經云諸佛興出世懸遠值遇難正使出于世説是法復難是也此句應作六句讀一百劫難遇二千劫難遭三萬劫難逢四百千劫難遇五百萬劫難逢六百千萬劫難遭是從少至多句總言曠劫難遇令人生難遭想希有心以景慕佛法耳我今見聞得受持此雙承上兩句來我今二字承上第二句謂如是曠劫罕遇之法於我一介凡夫即今忽然幸遇慶中之慶矣得字承上遭遇字由遭遇故得見聞耳又得字居乎中間雙貫兩端謂眼得見耳得聞心得受持也受者領納于心念念承受無少遺失如琉璃瓶盛獅子乳靡纖滴之泄也持者膠執不捨若身若心奉持不倦依義修行之謂此見聞受持望前首句看具能所持義願解如來真實義願誓辭承上一句二字來謂既多劫罕遇我今忽然得逢應生難遭想恭敬心當發大誓願矣解字根上見等五字來謂既得見聞受持須要實悟根源實解差別方副世尊説法開示衆生之意如來等五字結歸首句蓋無上等法人人具有但為妄想牢籠不自就裏領解却似如來獨證獨有故結歸如來分上其實情無情類莫不皆充然具而本然得也如來有二義一指三世諸佛二指性具體用如者寂滅義來者照用義即寂滅之體起照應之用即照應之用全寂滅之體體用不二故名如來真實義二一對虗妄看以世間虗浮言詮顯真實妙義非即文字是真實義故般若以色見聲求不能見如來若於真實義透脫即虗妄言句全體真實矣二望前無上等法看法總義別謂解無上等總法或易若能解了無上等三重法中真而不妄實而不虗之差別義實難古云涅槃心易曉差別智難明非是之謂乎
