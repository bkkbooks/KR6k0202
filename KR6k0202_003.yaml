body:
  text: 寓古婁青螺菴沙門晝中智證録一切諸佛愍念衆生為説水懺道場總法今當歸命一切諸佛南無毗盧遮那佛南無本師釋迦牟尼佛南無阿彌陀佛南無彌勒佛南無龍種上尊王佛南無龍自在王佛南無寶勝佛南無覺華定自在王佛南無袈裟幢佛南無師子吼佛南無文殊師利菩薩南無普賢菩薩南無大勢至菩薩南無地藏菩薩南無大莊嚴菩薩南無觀自在菩薩綸貫毗盧遮那此云遍一切處法身也又翻光明遍照報身也釋迦牟尼此云能仁寂默應身也法身乃應身之體應身本法身之用體用一如故繼之以阿彌陀以具無量壽之體能發無量光之用由無量光之用彰無量壽之體此體此用徹過徹當故繼之以當來補處之尊既三身圓顯三世互通非勇健尊聖得大自在者不能故繼之以龍種上尊王此龍種最尊隨處變幻皆得自在故繼之以龍自在王具此妙體妙用最尊最貴自然超越衆聖之上故繼之以寶勝如來如此尊勝體用皆從妙定妙慧妙因妙果因果交徹始本一契理智一如故繼之以覺華定自在王惟是此等大過量人可以去盡塵勞之穢可以建大法幢撥邪返正故繼之以袈裟幢惟克建立法幢者方可踞猊座説大法度大衆故繼之以師子吼如來欲以師音度世非蓋天蓋地徹古徹今大智慧人不可故繼之以文殊師利縱有智慧不有大行飭之如有目無足堪濟何事故繼之以普賢大行則目足相資膏明互賴自然具足廣大德用舉足動步摧破魔窟故繼之以大勢至是皆由其誓願堅厚智德包含故繼之以地藏如上大智大行大作用大誓願非性外別具全稱自性廣大之妙體發應物無疆之妙用莊嚴性海圓滿三身故繼之以大莊嚴雖然具足無緣大慈同體大悲箇中並無少法可得廣于沙劫歷無數土度無量生而未嘗動著絲毫故繼之以觀自在故永嘉云不見一法即如來方得名為觀自在耳僧問招賢禪師諸聖體同名何各別答從眼根處返源曰文殊耳根返源名觀音從心返源名普賢文殊是佛妙觀察智普賢是佛之無作妙行觀音是佛無緣大慈三聖是佛之妙用佛是三聖之真體用有河沙假名體則總名一佛問行人必須發何等願成何等佛答成無佛可成之本佛如上十佛是也發佛佛皆所必成之性願如上六菩薩是也問如諸佛菩薩東西兩土主伴云何答東土以釋迦為主文殊普賢為伴為願願救東震旦也西方以彌陀為主觀音勢主為伴為願伴西聖以救東土也然雖分東西主伴皆以發菩提心為宗此心要以智悲願三為體如文殊智也觀音悲也普賢地藏願王也餘如前解問三寶為衆生之心勝于父母為子之心今有不敬三尊反生輕嫉者何答由不信因果故耳曾見育王譬喻經云昔行人見路傍一死尸天神散華于其上以手摩之行人問其故天神答曰是我故身前生恭敬三寶孝順父母忠君信友愛父師教令我生天故來報恩前行又見一尸惡鬼鞭之亦問其故鬼言是我故身在生輕欺三寶不孝不忠種種非為令我受惡報故來鞭之既爾何不各各及其形休精勤努力恭敬三寶預絶後悔耶禮諸佛已次復懺悔已懺身三口四竟次復懺悔佛法僧間一切諸障已懺下結前六根收于身口字中次復下有二意一承前餘障字以起後二標列三寶間諸障經中佛説人身難得佛法難聞衆僧難值信心難生六根難具善友難得引大經標滅障之本方等經云佛與阿難遊息間以爪取土問言爪上土多大地土多阿難答爪土少甚地土無窮佛言得人身者如爪上土失人身者如大地土佛至瓜園取爪土喻亦爾看人身難得語最宜警省慎勿蹉過佛法難聞即佛世難遇正法難聞法華經東方天王一百八十劫南方云過百三十劫上方云於昔無量劫空過無有佛又云乃至無量國中是經名字不可得聞今既得聞何其幸也衆僧難值即持戒弘法者正法念處經云五戒不持人天路絶五戒堅持人天交接并上既得人身又遇三寶此時不修真可歎也信心難生即信心信戒等心應生也六根難具今幸具足具而不修更待何時乎善友善知識也大經云所作之事不求自樂常為衆生不惟自行十善亦度人行善而今相與宿植善根得此人身六根完具又值善友得聞正法於其中間復各不能盡心精勤恐于未來長溺萬苦無有出期是故今日至誠求哀懺悔上總言難得此總明皆得應及時辦道由宿植善根今得人身六根具足是難得者得難具者具也又遇善友得聞正法是難遇者遇難聞者聞矣不能盡其心力精勤五體吾恐未來久淪衆苦出期難定也不能盡心句與上宿植善根反看貫下六節文是故下結上略明起障之由下廣舉起障之事三初別懺佛間罪障某甲等自從無始以來至于今日常以無明覆心煩惱障意見佛形像不能盡心恭敬見三寶像不禮拜供養即拜二業不虔者當玩之輕蔑衆僧殘害善友破塔毀寺焚燒經像出佛身血文分五一輕僧蔑輕易也楊子視日月而知衆星之蔑也蓋僧者前佛之弟子後佛之因人豈可輕乎二慢道善友難得而反殘之殘賊也孟子賊義者謂之殘三破毀塔寺四焚燒經像經者諸佛法身像者諸佛儀表今見道場事畢付之火中誠不應也故雲棲禁焉五出佛身血如調達推山壓佛及佛面刮金之類或自處華堂安置尊像卑猥之處使煙薰日曝風吹雨露塵土汙坌鼠毀壞共住同宿曾無禮敬卑低濕處其自處則崇樓傑閣猥雜閙不淨處自處則華堂美宇或近竈則煙薰乏裝修則日曝風吹或無遮蓋則雨露淋或近作場則塵土汙坌或曠日關閉殿宇則日有飛毀暮有走鼠壞或房中供像或像前鋪單是共住同宿曾無禮敬曝音僕晒也土之輕飛而散者曰塵塵之重厚而聚者曰土皆能染汙覆蔽也坌音盆去聲塵塕也共住宿不禮敬禮貌缺也觀佛三昧經大梵天王禮佛影偈云如來處日窟踴身入石裡如日無障閡金光相具足我今頭面禮牟尼救世尊佛影尚禮敬況像乎或裸露像前初不嚴飾遮掩燈燭關閉殿宇障佛光明如是等罪今日至誠皆悉懺悔裸形露體在像前未曾莊嚴文飾皆從不能盡心精勤來屋四傍曰宇初章竟下第二別懺法間罪障又復無始以來至于今日或於法間以不淨手把捉經卷或臨經書非法俗語法即三藏十二部一切佛法不淨手者或未梳洗或大小解乃至執捉一切穢汙物已皆應洗令清淨淨時當誦洗手偈呪云以水盥掌當願衆生得清淨手受持佛法唵主迦囉耶莎訶若淨手水不濕手背口不誦偈呪亦不作淨慎之慎之把捉即執持也上明手業下明口業非法俗語有二一非法語不依法説不稱佛旨二粗俗語於清淨法前反恣惡口粗談者下四節明身意二業或安置牀頭坐起不敬一故以佛法高置牀頭不宜也坐起不敬身意造業下文皆兼身意説般若云經典所在即為有佛不敬豈無罪乎或關閉箱篋蟲蠧朽爛或首軸脫落部帙失次二箱竹器之方大可藏經書者篋音怯匾小器也因關于箱閉于篋不經日曝諸蟲蠧損之或枯朽腐爛皆不肯流傳心吝之罪也三首即部面軸卷軸也不全曰脫落卷不論多寡以始終為部帙書衣即經套也顛倒無序為失次或挽脫漏誤紙墨破裂自不修習不肯流傳如是等罪今日志誠皆悉懺悔四挽牽引也粗手分碎義脫落也日久不修不聯絡漏亦落也或書寫遺失誤者如認豕為亥以烏為烏等或訛以前置後後置前之類墨字也謂紙破字壞也修習修葺誦習也流傳者言自他諸人彼此諸土展轉流通各各傳習令家喻戶曉也又修有二義一修習先習熟文義而後如法修為二修葺凡經典之缺者補之潤者焙之斷者黏之等下第三僧間罪障章分三節或眠地聽經仰臥讀誦高聲語笑亂他聽法一眠地聞經輕法慢教也看文曰讀不忘曰誦讀誦有三益一起發益二開悟益三印證益仰臥而讀誦者視法如歌曲而不尊也不能息心定慮傾耳默聽反高聲語高聲笑豈非惱亂淨心為法人乎明身口共造業竟或邪解佛語僻説聖意二意口共造解論須契聖旨不合佛心皆是邪解大經云如生盲人不識乳色問云乳色何似答色白如貝又問乳色如貝聲耶答不也又問貝色何似答如稻米粖又問乳色柔軟如稻米粖耶又問米粖何似答如雨雪又問彼米粖冷如雪耶雪復何似答如白鵠是盲人雖聞此四喻終不識乳真色僻説者宣傳為説聖意惟智人能契非師心者好用偏僻之意而説如香象所負非驢所堪不知佛意經意妄解妄説者皆是上標下釋非法説法法説非法非犯説犯犯説非犯輕罪説重重罪説輕先釋僻説句法是世出世間之正法非法是世出世間之邪法非犯如維摩除疑等説犯如優波離説二比丘犯淫殺不容懺等重即律中四棄八棄十波羅夷等輕即律中三十尼薩耆九十波逸提乃至四十八輕等今用懺力滅罪故將邪正輕重等對顯若大智之極豈真有是非于其間哉西天九祖云真理本無名因名顯真理受得真實法非真亦非偽或抄前著中恕反後抄後著前前後著中中著前後次明身意共造釋邪解句如律中前篇至重中篇稍輕稍重後篇純輕邪解者妄以己意混亂置之也抄謄寫也著定也此四句出大經綺飾文詞安置己典以巧言安錯經典不論邪正結上文安置即著字法下接列三對以釋之初説聽對或為利養名譽恭敬為人説法無道德心求法師過而為論義非理彈擊不為長解求出世法三寶積經開二縛一見縛二利餘縛文中無道德心為利養等即是二縛具此二者被生死魔縛而不能脫也法師具十義大經云一為大施主大法之師二知法故三知義故四知時故五知足故六知我故七知大衆故八知衆生種種性故九知諸根利鈍中故十説中道故又法中有宗即是宗師須具三眼一教眼謂明識權實大小之法二道眼謂親踐諸行修證之門三宗眼謂深窮圓頓即具之旨若反求法之過師之謬以為善論義則非也所以寶積經開二癡瘡一見求他過二自覆己過論義者如昔智者佛陀難提欲與七祖婆須密論義祖曰仁者論即不義義即不論若擬論義終非義論難提知師義勝心即欽服非理彈擊言非理義之彈擊如云見或彈謗我法等不為長音丈解者不求超方勝妙之見解為邪見自縛也大經云寧當少聞多解義味不須多聞于義不了願作心師不師于心或輕慢佛語尊重邪教毀呰大乘讚聲聞道二邪正對佛語是正法外道法是邪教大經云佛昔聞諸行無常是生滅法半偈心生歡喜如估客夜行失伴還遇如久病遇良醫好藥如沒海遇船如渴人遇清水如兵逐得脫如久繫得出如炎旱值雨如行人還家家人見之共生歡喜半偈尚爾況全經乎三大小對呰音子口毀也毀讚根顛倒心生故毀讚皆不宜也須知三處不應轉法輪一我慢高山輕慢佛語是二五欲淤泥利養名譽等是三邪見稠林尊重邪教是如是等罪無量無邊皆悉懺悔總結懺法間罪障竟下第三別懺僧間罪障又復無始以來至于今日或於僧間有障殺阿羅漢破和合僧害發無上菩提心人斷滅佛種使聖道不行分五節一僧間有障總標下釋弒下害上也阿羅漢含三義一殺賊二應供三無生五分律云調達不能害佛欲破和合僧佛語達曰若僧已破能和合者其人生天若僧和合而破之者墮地獄中害發菩提心人是滅佛之種子破諸魔經云菩提有三種若人發菩提心但樂自求解脫名聲聞菩提又雖發菩提心于大乘法不樂修習但起心念觀諸緣法隨所觀察而行名緣覺菩提若人發無上菩提心已復勸他人發于心輪回身不生厭倦樂利衆生皆令解脫以己善利普施一切名無上菩提阿毗曇心論云弒父母棄背恩義故墮無間餘三壞福田故亦墮無間或剝脫道人鞭拷沙門楚撻軀使苦言加謗二剝脫去其衣也道人辦道之人也沙門此云勤息勤修戒定慧息滅貪嗔癡識心達本源故號為沙門韃拷楚撻皆捶打之類苦口加謗者大經云人有妒心則有誹謗若無妒心云何有謗謗口即惡知識也經云見他有過不説其短口常宣説純善之事名善知識或破淨戒及破威儀或勸他人捨于八正受行五法三大經云戒者即是遮制惡法若不作惡是名持戒四八正即八正道釋現前五法者即涅槃五種世法也謂名世如男女瓶衣車乘屋舍等句世四句一偈等縛世捲合結束合掌等法世鳴椎集僧嚴鼓誡兵吹貝知時執著如望遠人見染衣想是沙門繩橫身上想是婆羅門是名世諦五法於此五法心不顛倒是名第一義諦或假託形儀窺竊常住如是等罪今悉懺悔五窺覬望也如是下結或裸音魯露身形輕衣搪𠊲在經像前不淨腳履踏上殿塔此總明三寶間餘障二一裸赤體也赤形露體謂之裸露小衣輕跳謂之搪𠊲比丘不著三衣禮拜皆是經像即法與佛也不淨腳腳之不淨者不淨履鞋之穢汙者上登也殿是供佛像處塔是供佛舍利處可以不淨腳履登之乎或著屧屐入僧伽藍涕唾堂房汙佛僧地乘車䇿馬排揬寺舍凡如是等於三寶間所起罪障無量無邊今日至禱南藏作誠向十方佛尊法聖衆皆悉懺悔二屧音雪是無跟涼履拖鞋屐是高底履或泥屐也經云著屐見佛生馬蹄國僧伽藍此云衆園清淨衆所居之處也排揬推排衝揬言輕觸也凡如下總結懺悔滅罪竟下發願成德願承是懺悔佛法僧間所有罪障生生世世常值三寶尊仰恭敬無有厭倦天繒妙綵衆寶纓絡百千伎樂珍異名香華果鮮明盡上聲世所有常以供養分四節一竭誠供養厭倦言心生厭惡而身懈倦也大經云菩薩常以衣服等四事香華燈明施人以是因緣得身金色常光明曜佛過鸚鵡林蟲銜華請佛佛受其請住林中七日佛住鷺鸞池衆鳥呈祥供養佛坐深山獼猴取巖蜜供養蟲鳥獼猴尚爾況人類不興供養以祈福乎盡有二義一富貴則盡世所有有即須求貧窮則盡力所及及則須覓不定少多之物貴在竭盡其心若有成佛先往勸請開甘露門二勸請説法大經佛為母處忉利天波利質多樹安居説法頻婆娑羅王波斯匿王及四部衆白目連速至彼天請佛還來説法開甘露門即轉法輪也甘露是不死藥食之長主喻得佛法即證不生不滅常住之法門通出入義出生死海入佛法門若入涅槃願我常得獻最後供三伸最後供問諸佛何故必于二月涅槃答二月春陽之月萬物生長種植根栽華果敷榮江河盈滿百獸孚乳是時衆生多生常想為破常想説一切法悉是無常又問何故必于十五夜答是夜月無虧盈故更有十餘事詳如中卷初釋世尊拈華迦葉微笑佛言吾有正法眼藏涅槃妙心實相無相之法付囑云法本法無法無法法亦法今付無法時法法何曾法波旬請云瞿曇弟子所作已辦當入涅槃答吾日後向拘尸那城娑羅雙樹間當取滅度獻最後供者經律異相云佛臨滅拘尸城工巧之子名純陀泣白世尊我等從今無主無救貧窮孤苦欲從佛求將來食惟願哀受我等微供然後涅槃佛言我今為汝斷除貧窮以無上法雨雨汝身田令生法芽令汝具足檀波羅蜜純陀號泣復白大衆同共禮勸佛莫涅槃佛告純陀諸佛法爾有為亦然速辦所施不宜久停是時天人皆來奉供佛悉不受大衆唱言善哉純陀成就大福我等供具則為唐捐佛欲滿衆望一一毛孔化無量佛一一諸佛各有無量諸比丘悉皆受供釋迦自受純陀所設食滿百斛以佛神力充足一切大衆明始終二事也於衆僧中修六和敬得自在力興降三寶上弘佛道下化衆生四明中間事願成就衆僧者唐梵雙標取文詞穩順令人易解六和者一身和同住二口和無諍三意和同悅四戒和同修五見和同解六利和同均修此六和非敬弗得故云修六和敬古云無不敬是也佛法速滅有五因緣比丘不敬三寶及戒定故正法不得久住梵語僧伽此云衆和合若衆而不和如羣商羣吏軍衆等若和而不衆如二人同心等不名僧寶衆而和合是福之因方名僧寶上弘佛道是自利大智為先下化衆生是利他大悲為首二利兼行便是菩薩如上所説於三寶間輕重諸罪皆已懺悔其餘諸惡今當次第更復懺悔先結前其餘下起後如上所説有所未盡故言其餘經中佛説有二種健兒一者自不作罪二者作已能悔又云有二種白法能為衆生滅除衆障一者慚自不作惡二者愧不令他作健勤勇無間意自強不息也又云大經説也白者潔白純淨之謂對治黑業如十使十惡等是黑業受四惡報五戒十善四禪八定等為白業受人天三乘摩訶衍報四聖又隱過天眼見者須自慚顯過人所見者須愧他令教也有慚愧者可名為人若不慚愧與諸禽獸不相異也是故今日至誠歸依於佛如法懺悔前連引經證此懺主出意作結下廣明從無慚愧中流出諸業文七某甲等自從無始以來至于今日或信邪倒見殺害衆生解奏魑魅魍魎鬼神欲希延年終不能得或妄言見鬼假稱神語如是等罪皆悉懺悔一邪倒見章解音戒聞上也奏進上也魑魅大力鬼也老物之精山澤之怪魍魎不明真如一心者由不明真如自性故曰魍不了唯是一心故曰魎希冀也妄言見鬼神語如關亡捕鬼童子女巫附體關仙亂語之類借彼欲冀長生非但不得益算之願抑且難免地獄之苦又復無始以來至于今日或行動慠誕自高自大或恃種姓輕慢一切以貴輕賤用強陵弱或飲酒鬬亂不避親疏惛醉終日不識尊卑如是等罪今悉懺悔二慠誕章𭝟慠妄誕不但存于心且施于四體故曰行動自己空腹高心眼空四海耳恃種姓者倚賴種族之尊勝也貴輕賤強欺弱衆暴寡皆出于慠而不敬誕而不謙也飲酒者經云過失無量但過酒器與人招五百世中無手之報況自飲及教人飲乎三十六失如上卷所明今文略具如云鬬諍之本致病之根無故捶打奴僕橫殺衆生姦淫他妻偷人財物不孝父母疏遠善人常懷恚怒日夜憂愁不敬三寶輕慢師長如次配看可曉或嗜飲食無有期度或食生鱠或噉五辛薰穢經像排揬淨衆縱心恣意不知限極疏遠善人狎近惡友如是等罪今悉懺悔三飲食無節章鱠細切肉也五辛梵網云一大蒜二茖蔥即韭薤三慈蔥即家蔥四蘭蔥即小蒜五興蕖即胡荽食辛有五過出楞嚴經一多過熟食發淫生噉增恚二天遠縱能説法諸天遠離三鬼近鬼舐唇吻常與鬼住四福消福德日消長無利益五魔集魔來説法非毀禁戒排揬淨衆者五辛氣臭既薰穢佛法亦搪揬淨業善友縱心二句出無有期度之意疏遠二句出嗜飲食之由或貢高矯假偃蹇自用跋扈抵揬不識人情自是他非希望僥幸如是等罪今悉懺悔四以劣覬幸自矜才能而慠物曰貢高強力縱偽以欺人曰矯假偃蹇左傳云驕慠也自高自大貌跋扈猶強梁也水邊居者于水未至時作竹籬候魚魚入水退小魚獨存大魚跳跋籬扈而出明恃強自逞也抵觸也揬即搪揬總是不順理意希望者希冀瞻望德澤也僥求也幸謂不當得而得者或臨財無讓不廉不耻屠肉沽酒欺誑自活五無廉耻章臨財無讓言爭先取也見得思義乖傷于廉潔可知羞耻之心何有自與盜戒近矣次酒肉一對屠肉犯殺戒沽酒犯不飲戒詳如梵網及前釋中次心口一對欺出于心誑施于口借此二惡以求自活或出入息利計時賣日聚積慳尅貪求無厭受人供養不慚不愧與上臨財節成自它一對放債盤折算子母錢名出入息利本能生利如父母能生子故云息放債取利月不過五等是計時賣日適所以滋潤貪心故云尅積貪求無厭平聲者求謀不已也左傳虞叔有玉虞公求之獻之又求其寶劒虞曰是無厭也大經云供僧即供三寶人隨佛語即供養佛為解脫故即供養法衆僧受者即供養僧或無戒德空納信施如是等罪今悉懺悔全無淨戒之德虗受信心之施結上淫殺盜妄飲酒欺誑自活皆無德也或捶打音頂奴婢驅使僮僕南藏作吏不問飢渴不問寒暑或伐撤橋梁杜絶行路如是等罪今悉懺悔六家鄉對打直觸也周禮十五成僮婢妾之總稱日有飢渴歲有寒暑不問其情諒其力役使之可乎夫奴僕人子也為主者應以育子之心惜之為僕者亦應以事父之心事主自各得其情也今者非使負恩便是主人太過噫反徵其剩將若之何於里巷中或伐除大橋以阻衆撤去小梁以截行杜塞也塞通衢絶行路也無論城鄉道路或磚瓦堆地或草長覆路使長幼不便於行馳霑衣濕襪破履戕靴皆所不宜凡動人心事決不可為或放逸自恣無記散亂摴蒱圍棊羣會屯聚飲食酒肉更相擾餞無趣談話論説天下七內外對放逸招報大經云放逸有十三果報一樂作世間業二樂説無益語三常樂睡眠四樂説世間事五常樂親近惡友六常樂懈怠懶惰七常為訓被他人所輕八雖有所聞尋復忘失九樂處邊地十不能調伏諸根十一令不知足十二不樂空寂十三所見不正外放逸內自恣也無記昏昏時散亂非善即惡時摴蒱即雙陸老子作之用卜今人擲之為戲也圍棊大棊也堯造以教子丹朱舜仍以教子商均其法具方圓動靜非智者不能也孔子云不有博奕者乎為之猶賢平巳皮日依云有害詐爭偽之道不飲戒有三等上不過過傳途也酒器與人中不教人飲下不自飲食肉有十過一覽云一衆生本是六親二食肉人衆生見即驚怖三壞他信心四慈心薄少五增惡羅剎習氣六令學呪術不行七衆生身命於己無別八諸天賢聖遠離惡神恐布九不淨所出十死墮惡道擾客擾主也餞主送行客也廣酌酒食途人曰餞從年竟歲空喪天日初中後夜禪誦不修懈怠懶惰尸臥終日初中後日分是晝三初中後夜分是夜三所謂日不足繼之以夜也遺教經云晝則勤心修習善法無令失時初夜後夜亦勿有廢中夜誦經以自消息無以睡眠因緣令一生空過無所得也禪具云禪那此云息寂息慮忘緣直究自心頓悟無生也誦者持呪誦經念佛等是也因不修習而墮昏沉散亂二病中豈非空喪天日虗延歲月乎尸臥如死尸僵臥於清晝豈不聞孔子責宰豫乎於六念處心不經理見他勝事便生嫉妒心懷慘毒備起煩惱六念專心繫想曰念出大經念佛是慈悲導師又具相好功德及願成佛身念法是三世佛母修行軌則能除結使及願轉法輪念僧是人天福田具種種功德及代佛開化衆生念天是常壽安樂具諸善業感報勝身及滿天中天一切種智念戒是清淨身心能息諸惡成就道品及滿諸願念施普濟貧窮能破慳貪生長福果及捨諸煩惱心不經理者心不干此六者經歷料理一任懈怠毫無警醒勝事即參禪聽教持戒念佛等不行助揚而反嫉妬是忘本也備起煩惱無惡不作也致使諸惡猛風吹罪薪火常以熾然無有休息三業微善一切俱焚善法既盡為一闡提墮大地獄無有出期是故今日至禱稽顙向十方三寶皆悉懺悔諸惡即煩惱所造之業不出十惡等煩惱狂風吹罪惡薪火微善不出五戒十善惡興則善喪故曰俱焚一闡提此云信不具亦云退沒善心是故下結上南藏作向來所有一切衆罪若輕若重若粗若細若自作若教他作若隨喜作若以勢力逼迫令作如是乃至讚歎行惡法者今日志坊本作至誠皆悉懺悔總結上文輕如微善惡等重如闡提墮大獄等餘可解總申懺悔竟下發願成德願承是懺悔一切諸惡所生功德生生世世慈和忠孝謙卑忍辱知廉識耻先意問訊慈翻前第一節殺害衆生等第三節食生鱠等第六節捶打驅使僮僕等第七節食肉擾餞嫉妒勝事等和翻前第二節慠誕輕慢鬪亂等第四節跋扈抵揬第七節慘毒備起煩惱等忠翻前第一節妄言見鬼等第五節欺誑自活等第六節撤橋杜路等孝與上慈義同謙卑者道生于卑退德生于安和經云謙下諸比丘遠離自高心翻前第二節慠誕自高大輕慢等第三節排揬淨衆等忍辱翻前第二節鬪亂不避親疏等知廉翻前第一節解奏等第四節希望僥幸等第五節臨財無讓不亷等先意問訊華嚴離世間品菩薩有十種手中第三先意問訊手舒展右掌相迎引故此謙卑義也循良正謹清潔義讓遠離惡友常遇善緣收攝六情守護三業捍勞忍苦心不退沒立菩提志不負衆生循順良善也正是端正謹是謹慎清潔則不貪汙義讓則臨財不苟得也遠惡友翻前第三節狎近惡友文常遇善緣翻前諸惡猛風吹罪薪火熾然微善俱焚等收攝六情情識也眼等六識不攀緣六塵翻前六念不經心文守護三業不縱十惡翻放逸自恣等捍勞忍苦捍是勇猛精進之謂翻前懈怠懶惰等立菩提志即發菩提心發心必度生故不負坊本作荷負非發願已歸命禮諸佛結前生後南無毗盧遮那佛南無本師釋迦牟尼佛南無阿彌陀佛南無彌勒佛南無龍種上尊王佛南無龍自在王佛南無寶勝佛南無覺華定自在王佛南無袈裟幢佛南無師子吼佛南無文殊師利菩薩南無普賢菩薩南無大勢至菩薩南無地藏菩薩南無大莊嚴菩薩南無觀自在菩薩禮諸佛已次復懺悔結前起後向來已懺悔煩惱障已懺悔業障所餘報障今當次第披陳懺悔先雙結二障所餘下生後果報中地獄至修羅四惡道及人中天中無量餘報皆次第懺悔大經云餘報有三一煩惱餘報若人習近貪欲報熟則墮地獄獄出受畜生身鴿雀鴛鴦鸚鵡青雀魚鱉獼猴麞鹿是也得人身則受黃門女人二報無根設得出家犯初重戒若人以殷重心習近嗔恚報熟墮獄獄出受畜生身毒蛇師子虎狼鷹鷂等是也若得人身具足十六諸惡律儀設得出家犯第二重戒若有修習愚癡報熟墮獄獄出受畜生身象豬牛羊蚤虱蚊蟲等形得人身則聾盲瘖啞癃殘背僂諸根不具不得受法設得出家諸根暗鈍喜犯重戒乃至五錢若習憍慢報熟墮獄獄出受畜生身糞蟲駝驢大馬設生人中愛奴婢身貧窮乞丐設得出家為人輕賤破第四戒如是煩惱餘報唯修集大涅槃故悉得斷除除已則餘業皆淨披開也陳列也憶先所犯以求懺也經中説言業報至時非空非海中非入山石間無有地方所脫之不受報唯有懺悔力乃能得除滅此引婆羅門避死經偈也佛言罪有二種一者業障二者報障若具此二則不受化昔兄弟四人學仙各得五通自知壽盡以通力避死一涌空中藏形一入大海三百六十六萬里下不至底處于其中一劈山隱形石間自謂無常對來無從而覓一匿之地中然俱不免死入空者墮地如果熟落入海者死為魚噉如餌墮河隱山者死為獸吞如鳥餧鷹入地者死時如剎竽倒佛既觀知謂此四人欲捨宿對三毒未除安免此患兩藏皆石字有改石為市恐誤耳受報報字本經是業字方即所向之方古德云道無方所明之在人法離見聞斷之在智蓋業報與道相反亦應云業報無方所脫之在人法離縛解燭之在智何以知然釋提桓因五衰相現恐懼切心歸誠三寶五相即滅得延天年如是等比經教所明其事非一涅槃云諸天五衰謂頭上華萎腋下汗出下染裳垢身體臭穢不樂本座此大五衰必死之相又俱舍云衣服絶香身光忽滅浴滴沾身本性囂馳兩目眴運此小五衰遇勝緣猶可解非定死相觀得延天年語必是小五衰釋提桓因此云能作天帝釋也大經云天上雖無大苦惱事然其身體柔軟細滑見五相時極受大苦與地獄無別譬喻經云有帝釋天五德離身自知福盡甚大憂愁念三界中唯佛救苦特到佛所時佛正入普濟三昧帝作禮伏地志心三歸佛法僧衆未起之間其命忽出便入陶家驢母腹中時驢自解走瓦坯間踐壞坯器主怒打之尋時傷胎其神復返還為天帝佛三昧覺讚言善哉能于殞命之際歸命三尊罪對已畢更不勤苦佛為説法得須陀洹道比音閉輩也類也事非一有一一經法所明不止一種二有懺不懺之別故故知懺悔實能滅但凡夫之人若不值善友獎導則靡惡而不造致使大命將盡臨窮之際地獄惡相皆現在前當爾之時悔懼交至不預修善臨窮方悔悔之於後將何及乎此節至文盡皆䇿發激勵之辭必先自知業障懺而滅之得免諸難先結前能懺之益但凡下次明不近善知識之害獎導者獎勸引導也靡惡不造言無惡不作自種苦因也致使下明自受苦果當命盡獄惡現時懊悔作惡心怖懼獄苦心互發故曰交至預先也先辦善業也後悔無及立下文張本殃福異處宿預嚴待當獨趣入到地獄所但得前行入於火鑊身心摧碎精神痛苦如此之時欲求一禮一懺豈可復得此勸人先懺免于後悔也殃福罪福也處上聲受也善惡因異苦樂報殊也宿預猶言預先也纖毫不恕曰嚴定欵以俟罪人之來為待獨字與自作自受呼應趣平呼説文走也行而張足也火鑊苦具也摧折挫也僧問趙州古澗寒泉時如何答苦飲者如何答死雪峰聞之云趙州古佛遂遙作禮若如此苦如此死當快樂無量若不能至此應先懺之衆等莫自恃盛年財寶勢力懶惰懈怠放逸自恣死苦一至無問老少貧富貴賤皆悉摩滅奄忽而至不令人知若自恃盛年無諸病苦可以自適不勤懺悔倘無常忽至後悔無益先賢云莫待老來方學道孤墳盡是少年人金剛經一切有為法四句偈當深未之摩滅消滅也奄上聲遽也奄忽猶倏忽也卒然而至孰令人知既不問少則盛年不足恃不問富則財寶不足賴不問貴則勢力不足尚少年富貴尚爾况老而貧賤者乎猶宜急急預懺與性命競可也問大智慧人亦有地獄分否答有如調達謗佛生身入獄佛令阿難問在獄中安否答我雖在獄如三禪天樂佛又令問你還求出麼答我待世尊入獄方出阿難言佛是三界大師豈有入獄分曰佛既無入獄分我豈有出獄分夫人命無常喻如朝露出息雖存入息難保云何忽此而不懺悔但五天使者既來無常殺鬼卒至盛年壯色無得免者晨朝之露遇日即無豈真常久云何二字懺主痛責之辭五天婆沙論云自四天王已下有日月天星宿天常憍天持鬘天賢首天此五奉天所敕為使者冥司所遣為殺鬼卒至卒然而到也與奄忽而至呼應盛年必有強壯之色與自恃盛年勢力照應當爾之時華堂邃宇何關人事高車大馬豈得自隨妻子眷屬非復我親七珍寶飾乃為他玩以此而言世間果報皆為幻化古云三寸氣在千般用一日無常萬事休縱有堂宇車馬與我何干人亦自也迷人不悟不思解脫反生貪戀更增苦本妻非親者古語云夫妻一似同林鳥大限來時各自飛七珍金銀珠玉珊瑚琥珀等無常經云眷屬皆捨去財貨任他將但持自善根險道充資糧言惟善業可持也人間果報如妻孥七寶等是幻是化反顯地獄果報非幻非化能令精神痛苦他不能代幻者西域幻術依草木等幻作人畜似有往來動作之相須臾法謝還成草木法喻各開五法喻中五者如結一巾幻作一馬一所依巾二幻師術法三所幻馬四馬有即無五癡執為馬法中五者一真性二識心三依他起四我法即空五迷執我法一切世間有為之法無不皆然故為幻化天上雖樂會歸敗壞壽盡魂逝墮落三途是故佛語須跋陀言汝師頭藍弗剎根聰明能伏煩惱至於非非想處命終還作畜生道中飛狸之身況復餘者語告也梵語須跋陀羅此云好賢唐言善賢梵語頭弗此云猛喜又云極喜仙人名也智度論云陀羅伽仙人得五神通飛到王宮王夫人接足而禮夫人手觸即失神通從王求車駕而出更修五通一心專志因鳥鳴亂意轉詣水邊求定復聞魚鬪即生嗔恚曰我當盡殺魚鳥此人久後得道生非非想天後彼壽盡下生報為飛狸殺諸魚鳥作無量罪墮三惡道狸之伎倆止能殺魚且為飛狸併殺飛鳥以遂其惡致墮惡道傳曰鬱頭藍弗以世俗智伏下地惑獲非想定具五神通時君尊敬延入宮掖女子接足而禮藍弗觸女子手遂生貪欲便失神通飯食訖徐步歸山故偈曰才生一念欲便失五神通故佛臨涅槃告阿難言吾未成佛示八鬱頭藍弗外道法中修學四禪八定吾成佛來毀訾其法天福受盡還墮畜生荊溪云不知牛等於彼業謝德勝因牽生於人天須跋陀問佛云何能斷一切諸有答觀實相人能斷諸有無相之相名為實相即一切法無自相他相共相等故知未登聖果已還皆應輪轉備經惡趣如不謹慎忽爾一朝親嬰斯事將不悔哉聖果即無上涅槃妙果也三界俱未登聖果于人身修十善下品十善生人趣中品十善非定相應生欲天上品十善與四禪定相應生色界天與四空處定相應生無色界天嬰受也下文引小喻大如今被罪行詣公門已是小苦情地慞惶眷屬恐懼求救百端地獄衆苦比于此者百千萬倍不得為喻陽間公門小苦尚知可畏地獄衆苦有無量倍而反不畏豈非大愚癡哉詣到也自己情地慞惶纍彼眷屬恐懼巧計百出以求救援意在免難況劇苦之地獄乎下呼衆責結衆等相與塵劫以來罪若須彌云何聞此安然不畏不驚不怖令此精神復嬰斯苦實為可痛是故志誠求哀懺悔罪若須彌言深重也須彌此云妙高四寶所成超出羣峰故預思精神受苦生痛如思踏懸崖足心酸澀令此等三句與前行人人於火鑊精神痛苦呼應大經云一切衆生若具五事令現輕報轉地獄受一愚癡二善根微少三惡業深重四不懺悔五不修本善業詳如經説上言罪報必不可免須懺力除滅下懺地獄中一切惡相惡報懺所餘報障竟下懺第三報障四先懺地獄罪報某甲等從無始以來至于今日所有報障然其重者第一唯有阿鼻地獄地獄衆苦説不可盡至于阿鼻猶為極重阿此云無鼻此云遮又阿此云無鼻此云救合言無遮無救即無間地獄也下正説其中惡相惡報阿鼻獄乃八大獄之一謂斬活黑繩石磕叫喚大叫喚焰熱大焰熱此七各濶五百由旬壽千歲唯阿鼻三十二萬里壽二萬歲俱治第一根本極重罪謂弒父母弒阿羅漢破和合衆逼姦淨尼出佛身血阿鼻以人間六十小劫為一晝夜第一重故謂之獄王因本經佛告諸比丘于四大洲八萬小洲諸餘大山須彌山王之外有山名鐵圍高六百八十萬由旬縱廣亦爾彌密牢固金剛所成難可破壞此鐵圍外復有一重大鐵圍山高廣正等兩山之間極大黑暗無日月光明有八大地獄謂等活斬刺磨搗次活等前黑繩地獄以黑繩綳量後方鋸解衆合地獄苦具衆至合黨相殘嘷叫地獄衆苦所逼悲號發聲大叫地獄極苦所逼大叫稱怨炎爇地獄炎逼身轉極苦難堪極爇地獄內外自他身出猛火互相燒害阿鼻地獄趣果受苦時命及形五皆無間此八大地獄各各復有十六小地獄周匝圍繞而為眷屬皆縱廣五百由旬謂飢餓地獄銅釜地獄多銅釜地獄石磨地獄膿血地獄量灰地獄鐵丸地獄灰河地獄斤斧地獄豺狼地獄劒樹地獄寒氷地獄黑沙地獄沸屎地獄鐵釘地獄燋渴地獄除上八大獄復有十次地獄文長不録又有孤獨地獄在閻浮諸處或曠野山間或海畔廟中有八萬四千座苦報轉經壽亦不定所攝有情上下品十惡來生其中上明根本地獄如州司牢獄邊處地獄如縣道牢獄孤獨地獄如場鎮鎖杻之類如經所明今當略説其相此獄周匝有七重鐵城復有七重鐵網羅覆其上下有七重鐵刀為林無量猛火縱廣八萬四千由旬罪人之身遍滿其中如經所明如上所引者略説其相分十小節初明六方之固二縱廣下明獄相之大直為縱橫為廣由旬此云限量如此方之驛大者八十里中者六十里小者四十里為一由旬數定八萬四千者由違八萬四千法門入塵勞門故感此報由五根偶五塵時有內外煩惱各五百成一千七支各一千成七千入三世説成二萬一千又約貪嗔癡等分成八萬四千三罪人下明形量無間所謂一人亦滿多人亦滿故曰遍又曰滿也罪業因緣不相妨礙上火徹下下火徹上東西南北通徹交過如魚在𨫼脂膏皆盡此中罪苦亦復如是四釋妨大經云智者觀地獄苦自一地獄乃至一百三十六獄一一獄有種種苦皆是煩惱業因緣生次觀鬼畜等苦乃至人天所有諸苦皆從煩惱業因緣生五上火下重明無量猛火義共六句出大經十九下上呼底也六如魚下引喻明受苦之相六方俱猛火罪人入中如魚入鏊形質焦枯如魚脂盡此中下法合其城四門有四大銅狗其身縱廣四千由旬牙爪鋒長眼如掣電復有無量鐵嘴諸鳥奮翼飛騰噉罪人肉牛頭獄卒形如羅剎而有九尾尾如鐵叉復有九頭頭上十八角角有六十四眼一一眼中皆悉迸出諸熱鐵丸燒罪人肉然其一嗔一怒哮吼之時聲如霹𮦷七獄中異物三一大銅狗其狀可畏掣電言狗兩眼之光東西照掣如閃電然二多鳥加害奮勇也發憤騰躍之勢三明獄卒形聲可畏迸音崩去聲涌也哮吼震怒聲如虎之咆哮師子之振吼或時頓發嗔聲如晴空霹𮦷復有無量無邊刀輪空中而下從罪人頂入從足而出於是罪人痛徹骨髓苦切肝心如是經無數歲求生不得求死不得如是等報今日時本無此二字皆悉稽顙慚愧懺悔八明苦具無間九如是下明時無間十求生二句明命無間如是下總結上文懺阿鼻獄報竟下文懺其餘諸獄與楞嚴經十因六報大同文繁不引次復懺悔刀山劒樹地獄身首脫落罪報懺悔鑊湯爐炭地獄燒煮罪報懺悔鐵床銅柱地獄燋然罪報此第三章計二十一小節十習中嗔習之所招感也一劒樹十六遊增之一二鑊湯即一多銅釜之類六交報中見火所感也三然燒也燋然燒之至於燋黑不燋不已也懺悔刀輪火車地獄劈礫音力罪報懺悔舌犁耕地獄楚痛罪報懺海吞噉鐵丸煬銅灌口地獄五內消爛罪報懺悔鐵磨地獄骨肉灰粉罪報四劈破也礫小石也研碎義五楚痛苦楚痛極也六五內心肝脾腎肺五藏也始則紅爛終則消落由吞熱鐵丸熱銅汁故七磨骨作粉嗔習使然懺悔黑繩地獄肢節分離罪報懺悔灰河沸屎音始地獄惱悶罪報懺悔鹹水寒氷兩藏作冰地獄皮膚拆裂裸凍罪報懺悔豺狼鷹大地獄更相殘害罪報八以黑色繩牽扯如世間分尸之類離散也即八熱之一九沸屎滾沸之屎氣熱且臭苦惱迷悶由其生平以公威勢力富貴逼人既受臭名又氣悶報十平生多恃或呰嫌人冷淡人乃至㓟剝牛羊及剝奪人衣等業所致十一或豺害犬犬害豺等故云互相由嗔習互相加害所致懺悔刀兵距爪地獄更相搏音博撮斫音酌刺音七罪報懺悔火坑地獄炮炙罪報懺悔兩石相磕地獄形骸碎破罪報懺悔衆合黑耳地獄解剔罪報十二凡刀鋒倒刺曰距如雞距鷹爪之類搏手擊也撮捎取也或以刀斫或以兵刺如歷聽能為利兵刃之類十三可知十四磕音渴石相築聲也十五衆合者苦具衆至合黨相殘也八熱中之一黑耳者因衆合故無纖毫之空竅故耳目皆黑暗也解是鋸解剔或箭剔懺悔暗冥肉山地獄斬挫罪報懺悔鋸解釘身地獄斷截罪報懺悔鐵棒倒懸地獄屠割罪報懺悔燋熱叫喚地獄煩冤罪報懺悔大小鐵圍山間長夜冥冥不識三光罪報懺悔阿波波地獄阿婆婆地獄阿吒吒地獄阿羅羅地獄十六挫折傷也十七釘去呼斷音短十八儒書猶解倒懸目連中元節盂蘭盆為此作也十九燋熱即炎熱獄叫喚即嘷叫大叫二獄乃八熱中之三煩多也冤屈也出報恩經二十大小兩鐵圍山中間黑暗無三光故自上之下諸獄受苦不同皆有牛頭獄卒馬面夜叉等各以大力追逐袪逼由己業力所招非天降人與應預知之莫自迷也二十一波波婆婆吒吒羅羅俱寒獄中忍寒聲如是八寒八熱一切諸地獄中復有八萬四千鬲子地獄以為眷屬總結八寒獄一頞部陀二尼剌部陀此二從寒逼身皰裂立名三頞折吒四嚯嚯婆五唬唬婆此三從寒苦發聲立名六嗢鉢羅七鉢特摩八摩訶鉢特摩此三從身裂如三種蓮華立名一青蓮二紅蓮三大紅蓮此為八寒獄無遊增八熱獄解見前此八獄各有四門門各有四獄謂煻煨尸糞鋒刃烈河增也獄有十六八獄計有一百二十八皆名遊增有清遊彼其苦更增故名遊增連八大獄成一百三十六座自行十惡五逆感八大獄苦教他行惡逆感十六眷屬遊增獄八萬四千者由八萬四千塵勞所致也眷屬同類之稱謂八寒八熱大獄中總有一百二十八遊增獄此中又有八萬四千鬲子地獄與大獄相為表裏互為分屬合此衆苦而成大獄故曰眷屬大小獄相合而成如人之有大小眷屬也悲夫人間五百歲地獄為一晝夜壽命一千歲則無始已來經生父母倘受重罪者竟不知其幾許矣小獄尚然況阿鼻獄王人間六十小劫為一晝夜壽命二萬歲受苦何窮更歷叵思議時思之痛哉此中罪苦炮煮楚痛剝皮刷肉削骨打髓抽腸拔肺無量諸苦不可聞不可説南無佛指獄中劇苦不可聞説先合掌歸佛也刷音攝刮也經云念佛一聲滅八十億劫生死重罪懺主稱南無佛極悲地獄衆生由無始惡業因緣致此苦報我等見此極應內省所以下文總申懇禱向佛發露懺除離苦得樂也今日在此中者或是我等無始以來經生父母一切眷屬我等與彼命終之後或當復墮如此獄中今日洗心懇禱叩頭稽顙向十方佛大地菩薩求哀懺悔令此一切罪報畢竟消滅同衆滅罪也此中地獄中也與彼偕諸同志善友也洗心叩頭哀悔三業精誠也問為獄衆説何法答應説罪性本空不在內外中間令其一念頓超十地懺地獄等報竟願承是懺悔地獄等報所生功德即時破壞阿鼻鐵城悉為淨土無惡道名其餘地獄一切苦具轉去呼為樂緣刀山劒樹變成寶林鑊湯爐炭蓮華化生牛頭獄卒除捨暴虐皆起慈悲無有惡念地獄衆生得離苦果更不造因此發願離苦得樂也餘地獄即十六獄乃至眷屬獄也苦具加苦之器具也轉為變成也刀山四句即苦是樂牛頭下即暴虐念是慈悲心也在獄衆生既離苦再不造獄因也上明離苦竟下明得樂等受安樂如第三禪一時俱發無上道心懺悔已至心信禮常住三寶等受齊等而受也離喜妙樂為三禪一少淨天二無量淨天三遍淨天人間最樂無有及者無男女淫欲以禪悅為食者發無上道心即發無上正等正覺心也一時頓發言在獄在壇者同時齊發也懺悔下結前起後可知南無毗盧遮那佛南無本師釋迦牟尼佛南無阿彌陀佛南無彌勒佛南無龍種上尊王佛南無龍自在王佛南無寶勝佛南無覺華定自在王佛南無袈娑幢佛南無師子吼佛南無文殊師利菩薩南無普賢菩薩南無大勢至菩薩南無地藏菩薩南無大莊嚴菩薩南無觀自在菩薩禮諸佛已次復懺悔已懺地獄報竟今當復次懺悔三惡道報文中兩重結前起後懺除果報中三惡道報畜生餓鬼修羅并前地獄成四報者酬其往因也下引經總明分五節經中佛説多欲之人多求利故苦惱亦多知足之人雖臥地上猶以為樂不知足者雖處天堂猶不稱意一知足不知足對顯處安居也稱遂也欲即五欲不稱意愈求愈得愈不足也心地觀云若有少欲能知足者應當安住阿蘭若處大經云知足之行諸佛所讚應終身歡喜奉行師子吼問佛少欲知足有何差別答少欲者不求不取知足者得少不悔不求未來所欲之事是少欲得而不著是知足不求恭敬是少欲得不積聚是知足更有四句料簡詳如經説又遠離一切世間之事名少欲既出家已不生悔心名知足既知足已近空間處是名寂靜不知足者不樂空間夫知足者常樂空寂端坐不臥或樹下或冢間或露處隨有草地即坐其上乞食而食隨得為足或一坐食不過一食唯蓄三衣糞衣毳衣是名少欲既行是事心不生悔是名知足如是行者迦葉其人也但世間人忽有急難便能捨財不計多少而不知此身臨於三途深坑之上一息不還便應墮落二約生死對顯出慳吝之苦報三途火血刀也地獄是火途從熱得名畜生是血途從互相吞噉得名餓鬼是刀途從刀杖驅逼得名坑古作坑陷也與煩惱障中深坑險趣及被罪行詣公門求救百端比地獄苦百千萬倍不得為喻呼應忽有知識勸營功德令修未來善法資糧執此慳心無肯作理夫如是者極為愚惑三不受善教營中原雅音讀盈洪武韻音榮造也善知識惜其受苦勸修戒定慧作諸福德皆未來出世之資糧也作造也映上營字理修理也映上修字聖教不依故斥之云極是愚惑何以故爾經中佛説生時不齎箋西切一文而來死亦不持一文而去苦身積聚為之憂惱於己無益徒為他有無善可恃無德可怙致使命終墮諸惡道是故今日歸依三寶至誠懺悔徵愚惑之所以四引經證齎持也行道所用也勞苦其身積聚資財心常憂惱死不持去但資他人於己何益慳不修福故無善無德善者除惡之根德者萬善之體也是故下結上總懺慳貪苦報竟下別開三道次第而懺先懺畜道楞嚴經云衆生本因貪物為罪罪畢遇物成形名為怪鬼餘如經説叉三途有定業如十惡法定在三途十善業定在人天十不善法有上中下上因緣故受地獄身中因緣故受畜生身下因緣故受餓鬼身下分六節次復懺悔畜生道中無中識知罪報懺悔畜生道中負重牽犁償他宿債罪報一畜生者因中無智縱遇善知識不肯受教故招無知無識罪報第二文義釋見前懺悔畜生道中不得自在為他斫刺音七屠割罪報懺悔畜生道中無足二足四足多足罪報三于人道中役心不停故果上不得自在被他或斫其頭或刺其頸或屠四肢或分割身肉千刀萬切痛苦何如前章言生時以力償債此明死後以身肉血償債痛苦不計四無足者陸地如蚯蚓等水中如鰻鱔等二足者空中如烏鳩鴿等陸行如雞鵝鴨等四足如大而驢騾駱駝牛馬等小而犬羊貓鼠等水中龜鱉等多足如蜈蚣百足等懺悔畜生道中身諸毛羽鱗甲之內為諸小蟲之所唼音杞食罪報五唼聚食貌漢書唼血是也獅象毛中之長鳳凰羽中之長龍蛟鱗甲之長餘可知又羽中如雞有五德烏知凶鵲知吉燕雁知時四足中如犬馬有義狗終不背主馬能報恩今之背恩者反犬馬之不若也如是畜生道中有無量罪報今日至誠皆悉懺悔六總結畜報次懺餓鬼道正法念處經云餓鬼險惡之業由心貪惜積聚欲望長富廣積衆惡不行布施沙門婆羅門及諸病諸貧窮人或來求乞心生慳嫉不肯施與不作功德不持禁戒以是因緣墮餓鬼中分五節次復懺悔餓鬼道中長受飢渴百千萬歲初不曾聞漿水之名罪報懺悔餓鬼食噉膿血糞穢罪報一大經云衆生生餓鬼中壽命無量百千萬歲不聞漿水況得見耶即達見水到則變成猛火膿血設或不變則有多人手執鉾矟遮護捉持不令得前設復降雨至身成火餓鬼苦報如此菩薩為化生故誓願現如是身二大經云生餓鬼中或食吐汁脂肉膿血屎尿涕唾壽命無量懺悔餓鬼動身之時一切肢節火然罪報三經云受他寄物抵拒不還生于鬼處一者人中住若人夜行則有見者二者在閻浮提下五百由旬或住海中或住海渚惡道眷屬其數無量略有三十六種姑舉其八一炬口口出猛火肢節煙生二針咽腹大如鼓頸項如針形狀枯瘦三臭口日氣臭惡臭不可聞四大癭頸生癭瘤噉彼膿血五針毛出毛如針轉刺身體六臭毛身毛臭穢而不堪聞七得棄食人所棄以充飢八得失物失不堪方得就吃一日一夜比人問十年如是五百歲名為一生即焰口焦身之報懺悔餓鬼腹大咽小罪報四即前第二種鬼鼓腹針咽之報如是餓鬼道中無量苦報今日稽顙求哀皆悉懺悔五結問旁生餓鬼説何法度之答説永斷根本無明令其捨離飢渴熱惱生人天中便度二苦道矣懺餓鬼道竟下懺修羅道是第四大段分四節次復懺悔一切鬼神修羅道中諛諂憍詐罪報一阿修羅此云非天由因中雖願得天身而不信正業福田力故仍得修羅智度論云欲界衆生三種善根上分天道果報中分人道果報下分修羅果報修羅結使覆心心多邪曲得道甚難諸天雖隨結使直心信道修羅雖與天相似以近道難故在人下天之怨敵名阿修羅王于欲界中化身大小隨意能作諛阿諛也諂言也憍是憍𭝟詐欺也偽也阿修羅有四種楞嚴經云若于鬼道以護法力成通入空此阿修羅從卯而生鬼趣所攝若于天中降德貶墜其所卜居鄰于日月此阿修羅從胎而出人趣所攝有修羅王執持世界力洞無畏能與釋梵四天爭權此阿修羅因變化有天趣所攝下劣修羅生大海心旦遊虗空莫歸水宿此阿修羅因濕氣有畜生趣攝前阿修羅王住大海底須彌山側所住文城名曰光明縱廣八十由旬壽五千歲一晝夜比人間五百歲懺悔鬼神道中擔沙負石填河塞海罪報二大經拘尸那竭有力士三十萬佛遣目連調伏之連教化五年不能使一人受法一時力士聞佛入滅集聚平道佛即化身為沙門像往力士所以足三指掘出大石力士見已即于己身生輕劣想士云能移此石令出道不我以手舉石擲至色究竟天我復接石置之右掌以口吹之碎如微塵復為力士説法皆發菩提心如此作用則佳今負石報歷長劫或填河作陸塞海為灘所以河海邊常長沒不同此類塞之也問修羅道説何法以度之答説無我法令其捨離憍慢放逸安住忍地如方等會授修羅王記云此等於其未來世值遇恆沙人師子於善名劫得成佛如來皆號為善名懺悔鬼神羅剎鳩槃茶諸惡鬼禮生噉血肉受此醜陋罪報三羅剎是食人鬼即噉精氣者人心中有七滴甜水和養精神鬼噉一滴令人頭痛三滴悶絶七滴盡即死一心持呪即得脫難鳩槃茶是可畏鬼大經云菩薩見衆生為鬼所病即作是言願作鬼身大身健身多眷屬身使彼聞見病即除愈阿修羅此云無端正故云醜陋報如是鬼神道中無量無邊一切罪報今日稽顙向十方佛大地菩薩求哀懺悔悉令消滅四結上懺三報竟下發願求成三道之功德滅惡興善必承懺法力故文分四節願承是懺悔畜生等報所生功德生生世世滅愚癡垢自識業緣智慧明照斷惡道身一畜生之報不一故云等愚癡即多欲多求及無所識知等由愚癡無慧受畜生報今慧性開明不更染畜生垢矣業緣即苦身積聚償債屠割唼食等業緣既識故願智慧明照惡道苦身斷皆懺悔之力也願以懺悔餓鬼等報所生功德生生世世永離慳貪飢渴之苦常餐甘露解脫之味二由慳貪因受飢渴果苦即動身火然腹大咽小等常餐甘露永離渴也得解脫味永離飢也願以懺悔鬼神修羅等報所生功德生生世世質直無諂離邪命因除醜陋果福利人天三質正也實也諡法忠正無邪曰質若為利養故現奇特相或高聲現威令人畏敬是心多邪曲為邪命因今質直無諂與昔諛諂憍詐等反是離邪命修正因緣自然除醜陋果得端正報福利普及人天矣願從今以去乃至道場決定不受四惡道報唯除大悲為衆生故以誓願力處之無厭四重申總懺發願因也至道場坐菩提場成佛果也自因至果中間決不仍受三途及修羅等四種惡道報唯除下揀願但除發大悲心以同事攝四弘誓同處四惡道無滿足想為度生故之此也指四惡道已懺三途等報今當復次稽懇懺悔人天餘報先結前今當下起懺果報文先人天餘報相與稟此閻浮壽命雖曰百年滿者無幾於其中間盛年夭枉其數無量稟受也夭枉少年橫死也但有衆苦煎迫心形愁憂恐怯未曾暫離如此皆是善根微弱惡業滋多致使現在凡有所為皆不稱意苦火煎心則心無悅豫迫形則體無安樂愁悲憂戚恐懼怯懦滋益也惡業益多故致盛年天枉等苦即生亦不免煎迫心形等患耳當知悉是過去已來惡業餘報是故某甲等今當懺悔無始以來至于今日所有現在及以未來人天之中無量餘報先明餘報之由今當下舉無量餘報以申懺問為天衆應説何法答説諸行無常一切樂具悉皆衰謝令各出三界上總明下別開計二十二節懺悔人間流殃宿對癃殘百病六根不具罪報一流是宿生業水流下餘波也殃即災殃因無始宿業縱修善法猶有餘殃耳癃殘者罷癃殘疾也百病即四百四病今止言百舉大數也六根不具亦作得度因緣十誦律中阿那律尊者因精進失明補衲須倩人曰誰是惜福者為我任針時佛過其旁應聲曰吾是惜福者與汝任針因為其説法得天眼第一大經云若見貧窮衆生願貌醜陋不得自在是人定是破戒妬心嗔心無慚愧心若見多財巨富諸根完具威德自在是人定有戒施精勤慚愧無妬無嗔懺悔人間邊地邪見三惡八難罪報二生于邊地不惟人品下賤尚不見中華人物況得見佛聞法乎生邪見家則不信三寶生生苦惱三惡即獄鬼畜八難之三四盲聾瘖啞五世智辨聰六佛前佛後七北俱盧洲上四在人道八無想天此八有一便不得見佛聞法故名難懺悔人間多病消瘦促命夭枉罪報三目連尊者因弟子病上忉利天問耆婆當云何治答惟斷食為本消痟同衰也李通傳崇有消疾注消中之疾中既消外形瘦也促命短壽也不盡天年曰夭無罪死無藥死縱有醫藥不對病死皆枉死攝餘殃使然懺悔人間六親眷屬不能得常相保守罪報懺悔人間親友凋喪愛別離苦罪報懺悔人間冤家聚會愁憂怖畏罪報四父母兄弟妻子有一死別生離便是不得常相保守五生者凋零病者俱喪恩愛別離八苦之三也六怨憎會苦懺悔人間水火盜賊刀兵危險驚恐怯弱罪報七水火風是大三災飢饉疾疫刀兵是小三災文中水火大災之二刀兵小災之一人能一日一夜持不殺戒得免刀兵災弱劣弱也懺悔人間孤獨困苦流離波迸亡失國土罪報懺悔人間牢獄繫閉幽執側立鞭撻拷楚罪報八幼而無父曰孤老而無子曰獨貧窮困苦流離波迸言飄流四方也傳云迸諸四夷言散走也既散走四方亡失本土可知九幽囚也懺悔人間公私口舌更相羅染更相誣謗罪報懺悔人間惡病連年纍月不瘥枕臥床席不能起居罪報十公私兩字冠下兩句公口舌如借官府訟事而網羅玷污之其不受屈不傷財不害命決不已也私口舌即於鄉鄰比近妄調唇吻而誣謗也口勞舌沸徒成地獄之因詞垢語汙空搆劇楚之果更相彼此互相銛筆綺飾文詞汙衊加謗也誣虗言也如本無淫欲而妄加以犯色之名曾未盜偷而熾誹以竊物之號事起無因謗成有意今生不懺當苦無窮戒之哉十一惡病如瘋癆等自然連歲積月耳瘥病除也大經云人有病當至心求醫療治不爾必死無疑衆生常應攝心不放逸放則便墮又衆生不耐寒暑飢渴風雨打擊如彼坯瓶不耐風雨打擲塠壓懺悔人間冬瘟夏疫毒癘傷寒罪報十二言四季之病陰陽書有瘟星瘟鬼周禮疾醫四時皆有癘氣不和之病也説文惡瘡疾大淋瘋之類秋間瘧癘春患傷寒大經云菩薩于疾疫世見病苦者作是思惟如藥樹王若有病者取根莖枝葉華果皮膚悉得愈病我身亦爾若有病者聞聲觸身服食血肉乃至骨髓病悉除愈願彼食我肉身不生惡心如食子想我治病已常為説法願彼信受思惟轉教五祖演云今人似發瘧一般寒一上熱一上不覺過了一生不會者且置即如徹的人于日用現行處亦未免觸事則因事生心緣無便依無息念被寒熱二字打做兩橛懺悔人間賊風腫滿否塞罪報懺悔人間為諸惡神伺求其便欲作禍祟罪報十三邪風漲滿痞塞纏綿等病痞病結也即腹內結病氣隔不通也十四伺候察也崇神禍也禍者人所自召神因附之崇者神自出之以警人者江克傳崇在巫蠱師古曰禍咎之徵鬼神所以示人也懺悔人間鳥鳴百怪飛尸邪鬼為作妖異罪報懺悔人間為虎豹豺狼水陸一切諸惡禽獸所傷罪報十五百怪等如毗陀羅起尸之類十六人為獸啖總繇前業故無能逃若無前業縱遇不傷懺悔人間自縊音一自殺罪報懺悔人間投坑赴火自沉自墮時本作墜罪報懺悔人間無有威德名聞罪報十七縊自經死也絞也十八自沉坑中自墮火內宿孽所招耳十九無威使人敬畏無德令人悅服名譽自不遠著如佛問波斯匿王曰有山從四面來如何回避答惟布施持戒修諸功德佛言善哉懺悔人間衣服資生不能稱心罪報懺悔人間行來出入有所運為值惡知識為作留難罪報二十衣服是遮醜陋之要物人能捨衣必得佛果如諸龍王等每有金翅鳥怖求救於佛佛施以所服之衣曰汝諸龍王若分吾衣一縷恭敬頂戴鳥王不能為害衣服不能稱心掣襟露肘資生不能稱心有米無柴皆由宿生吝惜感此罪報二十一惡知識用惡知惡見操掠人者運動施為不稱其意故曰留難即障礙意也如是現在未來人天之中無量禍橫災疫厄難衰惱罪報某甲等今日至誠向十方佛尊法聖衆求哀懺悔願皆消滅二十二應前但有衆苦煎逼心形愁憂恐怯未曾暫離文正因善根應強者反弱惡業應少者反多皆顛倒心所感也此時不懺修更待何時今日下總結問向人衆應説何法答説不昧因果法令修十善永淨三業前已懺悔三業六根一切煩惱障一切業障四生六道一切報障今當次第發願回向先結前今當下生後阿毗曇心論云障閡聖道及聖道方便名障煩惱有勤利勤則數行利則增上報障者隨所住報非聖道器報過惡故上懺三障竟下申願成功德猶經之流通分也某甲等願以此懺悔三障所生功德悉皆回向施與一切衆生俱同懺悔大經云若施畜生得百倍報施一闡提得千倍報施持戒者得百千倍報施外道斷煩惱者四向四果至辟支佛皆得無量報施不退菩薩及最後身諸大菩薩佛得無量無邊不可稱計不可思議報上總回向下發願文八今初願與一切衆生現生之內身心安樂三災八難不吉祥事咸悉消除衣食豐饒正信三寶身心安樂如龍自在王無惱無障故災難釋現前但八難有界內外之異界內如前以果報不淨即凡夫住事入于聖化稱之為難界外二乘住理八難一有餘中三十心名三惡道四住無住法名北洲五地前法愛如長壽天六未有初地十種六相名諸根不具七地前智淺如世智辨聰八不窮中理如佛前佛後不吉祥事大而災難小而病厄等至此當觀想文殊師利宛來攝受毗婆沙論云若以一訶梨勒果起殷淨心奉施病僧於當來世決不逢疾疫災若以一摶之食起殷淨心奉施僧衆於當來世決定不逢飢饉災誦衣食二句當想寶勝佛宛來攝受能信三寶是衆信之首故云正耳捨此報身皆得往生極樂世界親覲彌陀得受記莂由前生所作善惡業今受苦樂報死苦一至便捨此現報之身故云捨此報身往生有二義一厭離厭五欲輪回五道欲求出離二欣願欣淨土莊嚴願欲往生極樂世界非堪忍界可比者此土約界泥沙荊棘惡道充滿約時寒暑晝夜推遷無常約人胞胎受生男女雜沓約衣食辛勤造作粗惡分段但增業障約壽命短促朝暮不測是種種諸苦生大厭惡彼地寶池瓊華無三惡道清淨光明彼時無寒暑晝夜彼人蓮華化生純丈夫相彼衣食隨念而至珍奇美妙惟成法喜彼壽命同於彼佛久長無量種種皆樂事心生大欣慕故世尊因韋提希發起為説十六妙觀為求生淨土之要彌陀所禮之佛安養導師也佛有異方便曰觀佛三昧專心繫念即得往生故須念佛莂從草從別如禾稻秧種是草中別一佳種故曰莂喻授記是成佛秧故曰得授記莂此下文文觀想如親見佛菩薩然當來世中見彌勒佛聽聞正法如教進修二龍華會中親見彌勒佛以弟子付彌勒云我滅度後所有四衆於我法中種少善根乃至一稱佛名彌勒成佛即當得度方等經佛為彌勒略説法要諸惡莫作衆善奉行自淨其意是諸佛教慈氏三會度人領諸弟子至雞足山前彈指出聲出岸四開迦葉從禪定起乃曰吾師釋迦如來用寄此衣以奉世尊佛言善哉仁者精進無等吾嘗與汝事釋迦文今復得見甚善甚快其國之地乎正無丘坑樹形似金龍龍上開華故名龍華三會説法初會度九十六億萬人二會度九十四億萬人三會度九十二億萬人住世六萬歲正法像法亦爾如教進修者教有四種如律宗名南山教法相宗名慈恩教彌勒為主性具宗名天台教法性宗名賢首教至此師子吼與普賢可想見矣又願生生世世在在處處常值國王興隆三寶不生外道邪見之家三願離邪見家大經云若其身心受大苦時欲失無上菩提之心莫以二乘心而生知足無三寶處常在外道法中出家為破邪見不習其道得法自在得心自在于有為法了了見故以故外道亦能作佛方等會授婆羅尸迦外道記云於其未來星宿劫皆得作佛同一號號曰普聞高名稱彼等大智度世間至此應想袈裟幢如來矣又願生生世世在在處處蓮華化生種族尊勝安隱快樂衣食自然四願得安隱樂由懺除垢穢惟有淨心心淨則佛土自淨亦不受父母胞胎惟蓮華托質方等經師子王子問云何得端正蓮華中化生云何知宿命願佛為宣説答忍辱得端正施蓮華化生法施知宿命汝當如是解又菩薩問云何見己身百受于化生千葉蓮華上面奉諸世尊答華香散佛及支提不害于他并造愆於大菩提稱信解得處蓮華生佛前至此覺華定自在王可想矣古哲云不離當處坐寶蓮華不逾剎那住生彼國種族尊勝如生剎帝利大豪貴家及高門望族之類至此龍種上尊王可想矣安隱音穩快樂者欲得安隱先須離諸怖畏大經云死苦閉繫打擲水火王賊貧窮破戒惡名惡道如是等畏悉當斷之昔太子白父王曰能令不老不死無病不別四願即不出家王答曰此願世間難得衣食自然者大經云無量衆生應入涅槃以所乏故妨亂其心是故不得故願衣食自然助道無虧耳又願生生世世在在處處慈仁忠孝等心濟物不生一念逆害之心五願無逆害心大經云父母師長深生恭敬怨憎之中生大慈心又云若衆生嫌我立者我當終日端坐不起若嫌我坐我則終日立不移處行臥亦爾護衆生故當起是心此即不生一念逆害之心樣子等心濟物者大經云言常柔軟口不宣惡不和合衆能令和合有憂怖者令離憂怖飢饉之世令得豐足疫病之世作大醫王病藥所須財寶自在刀兵之劫有大力勢斷其殘害令無遺餘至此觀自在菩薩可想矣又願生生世世在在處處常為訓得諸佛之所護念能降魔怨及諸外道六願上得佛念下降魔外能降魔怨者防意如城慧與魔戰須知無為能殺其賊魔之為言殺也婆娑論斷慧命故名魔常行放逸害自身故名魔淨印法門經云以無所為心即能降諸魔當知有四知苦能降蘊魔斷集能降煩惱魔證滅能降死魔修道能降天魔降諸外道者如華嚴會上第二十一位知識遍行外道告善財言閻浮提內九十六種各起異見而生執著我悉于中方便調治令其捨離所有知見乃至普及十方世界悉亦如是問學人分中可有魔外事否答古哲云學道人一念計生死即落魔道一念起諸見即落外道淨名云衆魔者樂生死菩薩于生死而不捨外道者樂諸見菩薩于諸見而不動大勢至可想矣與諸菩薩俱會一處菩提道心相續不斷七願與善友俱道心不斷既無魔外所遇皆菩薩道心自恆耳如裴相國聞黃檗一言便乃知歸李太守聞藥山雲在青天水在瓶亦乃自肯大慧聞圓悟禪師舉如何是諸佛出身處答薰風自南來殿閣生微涼慧即瞥然瞥然者於此事明白相應也故圓悟印許云難得你到這田地至此普賢大莊嚴可想見矣又願生生世世在在處處興顯佛法修行大乘分身無量救度衆生直至道場無有退轉八願弘法利生至果不退興者以具本有大乘種子而鼓舞作興之也顯直指也先賢云江湖無閡人之心佛祖無瞞人之意是也在處説法如大經云若我弟子受持此經莫非時説莫非國説莫不請説莫輕心説莫處處説莫自歎説莫輕他説莫滅佛法説莫熾然世法説至此袈裟幢又可想矣乘者運載義體通教理行果謂依教解理依理起行依行得果行果正運教理助運四皆名乘分身無量者華嚴云雖現身於世于世法心無所著不同凡夫永沒三界亦不同二乘求出三界無生死可免三界可出觀四生如一子等三界以同仁故能散形無量耳救度衆生者如調達每於佛所懷不善心多食酥故腹脹醫藥無救因痛劇故稱南無佛佛遠聞之伸手摩其腹痛苦即除調達見佛手乃曰淨飯王子有此醫術不愁活命出十誦律又三世諸佛只以此道度生無生可度以此心説法無法可説無法可説是真説法無生可度是真度生如諸佛菩薩所發誓願所修福智所行回向我亦如是發願修集回向大乘願根上修行大乘來誓願即四弘誓也福智即六度前四度修福第六修智第五禪度福智兼修所行即萬行也回向如十回向已釋于前今略釋者回因向果回小向大向己向他皆共成佛也我亦下正例同願修集三字如次配上誓願修福所行以集者積集萬行故大莊嚴可想矣虗空界盡衆生界盡衆生業煩惱盡我此修行回向終無有盡空能包界界能入空二俱難盡以虗空無邊世界無盡故衆生界是報障衆生業是業障衆生煩惱是煩惱障三障可盡我之修行回向畢竟不盡而地藏觀音度生弘願可想矣大經云假使擲罥能繫縛風齒能破鐵爪壞須彌如來終不為諸衆生作煩惱因寧與毒蛇同共一處納其兩手餓師子口佉陀羅灰用洗浴身終不發言如來為諸衆生作煩惱因緣因如來煩惱盡故衆生煩惱亦盡也煩惱可盡我之自利利他不可盡也發願回向已至心信禮常住三寶先結前至心下明虔禮三寶見懺文首尾呼應處一懺大旨總憑三寶力滅除三障顯乎三德圓滿無上菩提全在至心若一念輕微事同虗搆理事雙融等一誠懇自能動物況諸聖耶至心下應禮十佛等結懺無者略耳懺已舉懺悔偈畢繞懺主者應唱十佛六菩薩名三繞斯與諸懺不雜如梁皇繞懺唱七佛十方十佛等誠為得體今行不辨故兩書之請為一正
