body:
  text: 寓古婁青螺菴沙門書中智證録一切諸佛愍念衆生為説水懺道場總法今當歸命一切諸佛南無毗盧遮那佛南無本師釋迦牟尼佛南無阿彌陀佛南無彌勒佛南無龍種上尊王佛南無龍自在王佛南無寶勝佛南無覺華定自在王佛南無袈裟幢佛南無師子吼佛南無文殊師利菩薩南無普賢菩薩南無大勢至菩薩南無地藏菩薩南無大莊嚴菩薩南無觀自在菩薩禮諸佛已次復懺悔準前可知某甲等相與即今身心寂靜無諂無障時本作曲正是生善滅惡之時復應各起四種觀行以為滅罪作前方便南藏無作前二字承上懺悔發願而起觀行作滅罪之方故總標也承前折憍等三業無過故得身心寂靜大經云身寂靜者終不作殺盜淫心寂靜者亦不造貪嗔癡又身寂靜終不親近四衆及所有事業心寂靜終不集三毒有四句料簡一身靜心不靜如身坐禪遠四衆心不離貪等二心靜身不靜如內斷三毒外近四衆等三身心俱靜如諸佛菩薩及如法行人四身心俱不靜如不信心凡夫外道等生善滅惡承前悔罪發願文以生後復應下總標言趂此身心俱靜之時又當各加觀行而進修焉何等為四一者觀於因緣二者觀於果報三者觀我自身四者觀如來身首句徵一者下列第一觀因緣者知我此罪藉以無明不善思惟無正觀力不識其過一因緣觀行初疊知我下釋明起始為因助作為緣如內充三毒外近惡友等知覺了也由正觀力萬法本不生依正色心難於成佛因緣心思惟即貪心今觀諸法從因緣生覺所觀境皆空能觀之心自寂昔無正觀力被惡境轉故不識其過不識便是無明故無正觀之力用也遠離善友諸佛菩薩隨逐魔道行邪險徑雙承上兩節來由不識其過心多顛倒如善知識當親近者倒遠離之魔道應遠離者反隨逐之吁不善思惟如此隨逐隨順追逐而不捨也魔道者梵語魔羅此云奪命能劫奪智慧命故又名殺者是惡中之惡即謗毀三寶邪見橫逆者依附此等必墮三途故云險徑如魚吞鉤不知其患此下連舉三喻明三毒初明貪毒魚但知香餌之肥口不知鉤頭有喪身之患魚能吞物譬人貪著可欲境古云隨他香餌浮波面獨守深潭得自由寧有喪身之禍耶不知二字極重應上不識字面冠下兩喻大經云見諸法真實便有總別之相如見色作色相等所以起貪耳如蠶作繭自纏自縛二以蠶譬癡毒蠶吐絲蟲也繭蠶衣也蠶因癡迷不知纏其頭自縛其體自盡其邪知見力觸境迷惑自是惛懵既皆曰自顯非他力使之然也大經云衆生不見十二因緣是故流轉如蠶作繭自生自死衆生亦然不見佛性自造結業流轉生死猶如拍毱四祖道信見三祖燦曰願和尚慈悲乞與解脫法門祖曰誰縛汝曰無人縛祖曰何更求解脫如蛾赴火自燒自爛三蛾譬嗔毒飛蛾喜赤光見火即投不知自燒燋爛之喻人嗔心見違境即發不知嗔火能壞法身戕智慧命以是因緣不能自出結因緣觀行三毒造業久淪生死自不能出不藉三寶力及自觀力何以得超第二觀于果報者所有諸惡不善之業三世輪轉苦果無窮二果報觀行所有諸惡如有貪等惡心所自造惡業必招苦果惑業苦三如惡叉聚又生死不停曰轉即十二因緣等偈云假使百千劫所作業不忘因緣會遇時果報還自受如師子尊者與二祖俱償宿障皓月問長沙岑永嘉云了即業障本來空如何是本來空沙曰業障是問如何是業障答本來空是月無語沙以偈示曰假有元非有假滅亦非無得通償債義一性更無殊沉溺無邊巨夜大海為諸煩惱羅剎所食未來生死冥然無涯承上文來謂苦果無窮不能自出猶如扁舟溺于大海又當長夜復被羅剎噉巨夜即長夜喻無明不善大海喻受苦無窮煩惱羅剎法喻雙舉煩惱汩沒慧性如羅剎食人未來生死應上三世二句冥然巨夜無涯大海皆前後呼應處設使報得轉輪聖王王四天下飛行自在七寶具足命終之後不免惡趣轉輪聖王人中第一輪以金為之曰轉者一日四天隨念飛行以體圍圓狀若車輪王治也顯無為而治自然轉移非若銀輪現治銅輪施政鐵輪揚武而後治也七寶者晉本華嚴云金輪寶名勝自在象寶名青山紺馬寶名勇疾風神珠寶名光藏雲主藏臣寶名大財玉女寶名淨妙德主兵臣寶名離垢眼謂之七種王寶得此七寶作轉輪王飛行自在王四天下可謂福之至也又有四德一大富二端正姝好三安隱無病四長壽如此福德尚墮苦報未知出期況無福而不勤懺悔乎四空果報三界極尊福盡還作牛領中蟲況復其餘無福德者而復懈怠不勤懺悔此亦譬如抱石沉淵求出應難上舉人中之極此舉天中之極謂無論輪王即四空天命終亦不免苦報雖居三界極尊之位其福既盡還作牛領中蟲況其餘人道不及輪王無福德者既乏福德又多罪垢反懈怠不精勤求懺耶誠如抱石云云四空天是無色界一空無邊處天二識無邊處天三無所有處天四非非想處天證四空果報為三界極尊淪生死苦如沉淵空身沉淵已是難出況抱石而不捨欲求自出亦甚難也顯生死垢軀現是難脫更造重罪而不懺又不藉聖力欲求自必甚難也還義應讀旋速也應時本作良非沉淵與上沉溺至大海句呼應第三觀我自身雖有正因靈覺之性而為煩惱黑暗叢林之所覆蔽無了因力不能得顯三自身觀行文具三佛性義一正因是住自性佛性二緣因是引出性佛性三了因是至得果佛性妙玄云有心者皆得作佛即法身種謂之正因一切舉手低頭即解脫種謂之緣因一切世智三乘解脫心即般若種謂之了因大經云正因者名為佛性緣因者發菩提心以二因緣得無上菩提如石出金今文正因者正由此慧除癡得法身故自身有三慧身妙法身應一切身大乘法界論云衆生法身既與功德相應何故無有如來德用應知此如蓮華未開諸惡見葉共包裹故亦如金山被瞋恚泥所封著故又如虗空被愚癡雲之所蔽故煩惱能障本有靈覺之性如黑暗叢林能覆日月之光了義者法身是本真之理不生不滅者但煩惱覆之則隱智慧燭之則顯又了有二義一了斷義般若能了煩惱空故二顯了義能顯法身故大經云了因者猶如燈明照了于物緣因即施戒等五與般若為資緣故資彼正因力斷惑成菩提也我今應當發起勝心破裂無明顛倒重障斷滅生死虗偽苦因顯發如來大明覺慧此時不發勝心更待何時故云今應當等勝心即前七種心及四行中前二勝心一發則黑暗之蔽自開一起則靈覺妙性自顯無明如鐵圍城藉勝心能破如網仗勝心能裂又無明有四十二品為本性之障非一層故云重是生死苦果之因也偽是假意前云虗假虗則非實假則非真言本靈上無真實生死因之無明及生死果之苦報也修懺要旨云滅障如翻大地草木皆枯顯德如照澄汪森羅盡現如來者法身也覺慧是無上菩提之因心即當人不動不變之心體即覺字本不可得不過借以破衆生之迷耳覺慧顯照如日月大明始悟生本是佛如川有珠而不枯山有玉而增潤建立無上涅槃妙果涅槃有四一自性清淨涅槃一切衆生平等共有即真如理也二有餘涅槃二乘雖斷煩惱未除餘習故是有餘三無住涅槃謂不住生死不住涅槃窮未來際利樂有情故四無餘涅槃謂煩惱既盡餘習亦滅故今指無餘無住即是出世第一義諦故云無上既是出世第一故為妙果大經云一切善業是涅槃因因有二一近因即三解脫門二遠因即無量世所修善法又云聽法因緣得近大涅槃以開法眼故如世三人一無目二一目三二目無目者常不聞法一目者雖暫聞法其心不住二目者專心聽受如聞而行故聽法因緣亦得近能生大明覺慧故華嚴經云智入三世而無來往即大覺涅槃此是智不能入愚不能昏境界問世出世間俱有涅槃義不答大經云如人飢餓得少飯食如病得差如人怖畏得歸依處如貧人獲七寶物得已皆得安樂如是安樂即世間涅槃乃至如來常樂我淨即大涅槃今人不得涅槃何故答大經云無量衆生應入涅槃以所乏故妨亂其心故不得又多喜教化其心匆務不能得定故不得現問佛于十五夜涅槃何故答有十一事一能破暗表能壞無明大暗故二令衆生見道非道表演説正道邪道三令衆生見道邪正表開示生死邪險涅槃平正四除蒸得清淨樂表令人斷三毒熱五能破螢火高心表壞外道光明六滅一切賊盜之想表破煩惱結賊七除衆生畏惡獸心表除畏五蓋心八能開敷優鉢羅華表開敷衆生種善根心九合蓮華表覆衆生五欲心十發行人進路之心表發起衆生進修趨向大涅槃行十一令衆生樂受五欲多獲快樂表令衆生樂修解脫故當望夜耳第四觀如來身無為寂照離四句絶百非首句疊觀者教人察己身即同如來也次句略釋離四下廣釋無為寂滅真體也釋如義寂照寂體妙用也釋來義如鏡照物本自無心心體雖寂寂而恆照非有心用衆生不了自心本寂妄計有心故起四句百非若大明覺慧中念念寂滅即如來清淨法身何勞離絶問如何是無為作用答為即無為非無為于無為也如地大能持萬物終不生念我力能持火亦不念我能燒物水亦不念我能潤漬風亦不念我能動長空亦不念我能容受涅槃亦不念我令衆生得度義出大經離四二句釋如字但舉一對或拈一字便成四如有無是對立四句者如云有是增益謗無是損減謗亦有亦無是相違謗非有非無是戲論謗一異斷常亦爾就有等四句每句各四句有四句者有有有無有亦有亦無有非有非無無四句者無有無無無亦有亦無無非有非無亦有亦無四句者亦有亦無有亦有亦無無亦有亦無亦有亦無亦有亦無非有非無非有非無四句者非有非無有非有非無無非有非無亦有亦無非有非無非有非無如上四句各四四四則成十六是末四句也約三世各有十六句成四十八句此諸句皆有已起未起成九十六并上根本四句成百餘四句倣此百非者法數云凡作四句有本末三世已起未起積成百皆不得真故云非噫四句可離正句不可離也嚴頭云大統綱宗麼須識句甚麼是句百不思時喚作正句亦云居須亦云得住亦云歷歷亦云惺惺亦云恁麼時將恁要等破一切是非如一團火相似觸著便燒有甚向傍處古哲云一法若有毗盧墮在凡夫萬法若無普賢失其境界有無尚爾況四句乎百非乎所以當離而絶之衆德具足湛然常住廣釋來義衆德即萬行感百福莊嚴行無不具相無不圓故云具足圓滿報身湛然言如水之澄湛萬彩涵映也常住即不動義法身也宗門統要云佛光如滿禪師因唐順宗問佛從何方來滅向何方去既言常住世佛今在何處師云佛從無為來滅向無為去法身等虗空常在無心處有念歸無念有住歸無住來為衆生來去為衆生去清淨真如海湛然體常住帝又問佛向王宮生滅向雙林滅説法四十九又言無法説山河及大海天地及日月時至皆歸盡誰知不生滅疑情猶若斯智者善分別師曰佛體本無為迷情妄分別法身等虗空未曾有生滅有緣佛出世無緣佛入滅處處化衆生猶如水中月非常亦非斷非生亦非滅生亦未曾生滅亦未曾滅了見無心處自然無法説問如來法身既常衆生如何不見答大經云其性常住是不變異無智慧眼不能得見如彼肉眼不見暗中樹影雖復方便入於滅度慈悲救接未曾暫捨復讀福白也言也語云南雍三復白圭方便雙通出入入於滅度即生死而證涅槃出而救接即涅槃而度羣品故云淨法界身本無出入大悲願力示現受生是無住涅槃也無志出世淪于苦中則救之有志力微者則接之實須臾未嘗棄也生如是心可謂滅罪之良津除障之要行是故志誠求哀懺悔總收上四行滅罪是總結懺悔除障是生下諸文某甲等無始以已同來至于今日長養煩惱日深日厚日滋日茂覆蓋慧眼令無所見斷除衆善不得相續因煩惱長養故衆善斷除不得相續釋斷字心有煩惱如地有衆草煩惱長則生死海日深無明地日厚土得水而日滋樹得地而日茂滋浸也潤也茂盛也由煩惱林茂故覆蓋智慧眼終不自見下文障字由滋茂覆蓋生去起字從長養字生去計二十四節起障不得見佛不聞正法不值音治聖僧煩惱一由斷衆善於三寶無緣慧眼恆盲福田淺薄也起障不見過去未來一切善惡業行出離煩惱二因覆慧目不見過現善惡業行即不知未來當受好醜果報故煩惱無由離生死海無由出無明地胡由脫耶上二節明人間障下明障生天事皆根前觀果報中來障受人天尊貴之煩惱三人中尊貴如轉輪聖王天中尊貴如欲界帝釋色天梵王無色非非想處天等言尊貴者揀異三途微賤貴賤當轉轉明之障生色無色界禪定福樂之煩惱四禪定福樂初禪離生喜樂深入一心有覺有觀離不善法得未到地身心快樂證初禪相二禪定生喜樂初禪喜樂從離欲生此中喜樂從禪定生三禪離喜妙樂喜是粗樂今捨粗求妙故離喜四禪捨念清淨地初禪覺觀惱亂二禪大喜動三禪知樂無常難守是故當捨進求四禪安隱之地四禪純淨無出入息故心易攝是為真禪如善御馬者隨意所至欲行四無量心四無色定等隨意皆得欲得六通亦易前三禪是粗相清淨心第四禪是細相清淨心大經云如世間上妙清淨園林死尸至中則為不淨衆共捨之不生愛著色界亦爾雖復淨妙以有身故諸佛菩薩悉共捨之懺世間障竟下懺出世間障障不得自在神通飛騰隱顯遍至十方諸佛淨土聽法之煩惱五自在神通如大目犍連所得者或隱或顯迅疾無礙山壁直過行空如鵬地中出沒如浮沉水可以遍至十方者神境通也淨土有粗細二相變化土有二乘為粗他受用土純菩薩為細聽法者法苑分三種上品神聽中品心聽下品耳聽妙慧菩薩問佛云何能證得自在勝神通遍往無量剎禮敬于諸佛答見人修著説宜法不生謗毀加留難如來塔廟施燈明修習諸禪遊佛剎障學安那般那數息不淨因緣觀等諸煩惱六安那此云遣來入息也般那此云遣云出息也是三世佛入道初門止觀云數息觀對治遊思病先數入息後數出息從一至十終而復始不令散亂數息觀治散亂不淨觀治貪欲謂觀身不淨如上卷三十六物等因緣觀治愚癡等是等取慈悲念佛二觀慈悲觀治多嗔念佛觀治著我此名五停心亦謂之圓五品障學暖頂忍第一法七方便等諸煩惱七信住行向各十共四十一清淨心次成四種妙圓加行即暖頂忍世第一地也楞嚴云即以佛覺用為己心若出未出猶如鑽火欲然華木名為暖地又以己心成佛所履若依非依如登高山身入虗空下有微礙名為頂地心佛二同善得中道如忍事人非懷非出名為忍地數量消滅迷覺中道二無所目名世第一七方便即小乘七賢位也一五停心位即前數息等五觀二別相念位三總相念位加上暖等四位是為七等者等小乘中餘位障學慈悲喜捨聞思修等諸南藏有煩惱八慈悲喜捨即四無量心釋見首卷發菩提心論云聞等是三慧一聞慧如所聞法心常愛樂無有厭足二思慧思念觀察一切有為法如實相謂無常苦空無我不淨念念生滅不久敗壞即生厭離趨佛智慧三修慧謂離欲不善法漸次修入障學空平等中道解三觀義煩惱義字下南藏有諸字九空者一念無相因緣所生法我説即是空平等者無法不備亦名為假中道者雙融空假遮照同時是中觀義其義當解障學助道品念處正勤根力如意足諸煩惱十助道品即三十七助菩提法一四念處一觀身不淨染緣有故有漏色蘊具五種不淨一種子不淨乘過去業識種子攬現在父母精血合成故二住處不淨於母胎中居生藏之下熟藏之上常受熏穢故三自體不淨三十六物共成故餘如上卷説四自相不淨九孔常流不淨故五究竟不淨一旦命終䏺脹爛壞臭惡狼籍不堪見故二觀受是苦受是心所遍行五之一分三種謂苦樂捨義見前三觀心無常心即緣慮心前滅後生相續不絶如水流注經云一念有九十剎那一剎那九百生滅四觀法無我法即五蘊一一推求皆無有我此四法對治凡夫四倒四正勤者已生惡勤令斷如除毒蛇未生惡勤令不生如預防洪水已生善勤令增長如溉甘果未生善勤令生如鑽木出火五根者一信根信諦理能生一切無漏根力禪定解脫三昧等二進根信諸法故倍策精進三念根但念正助之道不令邪妄得入四定根攝心正道及諸助道善法中相應不散五慧根念處之慧為定所攝以觀自照不從他知五力一信力信諦不為邪外諸疑所動二進力觀諦心無間雜本成道果未證不休三念力持諦破邊邪想不令煩惱破壞四定力能破欲界一切諸散能於諸禪無礙五慧力能破一切邪外等慧一切見愛等執四如意足一欲如意足希向慕樂二念如意足一心正住三進如意足精進無間四慧如意足心不馳散亦名四神足法界次第云智定力等所願皆得名如意足此屬宅障學八正道示相之煩惱十一八正道一正見修無漏十六行故明見四諦二正思惟以正思惟發勝此觀三正語以無漏智除口邪命常攝口業住正語中四正業以無漏智除身邪命住於清淨正身業中五正精進勤修涅槃善入正諦六正定正住於理決定不移七正念心不動失正直不忘八正命以無漏智慧通除三業中五種邪命住於正命此八正道即八聖道總是依法而修八相歷然故云示相障學七覺支不示相煩惱十二無盡意經云支分也一念覺分觀一切法自性皆空二擇法覺分能分別了義不了義三進覺分勤修不退四喜覺分所修法喜五輕安覺分除身口諸粗煩惱六定覺分如所入定覺了諸法七捨覺分不為世法所牽無著無閡此七覺支即七菩提分總觀一切法空是無法可得故云不示相障學八解脫九空定煩惱十三八解脫離縛義大集云一內有色觀外色解脫背棄色愛心為初禪二內無色觀外色解脫育棄色愛心是二禪三淨勝解身作正具足住背棄不淨心是三禪四超一切色想滅有對想不思惟種種想入無邊空處定具足住棄下地法是四禪五超一切空無邊處入無邊識處定具足住非棄下地法亦四禪六超一切識無邊處入無所有處定具足住非棄下地法是四空七超一切無所有處入非想非非想處定具足住非棄下地法亦為四空八超一切非想非非想處入滅想受具足住背棄一切有緣心是為過三界九空定者初門云一次第定初禪離生二次第定二禪定生三次第定三禪離喜四次第定四禪捨念五次第空處定空能普入六次第識處定識能明了七次第無所有處定無有即有八次第非非想處定無想即想九次第滅受想處定心滅無滅障學於十智三三昧煩惱十四十智者華嚴云一三世智二佛法智三法界無智智四法界無邊智五充滿一切世界智六普照一切世界智七住持一切世界智八知一切衆生智九知一切法智十知無邊諸佛智三三昧者有覺有觀為空三昧無覺無觀為無相三昧無覺有觀為無作三昧三昧此云正受不受諸受乃名正受又云正覺即具自在神通意大經云定相者名空三昧慧相者名無願三昧捨相者名無相三昧又空者於二十五有不見一實無作者於二十五有不作願求無相者無有十相即色聲香味觸生住滅男女修是三三昧名菩薩繫念思惟障學三明六通四無礙煩惱十五三明一天眼智明謂聲聞辟支菩薩諸佛於天勝妙得彼天眼二宿命智明三世境界無有不知不同二乘三漏盡智明證見道時遠離欲漏有漏見漏無明漏既離四漏不同二乘所證六通者般若云一神境通神是神變靈妙之德境謂境界雨華等事神所變境境體即神故名神境通者無壅滯義變現神境之通名神境通亦名如意通身如其意欲往即到能起種種神變震動十方變一為多變多為少或隱或顯迅速無閡山崖墻壁直過如空凌虗往來猶如飛鳥地中出沒如出沒水身出煙焰如燎高原體注衆流如消雪嶺日月神德威勢難當以手杖摩光明隱蔽轉身自在二天耳通過人天耳能如實聞十方各殑伽沙界情非情類種種音聲此與天眼能見能聞若近若遠障內障外聲等故三他心通能知十方沙界諸有情類一切心心所法謂貪嗔等心或著或離乃至聚散小心大心寂靜否心解脫否心皆如實知四宿命通能知十方有情一心十心百千心若一日二日至百千年劫如是時處如是姓名死此生彼若自若他若廣若略所住壽命及造作善惡等事五天眼通清淨色根照境發識名眼依天修得名天眼有人趣身引得天眼眼屬色界亦名天眼謂由天眼引發通故名天眼通能見十方情非情種種色像或粗或妙死時生時善趣惡趣復知彼隨善業惡業受生勝劣等報六漏盡通能知十方有情若自若他漏盡不盡此通斷諸障習方得圓滿菩薩得漏盡通得不退轉不墮二乘地四無閡者一義無閡智知一切法所有諸義能通諸法所立名字二法無閡智知一切法及法名字分別無滯三詞無閡智隨字論正音辨説無閡令各得解四樂説無閡智十二部經隨根性為説無有障礙不可動轉無所畏俱難可摧伏又義是菩薩佛境界辭者凡夫境界以知義故薩辭無礙知詞知義故於無量阿僧祇劫説辭説義而不可盡是名樂説無閡菩薩於無量無邊無數劫修行世諦以修行故知法無閡又多劫修第一義諦得義無閡多劫修習毗伽羅論故得謂無閡多劫修習説世論故得樂説無閡此四非二乘所能得也障學六度四等煩惱十六六度一布施度慳貪二持戒度毀犯三忍辱度嗔恚四精進度懈怠五禪定度散亂六智慧度愚癡楞伽云字語身法四者與我同等一字等一切諸佛名字無別二語等六十四種梵音無差三身等諸佛法身相好是同四法等我彼同得菩提分法四者等無差別故云四等密迹力士經佛聲名八轉謂體業具為從屬於呼各具八德一調和聲二柔軟聲三諦了聲四易解聲五無錯謬聲六無雌小聲七廣大聲八深遠聲八八其成六十四種梵音聲障學四攝法廣化之煩惱十七四攝法一布施攝對樂財者施財樂法者施法二愛語攝以軟語隨順安慰一切衆生三利行攝隨起身口意行令各沾利益四同事攝和光同事令各得益故得廣化心地觀云此四攝法趣菩提路利生根本一切菩薩皆應修學障學大乘心四弘誓願煩惱十八四弘誓一衆生無邊誓願度未度苦諦者令度苦二煩惱無盡誓願斷未解集諦者令斷集三法門無量誓願學未安道諦者令安道四佛道無上誓願成未得滅諦者令得涅槃此四願弘如虗空深若大海是大乘人心之所發心地觀云此四法大小菩薩皆應修學三世菩薩所學處故大乘有三一理性虗通名理乘二智隨于境名隨乘三得果得機名得乘障學十明十行之煩惱十九十明華嚴云一知一切衆生業報二知一切衆生寂滅三知一切惟是一相四能以無量聲壞染著五能以方便受生六捨離一切想受七知一切法非想八知一切法非無想九知一切有法本無有生十濟度一切衆生十行者一歡喜行始入法界不為邪動二饒益行常化衆生使得法利三無違逆行常修善法謙下恭敬四無屈撓行行大精進令一切至究竟涅槃五無癡亂行不為無明之所失亂六善現行生生常在佛國中生七無著行於我我所一切皆空八尊重行一名難得行成就難得善根九善法行説法授人成佛軌則十真實行二諦非如亦非非相此十行亦名性種性謂假觀分別十界差別種性也用從空入假觀見俗諦開法眼成道種智障學十回向十願之煩惱二十十回向一救護衆生離衆生相回向以無想心常行六道而入果報不受而受二不壞回向觀一切法有受有用念念不住三等一切諸佛回向三世佛法一切時行四至一切處回向以大願力入一切佛土供一切佛五無盡功德藏回向以常住法授與前人六入一切平等善根回向行無漏善善而不二七等隨順一切衆生回向觀善惡無二一相八真如相回向心得自在等三世佛常照有無九無縛無著解脫回向以般若照三世諸法是一合相十入法界無盡回向覺一切法中道無相此十亦名道種性行四百由旬居方便有餘土十願行願品云一禮敬諸佛無限善根願二稱讚如來愛法增上願三廣修供養親近增上願四懺悔業障護法神通願五隨喜功德自證正智願六請轉法輪令他解了願七請佛住世攝受正法願八常隨佛學廣利羣生願九恆順衆生荷負衆生正法願十普皆回向如説修行願障學初地二地三地四地明解之煩惱二十一初地名歡喜地達佛境界捨凡入聖四魔不動到有無邊平等雙照從此用中道觀破一分無明顯一分三德乃至等覺俱名聖種性此地見自身真如佛性名見道位二離垢地身心清淨以正無相入衆生界同於虗空三發光地光慧信忍習佛之道淨極明生四𦦨慧地順無生忍觀一切法明極覺滿故云明解障學五地六地諸知見煩惱二十二五地名難勝順忍修道三界無明莫不皆空功行超越六現前地上順諸法觀于三世寂滅無二七遠行地煩惱不有不無常向上地念念寂滅且隨方應化大慧云七地求佛智心未顯謂之法塵煩惱從二地至此地是修道位猶有功用修行障學八地九地十地雙照之煩惱二十三第八不動地一真如心忍智自如以無生觀捨於三界九善慧地入於上觀光光佛化無生忍道十法雲地入中道觀受佛職位既同真如亦等法界慈雲普覆大智圓明自二地至十地地地各斷一品無明證一分中道自八地至十地名究竟位雙照者永嘉云無即不無有即非有有無雙照妙悟蕭然此之有無即權實二諦空智照真為實假智照俗為權此真俗二諦空假二智雙照權實雙顯地者發生義蘊積前法至於成實一切佛法依此發生故如是乃至障學佛果百萬阿僧祇諸行之煩惱二十四乃至者超略等覺位普賢行方終佛果妙覺位也阿此云無僧祇此云數如釋尊歷三大阿僧祇劫方成佛道諸行萬行也障學萬行未免煩惱已上即三菩提自初地至七地是明心菩提自八地至十地名出到菩提佛果是無上菩提如是行障無量無邊弟子某甲今日至禱稽懇向十方佛尊法聖衆慚愧懺悔願皆消滅南藏無如是弟子某甲六字總結懺悔竟下發願願藉此懺悔障於諸行一切煩惱所生功德願在在處處自在受生不為結集業行之所回轉以如意通於一念頃遍至十方淨諸佛土攝化衆生結集業行諸煩惱等惡行也如意通即身如意通見前六通文一念頃遍至等者不動本位身遍十方未離一念還經塵劫華嚴經毗目仙人執善財手即時善財自見其身往十佛剎微塵數世界中到十佛剎微塵數諸佛所見彼佛剎及衆會諸佛相好莊嚴種種乃至或經百千億不可説不可説佛剎微塵數劫至仙人放善財手時又見自身還至本處攝化即四攝廣化也自此至方便自在總明具足神通力翻前第五不得自在神通等一節第十七四攝法廣化節於諸禪定甚深境界及諸知見通達無閡心能普周一切諸法樂説無窮而不染著諸禪定深禪大定也翻前禪定福樂及九空定等甚深境界者中道實相境也翻前雙照及佛果等境諸知見以佛知見為本翻前十智三明及初地至四地之明解五地至七地諸知見等通達者即定慧二嚴無閡諸障並除也心普周者始自三寶終至佛果及示相不示等皆遍也樂説四無閡之一舉一該餘翻前聞思修及四無閡等障不染著即障不能染翻前自在神通及八解脫等障因一切諸法語寬心能普周智普照故得心自在得法自在方便自在得心自在者能通達知見故能心周諸法從思惟善法中來大經云人雖於無數劫專心聽法若不思惟終不能得無上菩提又定具足者名心自在羅漢得之法自在者心能通達諸法不被法縛菩薩剋之方便自在者住涅槃而興妙用佛果具之又菩薩有十自在一命二心三財四業五生六願七解脫八如意九智十法自在今疑略舉耳令此煩惱及無知結集畢竟永斷不復相續此煩惱即前長養者無知結集即前能覆慧眼者承上明解雙照等力故能永斷耳無漏聖道朗然如日修人天業是有漏因行菩薩道是無漏因於大乘法更無滲漏道路也指上見佛聞法值僧乃至十地等妙悉趨無漏聖位之捷徑也朗然開悟無漏義承懺悔力煩惱淨盡聖路朗然如杲日麗天無幽不燭也發願已歸命禮諸佛結前起後南無毗盧遮那佛南無本師釋迦牟尼佛南無阿彌陀佛南無彌勒佛南無龍種上尊王佛南無龍自在王佛南無寶勝佛南無覺華定自在王佛南無袈裟幢佛南無師子吼佛南無文殊師利菩薩南無普賢菩薩南無大勢至菩薩南無地藏菩薩南無大莊嚴菩薩南無觀自在菩薩禮諸佛已次復懺悔結前起後某甲等略懺煩惱障竟今當次第懺悔業障略懺三障中第一煩惱障畢下依次懺業障先結前起後大節分三第一文中分三小節夫業者能莊飾世趣在在處處不復思惟求離世解脫所以六道果報種種不同形類各異當知皆是業力所作者字疊定標文第二節莊是莊嚴飾是修飾如造三毒十惡等業莊嚴三途世趣行五戒十善等業是人天世趣未超三界故既但飾世趣與無漏聖道乖矣又不修戒定及發菩提心故云不復思惟求離世亦不求無上涅槃故云不求解脫近與永斷煩惱無知結集既反遠與離苦得樂之旨違矣形類各異者六道中橫形豎形好醜等各別如於人形中又各有貧富大小等類之異也業力所作者六趣中業用之力所為也佛十力中業力甚深凡夫之人多於此中好起疑惑何以故爾現見世間行善之人觸向憾軻為惡之者是事諧偶謂言天下善惡無分向字本經是事字無字本經是不字佛十力謂佛有十種實知見力即是處非處力乃至漏盡力詳見後十力無畏文甚深引例凡夫業力諸佛無上菩提由功德智慧善業妙力所成故甚深凡夫不得聖道亦由惡業惑力所障故亦甚深出大經三十一卷中由凡夫業力故衆生界難盡定業難免故行善等四句出千佛名經中轗軻通作塪坷亦作坎坷孟子居喪坎坷今文轗軻者車行不利也譬人不得志則所為之事皆不如意也是事諧偶者言所行事皆和諧偶湊則所求無不遂心也致使世間愚人因不知三世因果便言善惡不分問業力何法可以翻之答惟道力勝若人背覺合塵則道力乏故業力勝若背塵合覺則道力勝業力故生佛無定名聖凡無實性張拙云涅槃生死等空華龐居士云凡夫智量妄説有難易如此計者皆是不能深達業理何以故爾經中説言有三種業何等為三一者現報二者生報三者後報先斥次列三緣業理即下三世善惡因緣果報等自有先後緩急不滅之理也自此至方受其報止皆大經語西天十九祖云善惡之報有三時焉人但見仁夭惡壽逆吉義凶便謂亡因果虗罪福不知影響相隨毫釐靡忒縱經多劫亦不磨滅現報業者現在作惡現身受報一現在報今重懺前惡故止云作惡下二報文則雙引也大經云如達多分佛一珠已因佛疲極止息刺目奪珠佛名實語不生惡心兩目平復此現生報也又迦羅富王見佛為其宮女説法遂生惡心先截耳次劓鼻次刖手足因多劫修慈悲故感四天王心忿雨沙礫石王怖求懺佛言我心無嗔亦如無貪何知無嗔我矢之曰若真無嗔令我此身平復如故語已遂得平復又如有人示獵師熊處及寶色鹿其手墮落是惡業現受果報經云今世造善惡今生受苦樂者名順現報如君主孝慈訓世則祥雲布壽星現恩及物則醴泉出嘉苗秀此為善之驗樵夫指熊而臂落酒客啖𮌉以皮穿是為惡之驗也生報業者此生作善作惡來生受報二來生受報如持戒人深發誓願願常得淨戒之身若有衆生壽百年時八十年中作輪王化生經云若今世造善惡因來世方受苦樂果名順生報所以瓶沙轉報于四天有相改生於六欲後報業者或是過去無量生中作善作惡於此生中受或在未來無量生中方受其報三多生後不定之報如今世造善惡從第三生已去乃至百千生方受名順後報因造今生報終後世伽吒七返而享餘慶那律久劫而受遠福已上三種皆定業若今時本作向者行惡之人現在見好者此是過去生報後報善業熟故所以現在有此樂果豈關現在作諸惡業而得好報此行惡下行善二節明三報意正釋行惡得好等二疑重在業字不重報字後報善業者是前生善業至今生方熟今受樂果是過去生報或多生已前善業熟故現今得樂豈真現作諸惡反得好報耶現在見好應前是事諧偶句若今行善之人現在縈苦者此是過去生報後報惡業熟故現在善根力弱不能排遣是故得此苦報豈關現在作善而招惡報行善反招惡報由宿障也縈苦善人被苦縈纏也排遣袪而消之也現在善根力弱過去惡業力強強能勝弱故不能排遣所謂強者先牽也何以知然南藏作所以然者現見世間為善之者人所讚歎人所尊重故知未來必招樂果先徵現見下釋過去既有如此惡業所以諸佛菩薩教令親近善友共行懺悔首二句與前皆是業力所作呼應教近善友示惡友當離也共行懺悔者無論怨親但肯回心向道便與偕行善知識者於得道中則為全利是故今日至誠歸依於佛善知識所謂善友也全對半言全利猶得全珠圓滿利盡也內有善心外有善友則表裏洞徹如得如意珠五方圓照五色齊彰若止趂己能獨修獨善借使上上根止成辟支只救得一邊政似半珠所以要須親近良師若無師承不得方便非善修也世間一小技藝畢竟經師指授自然得宜若無師範終不如法況出世間上上法乎某甲等無始以來至于今日積惡如恆沙造罪滿大地捨身與受身不覺亦不知積惡等一偈標下文廣舉業相與上七種方便心反照應梵語殑伽此云恆河從高流下廣一由旬長不知數沙細如麵佛説多數即以此喻捨身受身者謂生生死死捨此身又受他身也身世相隔不啻醉夢即今所受身尚不覺來因亦安知過去所作之惡業乎前云過去既有如此惡業是總下文別開計三十一節或作五逆深厚纏濁無間罪業一五逆者弒父害母弒阿羅漢破和合僧出佛身血罪如海深地厚兼乎十纏混亂淨心故云濁無間罪即阿鼻獄因無間有五即趣果無間受苦無間時無間命無間形無間有此罪業必招惡報下倣此或造一闡提斷根善業輕誣佛語謗方等業二梵語一闡提此云信不具撥無因果謗三寶人下文俱是斷善根罪極惡意業惡友為緣上慢邪見不畏惡道無悲愍心大經云佛法中死尸謂闡提犯四重禁五無間罪誹謗方等非法説法法説非法愛畜八種不淨物佛物僧物隨意而用或於比丘比丘尼作非法事是名死尸佛法海中決不容受又云譬如三器一完喻菩薩二漏喻聲聞三破喻一闡提亦如三種病人俱至醫所一易治二難治三不可治不可治者喻闡提乃至殺害蚊子猶得殺罪殺一闡提無有殺罪三佛語如如意珠隨方現色應衆生心説四教利三根實當尊重信以為真反云佛教從無説有是誣也破滅三寶毀正法業不信罪福起十惡業四三寶有拔濟之恩非佛無以垂教非僧無以弘通大經云有二種人謗三寶一不信嗔恚心故二雖信不解義故若人信心無智慧則增長無明若有智慧無信心則增長邪見問何等人不謗三寶答大經云若言闡提捨一闡提於異身中得無上菩提是人即謗三寶若言闡提能生善根生已相續不斷得無上菩提當知是人不謗三寶五不信即疑字為因起惡造業也身三口四意三共成十問用何方便治惡人答如鹿母夫人云貪恚所生皆由嫉妬諫惡以忍諫怒以順我從生以來未曾與物共爭出報恩經迷真反正癡惑之業不孝二親反戾之業六迷真理反正道皆以無明迷惑為本七堂上父母理合孝順而反乖戾天理人情皆所不貫況佛法乎孝順是愛敬從命義父母有生育之恩故須孝順現存者竭力供養發以道心過去者戒善潛資咸令離苦此是色身父母下師長是法身父母輕慢師長無禮敬業朋友不信無義之業八師長於我有出世恩德應尊重頂禮而反慢之豈非惡業大經云先從聽受後思惟義如先平地然後下種又云佛從善友轉聞佛法心生歡喜欲設供養居貧無物欲自賣身薄福不售即欲還家路見一人便語言吾欲賣身君能買否答我家作業人無堪者又問作何業答吾有惡病良醫處藥應日服人肉三兩卿若能每日以身肉三兩見給便與汝金錢五枚得已供佛果如前議報恩云三藏比丘以一惡言呵罵上座五百世常作狗身又目連以弟子有病上忉利天問耆婆值諸天入歡喜園連立路側諸天無顧視者耆婆後至行見目連向舉一手乘車直過目連念此人是我弟子今受天福以著天樂都失本心即以神力制車令住耆下車禮連足連以種種因緣責其不可九朋友賞之以信不信即無義也或作四重八重障聖道業毀犯五戒破八齋業十作造也四重殺盜淫妄根本四也波羅夷此云極重罪比丘有四比丘尼有八前四與比丘同第五與男身觸六與染心男捉手捉衣入屏處屏處共立共話共行身相倚相期七覆他重罪八隨舉大僧供給衣食又波羅夷此云棄犯此四重八重永棄佛法海外猶如大海不受死尸故夫戒有三攝律儀攝善法攝衆生如次證得法報化身十一五戒者一不殺二不盜三不淫四不妄五不飲破五禁即毀犯五戒八齋即八關齋戒關者禁閉八罪不令犯也出設齋經即上五戒加六不坐高廣大床七不著香華鬘及香油塗身熏衣八不自歌舞往聽婆沙云齋以不過午食為體以八事助成齋體共相支持故又名八支齋法故止言八不言九也此通俗人受以一日一夜為期詳如報恩第六卷五篇七聚多缺犯業優婆塞戒輕重垢業十二五篇七聚戒律篇目僧祇云一夷波羅夷罪比丘四條尼八條二殘十三僧殘比丘十三條尼十七條三提三十尼薩耆九十波逸提比丘百二十條尼二百八條四尼提舍尼比丘四條尼八條五吉突吉羅即一百衆學比丘一百條尼一百條突此云惡吉羅此云作為五篇七聚者一棄二衆殘三醜惡四墮五可呵六惡作七惡説破此等戒即是多缺犯業增輝云若正結罪名能招當惡果十三報恩經云優婆塞有五戒一不得販賣畜生二不得販賣弓箭刀仗三不得沽酒四不得壓油天竺麻有蟲無蟲處則無過五不得大色染業外國染波傷蟲故此名五種不應作也梵語優婆塞此云近事男謂在俗親近三寶盡壽持五戒者輕等可知或菩薩戒不能清淨如説行業十四梵網經菩薩戒開十重四十八輕如説行者依戒經所説而行纖毫不犯便是清淨前後方便汙梵行業月無六齋懈怠之業十五前後方便即大小二便梵行淨行也不遵律規汙穢淨業安得無罪十六每月有六齋日初八二十三兩日天王使者巡十四二十九兩日天王太子巡十五三十日四天王親臨按察衆生善惡具奏帝釋行善者注祿增算為惡可知十齋加初一十八二十四二十八日便是佛言一日持齋有六十萬歲糧又有五福一少病二身安三少淫四少睡五生天知宿命於三十日間不過六日持齋是日當倍加精進補四日之不足可也既不肯精進又不能持齋恐後悔無益也年三長齋不常修業三千威儀不如法業十七一年中持三月正五九長自朔至晦齋玉帝殿前明鏡月輪常照四大部洲正五九正照南洲故宜持齋修福較六齋則長比常齋則短於一年不過四分之一猶不能持安望其盡形壽乎覬其世守淨業乎十八行住坐臥四威儀各具二百五十戒合成一千循乎三世成三千威儀也如法而行可為儀表不能如法便乖細行動氣發粗誠足異也八萬律儀微細罪業不修身戒心慧之業十九於四威儀各有二百五十戒成一千并三聚戒各一千成三千配身三口四七支成二萬一千復配貪嗔癡等分四者成八萬四千細行今言八萬舉大數耳二十大經云衆生不修身不修戒不修心不修慧不能修習如是四法則能造五逆犯四重謗三寶故常淪生死海弗克到彼岸又云若見戒戒相戒因戒果上戒下戒戒聚戒一戒二此戒彼戒戒滅戒等修修者戒波羅蜜有如是見者名不修戒若見心心相心因心果心聚心及心所心一心二此心彼心心滅心等心修心者上中下心善心惡心有如是見者名不修心若見慧慧相慧因慧果慧聚慧一慧二此慧彼慧慧滅慧等上中下慧鈍慧利慧慧修修者有如是見者名不修慧不修身戒心慧於小惡業得大惡報等若觀諸法同於虛空不見智慧智者愚癡愚者修習及修習者是名智者是人則能修習身戒心慧能令地獄果報現世輕受春秋八王造衆罪業行十六種惡律儀業二十一八王日提謂云立春春分立夏夏至立秋秋分立冬冬至此八日天地福神陰陽交代故云八王四天王案行以比諸天民隸有福增壽有罪減算若冒冥無知不預作善收付地獄如來拔苦勸修齋戒令其得樂二十二十六惡者一屠兒二魁膾三養豬羊四捕魚五獵師六網烏七捕蛇八養雞狗九呪龍十作賊十一捕賊十二獄吏十三淫女家十四沽酒家十五洗染家十六壓油家於諸衆生無愍傷業不矜不念無憐愍業二十三愍憐也傷哀也如文王視民如傷之類此及下文計四節總乖四無量心二十四矜憫也念常思也言不能常懷哀矜之念矜念憐憫皆悲之等分不拔不濟無救護業心懷嫉妬無度彼業二十五悲能拔苦捨心濟物濟給濟也周給不足之人使之得樂此節悲捨慈三心皆具二十六妬賢嫉能則惟知有我豈能幸人得樂與喜心相反已上四小節懺乖四無量心無度彼三字結上四節總無度他益下廣明於怨親境不平等業耽荒五欲不厭離業二十七怨是逆境親是順境必起憎愛疏密等見心不平等造業之端心地觀云不著諸法及衆生心無諍論修正念自無業緣且分別心起於怨必嗔便障忍度不平必有高下不等必起彼此故二十八財色名食睡為五欲色等五塵亦名五欲不生厭惡脫離心是耽荒耽荒即貪義障布施不厭離則喜毀犯障持戒或因衣食園林池沼生蕩逸業二十九衣食富足不知凍餒園林幽隱世事應忘益以池沼清涼自勝正好辦道不能修行反生曠蕩放逸哀哉清規制不縱逸有四種益一不汙清衆生恭敬故二不毀僧形循佛制故三不擾公門省獄訟故四不揭外醜護宗綱故又蕩逸是懈怠障精進或以盛年放恣情欲造衆罪業三十以猶倚也盛年壯齡也倚恃年富力強放縱自恣於七情六欲上造無量罪放恣是散亂能障靜慮或作有漏善回向三有障出世業三十一作善而不回向無上菩提乃回向欲有色有無色有則三界因果不忘縱有人天福報福盡還應墮落于出世彌遠故云障出世耳不思出世便是愚癡障般若度此障句一結前障六度文二與無度彼業句呼應如是等罪無量無邊今日發露向十方佛尊法聖衆皆悉懺悔總結廣舉業相懺悔竟下文發願福慧圓修願某甲等承是懺悔無明等罪諸不善業願皆消滅先願斷惡也無明舉萬惡之本等罪收上總標偈及別開三十一節罪業總願消滅耳願皆南藏流運本作盡皆所生福善願生生世世滅五逆罪除闡提惑如是輕重諸罪惡業從今已去乃至道場誓不更犯此藉懺悔力滅罪生福也五逆罪疊前第一節能致五無間獄之苦應首滅闡提業因惑而起故云闡提惑能斷善根故當除如是輕重等疊第三節至三十一節文從今懺後直至得道之場成於佛果於其中間誓不再犯滅罪文竟下生福文常習出世清淨善法精持律行守護威儀如渡海者愛惜浮囊常字根上從凡至聖中間更不犯言清淨翻前深厚濁纏善法翻前十惡五逆等精持翻前毀犯齋戒及輕重垢等律行即前五篇七聚乃至三千威儀八萬律儀等守護威儀即守護三業等不容毀犯也浮囊猶今之渡海者繫葫蘆于腰間以渡浩溺也浮囊本非我身為救身故不得不惜以囊可以渡海也修涅槃者了幻身本非實有然借身以修性則不得不修戒以保如幻之身心為度生死苦海也大經云菩薩護持禁戒如渡海人護持浮囊如有帶持浮囊渡海海中羅剎從乞全與次惠半次三分之一次手掌許次微塵許欲渡海者答言汝今所須誠復不多然我今者方當渡海不知前途遠近如何若與汝者氣當漸出大海之難何由得脫終竟不與比丘守五篇淨戒亦然乃至不與煩惱羅剎一微塵許破戒因緣若有少損則不能度生死大海其破浮囊樣子如此六度四等常標行首戒定慧品轉得增明施等六度慈等四心萬行之端諸佛因德雖煩以要言之不過六度四心故言常標者生生勇悍標名于同行之首為世導師也戒生定定生慧故云轉得增明此名三學戒如捉賊定如縛賊慧如殺賊持戒止免三途兼定超六欲發慧超三界六祖云即心名慧即佛乃定定慧等持意中清淨又云自性無非是性戒自性不亂是性定自性不癡是性慧轉得增明即轉展相生也經云尸羅不清淨三昧不現前戒資定也圓覺云一切諸菩薩無礙清淨慧皆依禪定生定發慧也速成如來三十二相八十種好前六度是應身因相好是應身果三十二相一足下平滿相二足下千輻輪文無不圓滿三手足並皆柔軟如兜羅綿四兩足一一指間猶如雁王文同綺畫五手足諸指圓滿纖長可愛六足跟廣長圓滿與趺相稱七足趺修高光滿與跟相稱八雙腨漸次纖圓如鹿王腨九雙臂平立摩膝如象王鼻十陰相藏密十一毛孔各一毛生紺青宛轉十二髮毛右旋宛轉十三身皮細薄潤滑垢水不住十四身皮金色晃耀諸寶莊嚴十五兩足兩掌中頸雙肩七處充滿十六肩項圓滿殊妙十七膊腋悉皆充實十八容儀洪滿端直十九身相修廣端嚴二十體相量等圓滿二十一頷臆并身上半威容廣大如師子王二十二常光面各一尋二十三齒相四十齊平淨密根深白逾珂雪二十四四牙鮮白鋒利二十五常得味中上味二十六舌相薄淨廣長能覆面輪至耳髮際二十七梵音詞韻和雅隨衆多少無不等聞二十八眼睫猶若牛王紺青齊整二十九眼睛紺青鮮白紅環三十面輪如滿月眉相皎淨如天帝弓三十一眉間有白毫相柔軟如綿白逾珂雪三十二頂上烏瑟膩沙高顯周圓猶如天蓋出般若經佛在忉利天宮目連令匠人雕佛三十二相只得三十一相唯梵音相雕不得院主問南泉如何是梵音相泉云賺殺人八十種好即隨形好也一無見頂相二鼻高孔不現三眉如初月四耳輪輻相埵成五身堅實如那羅延六骨際如鈎鎖七身一時回如象王八行時足去地四寸印文現九爪如赤銅色十膝骨堅著圓好十一身清潔十二身柔軟十三身不曲十四指長纖圓十五指文藏覆十六脈深不現十七踝不現十八身潤澤十九身自持不逶迤二十身滿足二十一容儀備足二十二容儀滿足二十三住處安無能動者二十四威振一切二十五一切樂觀二十六面不長大二十七正容白不撓色二十八面具滿足二十九唇如頻婆果色三十言音深遠三十一臍深圓好三十二毛右旋三十三手足滿三十四手足如意三十五手文明直三十六手文長三十七手文不斷三十八一切惡心衆生見者和悅三十九面廣姝好四十面淨如滿月四十一隨衆生意和悅與語四十二毛孔出香氣四十三口出無上香四十四威儀如師子四十五進止如象王四十六行法如鵝王四十七頭如摩陀那果四十八一切聲分具足四十九四牙白利五十舌赤色五十一舌薄廣五十二毛紅色五十三毛軟淨五十四廣長眼五十五孔門相具五十六手足赤白如蓮華色五十七臍不出五十八腹不見五十九細腹六十身不傾動六十一身持重六十二其身大六十三身長六十四手足軟滑六十五四邊光各一丈六十六光照身而行六十七等視衆生六十八不輕衆生六十九隨衆生音聲不增不減七十説法不著七十一隨衆生語言説法七十二發音報衆聲七十三次第有因緣説法七十四一切衆生不能盡觀相七十五觀無厭足七十六髮長好七十七髮不亂七十八髮旋好七十九髮毛青珠八十手足有德相十力無畏大悲三念初佛果十力了達一切無能勝無能壞故名力一知是處非處力知一切因緣果報定相作善業知定得樂報名知是處作惡業得受樂報無有是處名知非處二知三世業報智力知一切衆生過現未來諸業諸受三定力一切禪定三昧自在無閡淺深次第如實知四根力知衆生諸根勝劣得果大小等五欲力知衆生種種欲樂善惡不同六性力知世間種種性六道性分不同故七至處力知一切道至處相六道有漏行所至處涅槃無漏行所至處八宿命力知一世乃至千萬世一劫至百千萬劫姓名苦樂壽命長短等九天眼力知衆生生時死時善道惡道端正醜陋等十漏盡力自知一切惑餘習氣分永斷不生無畏即四無所畏釋現首卷三念者有二種一性念處慧解脫破一切智外道二共念處俱解脫破神通外道三緣念處無閡解脫破文字外道一無忘失法二永拔習氣三一切種妙智出毗曇常樂妙智八自在我速成二字直責至此歸依諸佛願垂護念首二句涅槃四德無二生死曰常不遷不變故不受二邊曰樂離二死苦故具八自在曰我得大自在故三業清淨曰淨三惑淨盡故妙智即淨義三惑淨盡故八自在我涅槃經云一能示一身多身數如微塵二能以微塵身滿大千界三能以大身輕舉遠到四現無量身常居一土五能諸根互用六得一切法如無想七説一偈經無量劫八身如虗空存沒隨宜不窮因歸依二句應補佛一進曾有人於此增修非藏本及懺主意護念有二義一顯護念謂現身語讚印所作二冥護念潛垂覆攝不現身語衆聖威重故求護念某甲等前已總相懺悔一切諸業今當次第更復一一別相懺悔若總若別若粗若細若輕若重若説不説品類相從願皆消滅結前起後粗細者煩惱所知二障雖根一心微著有異所知則細煩惱則粗粗細雖殊誠無別體猶如一水起動成波微著亦爾別相懺者先懺身三次懺口四其餘諸障次第稽顙疊前若別句以起懺除七支罪文其餘諸障發佛法僧間餘障及六根罪業文稽留也顙額也以額至地故云稽顙竭誠禮拜首至地故懇大清淨智慧人滌其罪垢耳俱舍云稽首接足故言敬禮屈己所尊之首接彼所果之足三業敬禮之通稱下去共六段文第一總明殺業有輕重身三業者第一殺害如經所明恕己可為喻勿殺勿行杖先疊身有殺盜淫三業且就第一殺業為重故先及之涅槃經一切大衆所問品云昔王舍城中大獵師多殺羣鹿請我食肉我時雖受彼請於諸衆生生慈悲心如羅睺羅而説偈言一切畏刀杖無不愛壽命恕己可為喻勿殺勿行杖梵網經佛子若自殺教人殺方便殺讚歎殺見作隨喜乃至呪殺殺因殺緣殺法殺業乃至一切有命者不得故殺菩薩應起慈悲心救護而恣意殺者波羅夷罪恕己者以己好生之心亦使物類得生諺云將心比心也雖復禽獸之殊保命畏死其事是一就事反顯故曰雖復復猶説也殊別也言人與畜生雖有橫豎之分而重命畏死一也保是保護意金光明云不害衆生命及施與飲食由斯二種因得壽食長遠命猶壽也甘露味論云畜生有八種壽一一彈指頃二半日三一日四一月五一歲六十歲七百千萬億歲八乃至一劫若尋此衆生無始以來或是我父母兄弟六親眷屬以業因緣輪回六道出生入死改形易報不復相識尋探求也因肉眼不如天眼故須探求梵網我生生從男女受生故殺六道即殺父母亦殺故身一切地水是我先身一切火風是我本體故出生入死一句雙含前為六親脫生入死今又出死入生現畜生形故云更改前形易換苦報不識面目耳而今興害食噉其肉傷慈之甚興害身業食噉口業傷慈意業丹溪云諸肉助起濕中之火久而生病素問云膏梁之變足生大疔況禽獸之肉乎既乖養生之術又纍重苦于後豈宜若是是故佛言設得餘食當如飢世食子肉想何況食噉此魚肉耶又言為利殺衆生以財網諸肉二俱是惡業生墮號叫獄餘食如米麥等類受食五觀一計工多少諒彼來處一鉢之飯作夫汗流二忖己德行全缺應供缺則不宜全乃可受三防心離過貪嗔癡為宗四正事良藥為療形枯飢渴病故須食為藥五為成道業應受此食不食成病道業何從飢世易子而食最是慘酷幸遇豐登當念飢饉之苦不可過分米麥食尚爾況衆生肉安知衆生非我往世六親耶思之大可流涕心地觀云彌勒從初發心不食肉以是因緣名慈氏為成熟衆生故現在兜率天次引楞伽經偈明殺報為利殺生如屠兒販賣宰夫以殺求利之類財網肉者將財廣買逞口腹貪叨無厭者號叫獄先酬其將殺時衆生求救之聲然後次第償之也故知殺害及以食噉罪深河海過重丘嶽海滄溟也説文天池可納百川又海者晦也荒遠冥昧之稱河者自乾位來千里一曲九曲而入于海水之伯上應天漢丘土之高者獄山之高而尊者如彼五嶽衆山之宗大經佛言我念往昔與達多俱為商主各有五百賈人為利益故至大海採寶惡業緣故路逢暴風吹壞船舫伴黨死盡爾時我與達多不殺果報長壽緣故風吹得至陸地時達多惜寶生大憂苦發聲啼哭我勸云達多不須啼哭達言譬如極貧人至冢間手捉死尸乃云願汝今者施我死樂我當施汝貧窮壽命時尸起坐語貧人言貧窮壽命汝自受之我雖死樂甚不欣汝貧窮之生然我今日既無死樂兼復貧窮云何而得不啼哭耶然某甲等無始以來不遇善友皆為訓由此業殺業既惡殺心更惡故善友遇而不遇是故經言殺害之罪能令衆生墮於地獄餓鬼受苦若在畜生則受虎豹豺狼鷹等身引華嚴經證殺業果報殺者噉者皆由惡心故感虎狼等身心常懷惡説文云虎山獸之君豹似虎圜文陸佃云豹華如錢黑而小於虎豺説文狗聲食羊捕獸爾雅釋狗足長尾白頰狼説文似犬鋭頭白頰高前廣後陸機云其鳴能大能小鷹陸佃云一歲黃鷹二歲鵧鷹三歲鴿鷹今謂之角鷹頂有毛角雉名青質五彩玉篇云五色雉也等該取衆禽獸下準此知或受毒蛇蝮蠍等身常懷惡心上明禽獸報此明毒蟲報皆從殺業惡心來蛇蝮皆毒蟲也蠍螫人蟲詩卷髮如蠆長尾為蠆短尾為蠍或受麞鹿熊罷等身常懷恐怖鹿是山獸麞屬陸向云仙獸也古今注云鹿有角不能觸麞有牙不能噬熊獸形似豕古云大秦國出玄熊羆似熊黃白色者大經云佛菩薩為度生故現作麞鹿羆鴿獼猴龍蛇金翅鳥魚鱉狐兔牛馬之類又云菩薩雖受熊象等身終不作畜生業即為餘畜生演説正法令彼聞法速離業苦常恐怖者由好殺者令衆生多恐多怖故明畜生報竟下人中苦報若生人中得二種果報一者多病二者短命已上皆華嚴文多病是殺生痛苦之報短命是殺生不盡天年之報大經云夫施食則為施命菩薩行施時常施衆生無量壽命乃至終不殺戒者慎口無過者不生怨想推直于人引曲向己無所諍訟者常勸衆生勤修善法者乃至修攝心者修平等心者於諸善法不放逸者皆得壽命長故菩薩於衆生乃至蟲蟻悉生憐愍利益之心殺害食噉既有如是無量種種諸惡果報是故至誠求哀懺悔求哀須五體投地謂頭頂左肘右肘左膝右膝亦名五輪五處圓故殺業果報竟下廣舉殺因重求懺悔有四章某甲等自從無始以來至於今日有此心識常懷慘毒無慈愍心慘毒是慘極之毒殺心也大經云佛及菩薩知殺心三謂上中下下者蟻子乃至一切畜生除菩薩示現者名下殺以下殺因緣墮于三途具受下苦何故是諸畜生有微善根故中殺者從凡夫人至阿那含上殺者父母乃至羅漢辟支畢定菩薩以上殺因緣墮阿鼻獄具受上苦此總説下別開八節或因貪起殺因嗔因癡及以慢殺或興惡方便誓殺願殺及以呪殺一或以貪財色等而起殺或以嗔怒爭長競短激發怒火而殺或以顛倒謬認不明事理而殺或以恃我慢人不論父母及諸聖賢與勝我善友是殺橫行于四聖及人天道者方等經寶嚴童子問何法殺安樂何法殺無憂何為毒之根吞滅一切善答殺嗔則安樂殺嗔則無憂殺為毒之根吞滅一切善二以種種惡法興起殺事呪殺以邪魔呪力助成殺業也或破決湖池焚燒山野畋獵漁捕或因風放火飛鷹放犬惱害一切如是等罪今悉懺悔三大水處曰湖停水處曰池或破穿堤湖或疏決池塘使水涸而易行漁捕以殺水族也山與野皆草木蓊藏禽獸處縱火焚燒及行畋獵而故殺之其內之慘毒外惡方便為何如哉畋獵應山野漁捕應湖池四乘風放火即焚山野義飛鷹放犬即畋獵義如是下結未終先結以上文是總中之總下去從總開別或以檻弶坑撥戟弓弩彈射飛鳥走獸之類五檻音現音遣非圈也又籠閉也弶其亮切音強去聲施于道路也坑掘地陷物也撥擴也以機械而取所謂撥法子也者挾取玉篇謂之橫扠戟有枝兵也增韻雙枝為戟𢍉枝為戈弩弓之有臂者諺云弩子是也彈音噉是丸子有土石鉛鐵不同皆可打落禽獸者張仙亦有之射音食凡指物曰射言以弓弩矢射物孔子戈不射宿況他人乎漢宣帝詔毋得以春夏適巢探卵彈射飛鳥飛鳥總舉虗空中飛舞者走獸總舉陸行者懺主舉總攝餘故云之類或以𮊁音古網罾釣撩音牢漉水性魚鱉黿鼉蝦胡加切蜆胡甸切螺蚌音棒溼居之屬使水陸空行藏竄無地六𮊁網之總名撩水中取物也漉漢相如書滋液滲漉謂潤澤下究也魚水蟲也素問云魚熱中丹溪云魚在水無一息之停食之動火大經云菩薩於飢世見餓者現龜魚身無量由延誓云願彼取我肉時隨取隨生因食我肉離飢渴苦乃至悉使發無上菩提心鱉是卵生甲蟲也形圓脊穹四周有羣骨在外肉在內也陸佃曰雀影生鱉黿似鱉而大濶或至一二丈鼉水蟲似蜥蜴而長大者蝦長鬚蟲與水母作眼者爾雅翼云蝦多鬚而善遊好躍文選水母目蝦蜆爾雅謂之縊女郭璞云小黑蟲赤頭自喜經死故曰縊女螺有多種大者形如鳥嘴吹之能驚人可為杯蚌蛤屬亦作蚌集韻作鮇水行如魚蝦等陸行如走獸等空行如飛鳥等以種種惡方便苦惱衆生故使水類如河海不足以潛藏乃至虗空大地不足以逃竄也竄匿也或畜養雞豬牛羊犬豕鵝鴨之屬自供庖廚七上文明殺殺此明養殺為殺而噉故養也雞有五德畜之報曉放生則可而殺而食不可也雞本屬巽巽為風食之能發風病丹溪云雞助肝火衍義云助火動風安可食之牛耕畜大牲也帝王非郊天祭地不輕用況凡人乎犬本防宅豕即豬字重出鵝白者食草蒼者食蟲其肉性冷有毒發瘡令人霍亂發痼疾者鴨肉與卵並不可與鱉肉同食能害人疱廚烹庖處也孟子君子遠庖廚見其生不忍見其死聞其聲不忍食其肉故殺畜生以供口腹為三寸于一時受殃纍于永劫何不三思乎且畜生有二種一受決定殺果如雞鵝牛羊等緣其宿生決定不信因果歡喜決定行殺無懺悔心故二受不定殺果如禽魚等前生雖作惡業或出于不得已或殺已生悔故又飛空走陸互有決不決義上文明自殺自供或貨他宰殺使其哀聲未盡毛羽脫落鱗甲傷毀身首分離骨肉消碎剝裂屠割炮燒煮炙楚毒酸切橫加無辜但使一時之快口得味甚寡不過三寸舌根而已然其罪報殃纍永劫如是等罪今日至誠皆悉懺悔八明貨買他殺以自給也宰割也凡肉至火中曰炮近火曰炙報恩經云釋迦昔為雁王五百阿羅漢為五百羣佛身形影利物皆有一鴿為鷹所逐入舍利弗影戰懼不解移入佛影泰然無怖大海可移此鴿無動以佛有大慈悲身子無故佛習氣盡身子未盡故楚毒酸切總結上文謂如是苦楚慘毒聞之酸心恨之切骨畜本無辜不應加而加之故曰橫耳一時快口永劫殃纍得味甚寡受報極多最宜猛省曷不思虞舜飯糗茹草夏禹惡酒菲食孔子蔬食菜羮乎古云飲食于人日月長精粗隨分塞飢瘡才過三寸成何物勿用將心細較量蓋先賢務在養心養心莫先於寡欲口腹之欲急宜絶也又復無始以來至于今日或復興師相伐疆場音亦交爭兩陳相向更相殺害或自殺教殺聞殺歡喜前於畜道行殺此於人道行殺也師衆也易師卦注多以軍為名次以師為名少以旅為名則師者舉中之言也疆是疆界場是邊境兩限間道也交爭相伐也彼此各有陳勢東要相向殺害也自身行殺教他行殺乃至耳聞動殺反生歡喜由殺心種子深入故如是衆生非佛力不能度觀佛三昧經云央掘魔羅暴殺千人復欲害母佛往救之得正信解投佛出家遂得聖道或習屠儈賃音任為刑戮烹宰他命行於不忍習學也屠殺也儈大經作膾括斷也賃傭力也忍慈也或恣暴怒揮戈舞刃或斬或刺音七或推著坑塹或以南藏坊本作用非水沉溺或塞穴壞音怪巢剛暴已非又加之以怒可恣意乎斬斷首也刺殺也公羊傳刺之者殺之也坑陷穽也塹音倩七艷切溝也以水沉溺如囊沙陳之類或塞句明殺畜道如獼猿等由穴出入以石塞斷令其致死又如衆鳥勤苦纍巢或因捉其身取其卵而故壞之毛氏曰凡物不自敗而毀之讀怪書無壞我高祖寡命孟子壞宮室以為汙池等或南藏無土石磓都回切音堆磹徒念切音殿或以車馬雷俗作擂去聲轢音力踐踏一切衆生如是等罪無量無邊今日發露皆悉懺悔磓磹以石投下也馬乘畜生于午稟火氣而生火不能生木故有肝無瞻雷轢車擂碾馬踐踏也微細衆生因之誤傷俱不免于殺業如是下總結上九節文又復無始以來至于今日或墮胎破卵毒藥蠱道傷殺衆生墾土掘地種植田園養蠶煮繭傷殺滋甚墮胎者用惡藥落人胞胎及殺母羊取羔之類破卵者食雞鴨等卵及毀巢墮卵等毒藥者用藥毒人及藥蟲魚狗鼠鳥獸等蠱道者如川廣中下蠱傷人及此間師巫以左道惑人之類墾土等者報恩經善友太子出城見耕者墾土出蟲鳥隨啄吞太子愍而問言此作何物共相殘害左右答云國依人民民依飲食食依耕田種植五穀得存性命太子念言苦哉苦哉蠶吐絲蟲也繭蠶衣也滋甚言益極也統結上文或打撲蚊蚋而稅切音瑞掐音怯嚙音捏蚤虱撲擊也又連杖曰朴蚊夏蟲也蚋醯雞也掐爪刺也爪刺微蟲如刀山劒樹加人也嚙咬也齒咬微類如兩石相磕也蚤是融蚤跳蟲也蝨是幾虱六腳蟲也不殺戒有三等上持蚊蚋等中持六畜等下持水陸空等不犯報恩經佛多劫前于應現佛時坐禪比丘常患蟣虱與蚤約言我若坐禪汝宜寂住虱如約後有土蚤至虱邊問言云何汝身肥盛虱言我所依主人常修禪有約如上云云蚤因聞血肉香即便食噉比丘心惱脫衣付火燒之時禪師者今迦葉佛是土蚤者今達多是虱者今我身是達多為利養故害佛甚至成佛亦爾入大獄中如受三禪天之樂或燒除糞掃開決溝渠枉害一切前節用身口造殺業此用身意也糞掃乃腐爛之物中有蟲蟻或火燒或除開通溝道疏決渠池皆有誤傷之罪決通也或噉果實或用穀米或用菜茹音汝橫殺衆生果木實也樹生曰果實物成實也菜生菜茹乾菜也諸菜皆從地産陰物也人食之能養陰亦謂之蔬菜菜有疏通意故食之腸胃宣暢而無壅滯之患先儒云人常咬得根則百事可做食不惟足以養身亦足以養德且儉用其家必肥此為口造殺業下用火造殺業或然樵薪或露燈燭燒諸蟲類或取醬醋不先搖動然燒也樵字雙通人物樵夫及柴草漢書音義云樵取薪者韓愈云董生行或山而樵説文散木也廣韻柴也暑月燈燭尤不宜露用籠護之以宵蟲見明即投投即傷生也醬醋不如法者必多蟲欲取用宜搖動之使潛下自避不動而取故傷也或瀉湯水澆殺蟲蟻傾瀉熱湯冷水皆可澆衝殺諸蟲蟻昔有父老愛子子食見黑不揀父曰子莫食蒼蠅能害人子曰非蠅也乃蟻耳父曰蟻雖不傷人其如汝傷彼命乎貪生畏死物物皆然應細行而護之此愛非情見也直能令子培成佛因願天下之為父者皆效之如是乃至行住坐臥四威儀中恆常傷殺飛空著他微細衆生凡夫識暗不覺不知今日發露皆悉懺悔總收上種種殺業以祈懺也行住二句別總雙陳佛教比丘下單偈云從朝寅旦直至莫一切衆生自回護若於足下喪身形願汝即時生淨土微細衆生雖不能見應預護之如佛眼觀一滴水八萬四千蟲空中微蟲充滿天眼能見肉眼不識故云識暗等九界性一迷悟自異如飛空者無異得通實不能悟空徒然終日空裏行坐而不能即空透脫觸處蹉過苟能了徹此空與十一空元無兩也其離生死苦亦何難哉悔音灰上聲懊悔也即知過改過之心又復無始以來至于今日或以鞭杖枷鎖桁下浪切械壓拉拷掠打擲手腳蹴踏拘時本作約縛籠繫斷絶水穀鞭以皮為之杖竹木為之枷以木為鎖以鐵成桁拘罪人之大械也穿木加足曰械拉音﨟摧也折也拷打也掠力讓切音亮捶治人也打音釘上聲直觸也擲拋也蹴音促躡也踏踐也俱害物之苛者拘縛籠繫義籠即樊籠可以拘人繫即繫縛可以縶人斷音短截也人之生也全在水穀故曰水去則榮散穀消則衛亡仲景云水入于經其血乃成穀入于衛脈道乃行水穀可斷絶乎如是種種諸惡方便苦惱衆生今日至誠向十方佛尊法聖衆皆悉懺悔結凡殺害之法俱名惡方便如前鞭打乃至斷絶水穀皆苦毒惱害事發露懺悔竟下發願成德願承是懺悔殺害等罪所生功德生生世世得金剛身壽命無窮永離怨憎無殺害想殺害得多病短命之報不殺則壽命無疆能即危脆身得金剛身金剛是堅固之義以得無所得無得而得是真得也自然心無怨憎身滅殺害矣於諸衆生得一子地若見危難急厄之者不惜身命方便救脫此示得堅固身之由也一子地佛視衆生等同一子也大經云菩薩于一切衆生得平等心一切衆生必定當得一子地故臨刑將死危急之時願不惜身命以種種方便救而脫之令其死中得活也然後為説微妙正法使諸衆生覩形見影皆蒙安樂聞名聽聲恐怖悉除我今稽顙歸依於佛然者轉上拔脫之辭説法如放生時説三歸五戒十二因緣乃至稱三寶為師不墮三惡邪見等大金光明經説法施有五勝利一法施兼利自他財施不爾二法施能令衆生出于三界財施之福平出欲界三法施能盡淨法身財施唯增于色四法施無窮財施有盡五法施能斷無明財施唯伏貪愛覩形影者有憎怨殺害心時衆生皆遭厄難今以慈心護生故蒙安樂如鴿為鷹逐投入佛影情然無怖之類聞名等者如云軍中有一韓西賊聞之肝膽寒等今反是如持觀音名號殺鬼尚不能以惡眼視之皆由慈悲發願故恐怖悉除我今下起後南無毗盧遮那佛南無本師釋迦牟尼佛南無阿彌陀佛南無彌勒佛南無龍種上尊王佛南無龍自在王佛南無寶勝佛南無覺華定自在王佛南無袈裟幢佛南無師子吼佛南無文殊師利菩薩南無普賢菩薩南無大勢至菩薩南無地藏菩薩南無大莊嚴菩薩南無觀自在菩薩禮諸佛已次復懺悔某甲等次懺劫盜之業經中説言若物屬他他所守護於此物中一草一葉不與不取何況竊盜前懺殺業竟次懺盜業梵網云若佛子自盜教人盜方便盜呪盜盜因盜緣盜法盜業乃至鬼神有主物一針一草不得故盜而菩薩以慈悲心常助一切人生福生樂而反盜人物犯波羅夷罪屬附也物是彼物依附于彼於我何有不與而取取傷廉竊盜則傷義也不盜戒有三等上持一針一草不與不取中下金銀重物竊私也左傳竊賄為盜與劫字不同劫強取也勢脅也但自衆生唯見現在利故以種種不道而取致使未來受此殃纍是故經言劫盜之罪能令衆生墮于地獄餓鬼受苦若在畜生則受牛馬驢騾駱駝等形以其所有身力血肉償他宿債此雙出劫盜之因果也不道而取即非理強奪等為因殃咎也殃纍為果是故下引經證成牛身償債如叢林諺云喫常住飯替常住憂偷常住物做常住牛餘可例知等形攝豬羊雞犬等類身有二力以代勞血肉償債償酬還也若生人中為他奴婢衣不蔽形食不充口貧寒困苦人理殆盡劫盜既有如是苦報是故今日至誠求哀懺悔三途未盡其惡人中餘報如此貧者無財寒者無衣衣不足以遮蔽其形骸醜自露也食不足以滿其口腹神自倦也困悴也倦劇力乏也殆將也為人衣食豐足治生有理則不辜此一生今反是豈不將盡乎劫盜下結古規繩頌云盜財并鬪諍酒色汙僧倫速遣離即衆容留即敗羣上文總懺盜業下文六章別懺盜業罪相下首章分六小節某甲等自從無始以來至于今日或盜他財寶興刃強奪或自奮身逼迫而取或恃公威一興刃強奪加刀杖而奪之也二自奮勇悍之力而奪取也逼驅也迫急也三恃音是賴也依也公威倚官長恣行虎威也或假勢力高桁大械枉壓良善吞納姦貨拷直為曲為此因緣身罹力之切憲網四勢力即權勢謀占之類自製刑具枉治于人也壓欺凌義良是賢良善是吉義吞餐也言吞占而納之已及姦欺而售之人也拷直作曲屈打成招之類為此下結以是因緣身遭法網也罹遭也憲法也所謂生遭王法也網言人入囹圄如魚鳥之投網而不能脫也或任邪治領他財物侵公益私侵私益公損彼利此損此利彼割他自饒口與心吝五任用也邪治等者不行正事妄取之物也侵公等者因己在私故侵公又因己在公更便侵私也割猶分也饒益也結上文言無非分他所有以自益及其己物則心與口皆慳吝也或竊沒租估偷渡關津私匿公課藏匿使役如是等罪皆悉懺悔六估市稅也偷渡等者關津渡口公漏輸稅私匿渡錢也公課者官稅國課侵匿私用也藏隱使役者民間則躲避差徭軍中則走背調戍等下第二章分十二小節又復無始以來至于今日或是佛法僧物不與而取一總標三寶物佛物如造佛供佛等物也金翅鳥王現身作蓋覆佛以為供佛佛入深山善住象王取藕華供佛佛受阿耆達王請林中坐夏日藏馬王獻麥供養佛示疾乳王牛王獻乳供養大財婆羅門從此信佛畜類尚然況人道而不尊禮乎要集問云何故盜僧物罪偏重答施主捨一毫一粒擬十方鐘鼓一響遐邇同聞聖凡受用俱成道業冥資施主得益無邊今愚癡衆生或噉僧食或受用華果或將僧奴隨逐或以僧畜乘騎或私借貸僧物不還或以官勢伺求僧過等難於盡述有道高士守護不與豈但愍其後招苦果亦憐知事未來同受其殃人不知此反以僧為恪而恨之愚甚也或經像物或治塔寺物或供養常住僧物二經像物別明法物與佛物也三修塔寺物猶三寶物也四供僧物即久住增也莊椿録云盜常住一文錢一日一夜長三分七𨤲利第二日夜利上加利來世作牛馬償之故云作一生之容易為萬劫之艱難若捨一文入常住一日一夜長福亦爾侵漁常住者察之或擬招提僧物或盜取誤用恃勢不還五擬者準擬揣度以待也招提省文具云招鬪提奢唐言四方僧物即十方常住所有也四方僧是往來僧與上常住對看古云常住一根草勸君休要討佛地有伽藍陰司有閻老有云訛稱招提此翻別房施或云對面施後魏太武始光元年伽造藍創立招提之名昔守顒互將檀越供僧物造僧堂招火枷之報出人天寶鑑六或盜取而用或混誤而用如磚錢買瓦等或恃勢欺凌借用不還皆貪心所使也經中開貪有二種一有力貪以威勢取人物者二無力貪但能從他乞得者常住物者鳴鐘本意蓋為十方若曰以有限之食供無窮之衆為間事者是鄙陋淺度瑣人短見豈宏智深識達士高懷哉四事供養三寶猶天地生長自受用福寧有盡耶或自借或貸人或復換貸漏忘或三寶物混亂雜用七自借用不還八貸借也或隨情逐意借與他人而人無義不還九以有換無或先貸後還因日久失記遺忘不還漏是忘而失記也十混亂雜用如施旃檀塑佛混而焚燒或放生錢混而齋僧齋僧錢混而造寺皆犯誤用罪況為己私用乎或以衆物穀米燋薪鹽豉醬醋菜茹果實錢帛竹木繒綵幡蓋香華油燭隨情逐意十一衆物標下二十件別開豉豆豉也帛幣帛也繒音情亦帛也繒綵之幡及繒綵之蓋華供養如鹿母夫人以一食淨華覆上辟支佛五百世尊榮豪貴衣食自然蓮華承足等油燈油也施燈油有四種功德一臨終見日輪圓滿涌出二見淨月輪圓滿涌出三見諸天衆一處而坐四見如來正遍知覺情意思也意志也志意心之所嚮也説文察言而知意罪福決疑經或施主本造釋迦改作彌陀本作大品改充涅槃本造僧房改供僧食本施二衆改入一衆本擬十方回入現前許此處乃與彼處等皆犯罪也莊佛像有餘彩色不得作菩薩聖僧等形以師徒位別不得互用或自用或與人或摘佛華果用僧鬘物因三寶財物私自利己如是等罪無量無邊今日慚愧皆悉懺悔十二摘手取也大經云達多往三十三天索華因己福盡故都無與者遂自取華未取便失神通還見己身在王舍城僧鬘音瞞此云對面施音義云體境交現曰對輟己惠他曰施因就也由也如造像造經造塔造寺及唪經禮懺錢糧乃至齋僧布施放生錢等皆三寶財物也倘隱匿取用謂之私自利己大經説此經如大海有八不思議第七不宿死尸死尸謂一闡提犯四重禁五無間罪誹謗方等非法説法法説非法畜八不淨物佛物僧物隨意而用等八不淨物香華金銀寶物妻子奴婢是也又復無始以來至于今日或作周旋朋友師僧同學父母兄弟六親眷屬共住同止百一所須更相欺誷第三章分二節今初周旋旌旗之指麾也玉篇云周旋無虧也委曲保全之意同志曰朋遞相恭敬曰友和尚曰師清衆曰僧父母兄弟妻子曰六親或共住或近居得周旋所須之物彼此互相欺詐誣誷百一即大小多寡之變文欺是誑之以理之所有誷罔同是昧之以理之所無出論語第三如指有説無多説少之類六祖遺金供母五祖山門養母睦州織屨供親敬脫擔母聽學皆不背于親孰曰出家不孝于父母乎孝衡鈔云大孝釋迦尊歷劫報親恩等或於鄉鄰比音皮近移籬拓他各切墻侵他地宅改標易相虜掠資財包占田園因公託私奪人邸店及以屯音淳野如是等罪今悉懺悔二周禮百家之內為鄉五家為鄰鄰近也比相次也近左右兩鄰也拓開也或移籬落托開墻基以古或尺或寸之地也標如木標界石以定交界彼此之限者虜掠搶虜劫掠也包收裹之也古據也如四圍田地並屬黃家而中間一丘屬白姓白弱黃強田絶水道地絶行路使其必棄白必歸黃是以田地包裹而外而古之也因公託私藉公事而徇己私也邸客舍屯聚也或山野屯聚下第四章分二節又復無始以來或攻城破邑燒村壞音怪柵偷賣良民誘他奴婢一或鎮或村四陲必各有柵以防不虞而故意壞之曰壞良民清白百姓不願鬻身而故強之不從則誘之希圖身價即名為偷或復枉壓無罪之人使其形殂血刃身被徒鎖家緣破散骨肉生離分張異域生死隔絶如是等罪無量無邊今悉懺悔二枉屈也壓欺詐也殂死也刃音任刀刃尖銛也徒有二義一輕者徒隸也言身被隸鎖也二重者被人枉作囚徒且被鎖禁耳緣即增上緣以父母妻子奴婢衣食財寶等與我有增上緣故張開也異域他也下第五章又復無始以來至于今日或商估博貨邸店市易輕稱小斗減割尺寸盜竊分銖欺誷圭合以粗易好以短換長欺巧百端希望毫利如是等罪今悉懺悔行賣曰商坐販曰賈估賈通市稅也又論價也博通也市易貿換也尺寸約長短説十寸曰尺十尺曰丈諺云稱平斗滿謂之公道生涯今云稱輕斗小雖或平滿亦是欺心故須懺悔銖者四分一𨤲七毫為一銖二十四銖成一兩零八毫也圭合者六粟為圭十圭為撮三指撮也十撮為抄十抄成勺十勺成合十合成升十升成斗即極微之物亦不可欺誷而取粗好短長與上輕重長短大小多寡較顯欺巧下結如此欺罔機巧百端而出不過希望秋毫之利耳下第六章又復無始以來至于今日穿窬墻壁斷道抄掠抵捍債息負情違要面欺心取穿通穴也窬是穿木戶鑿垣為空也斷截也攔路𢰳截劫掠之類抄遮取也掠劫奪也抵言相觸也捍衛也債逋財也即母錢息即子錢要音腰約也言辜負前情違背舊約也面欺當面欺凌也心取者私心謀取皆偷盜攝或非道陵奪鬼神禽畜四生之物非道即逆道惡道等鬼即神之使令者鬼神各有應得之物見即欺陵而奪之也或假託卜相取人財寶如是坊本無此二字乃至以利求利惡求多求無厭無足如是等罪無量無邊不可説盡時本作説不可盡今日至禱向十方佛尊法聖聚皆悉懺悔卜易課灼龜之類相視也風鑑堪輿之類四種邪命食一方口食如曲媚豪勢通使四方等二維口食如種種呪術卜算吉凶等三仰口食如仰觀星宿以自活命等四下口食如種植田園和合湯藥等以利求利二義一利上加利二以少本望多利惡求亦二義一捶打己身以求人物二恃勢逼人以求利如梵網第十七輕垢罪中説多求是需索過分也厭平聲飽也足也荀子好華無厭詩厭厭夜飲左傳無厭將及我又不休也土廣懺盜業竟下發願求成功德願承是懺悔劫盜等罪所生功德生生世世得如意寶常雨七珍上妙衣服百味甘饌種種湯藥隨其時本作意所須應念即至心若知足事事恆足也如意寶翻前不與取不道取枉壓良善取從如意珠中常落七寶翻前貧寒困苦等得上衣服翻衣不蔽形得百味等翻食不充口甘饌美飲食也得字冠下三節應念即至言如佛國自然化現如云念衣衣來想食食至等一切衆生無偷奪想皆能少欲知足不耽不染常樂惠施行給濟道捨頭目髓腦如棄涕唾回向滿足檀波羅蜜偷盜起於貧窮及不知足然皆無智慧不修品者為之無偷翻前竊沒租估偷渡關津不與而取及盜取誤用偷賣良民穿窬墻壁等文無奪翻興刃強奪虜掠資財非盜凌奪文少欲知足翻前惡求多求無厭無足不耽不樂也不染不霑染也翻前欺巧百端希望毫利常樂惠施翻前口與心吝行給濟道翻前他自饒捨頭等與前割念報佛恩章呼應上懺身根第二盜業竟下懺第三身淫欲業某甲等次復懺悔貪愛之罪經中説言但為欲故關在癡獄沒生死河莫知能出貪是貪婪愛是好樂欲之機也欲界之因有三一飲食二睡眠三淫欲此三事希須故名欲持不淫戒有三等上持執心不起中下執身不動耽愚癡而不省繫牢獄而無逃恩愛生死深如河海莫知能出雙結上兩句癡為欲因欲因癡作獄門常關莫能出也又癡欲為因生死為果河中常沒莫知越也梵網云若佛子自淫教人淫淫因淫緣淫法淫業乃至畜生女諸天鬼神女及非道行淫菩薩應淨法與人而反起一切人淫波羅夷罪衆生為是五欲因緣從昔以來流轉生死釋成莫知能出意也財色名食睡為五欲今雖止重色實由財食睡以助成也大經云菩薩知五欲法無有歡樂如犬齧枯骨如持火逆風而行如囚趣市觀欲如是多諸過患上總説下別明一切衆生歷劫生中所積身骨如王舍城毗富羅山所飲母乳如四海水身所出血復過於此父母兄弟六親眷屬命終哭泣所出目泪如四海水文出大經二十三多生身骨乳血目泪如此之多皆以貪愛為本致生死之久也駁足王與千王共立舍城都五山中為大國故云王舍城出大論言駁足者以王足有斑駁故城即靈峰所附之城城之北門是調達放醉象處東北門是身子逢馬勝得初果處又東北十四五里至鷲峰山是説法華經處復過于此經作多四海水哭大哀聲也泣小聲有涕是故説言有愛則生愛盡則滅故知生死貪愛為本大經義云衆生本無貪等今云何有若本無後有者佛菩薩等今悉應有如石女本無子相雖加功力無量因緣子不可得心亦如是本無貪相雖近衆緣貪無由生如鑽濕木火不可得亦如壓沙油不可得置貪于心如安橛于空終不得住足知種種因緣不能令貪繫縛于心所以經言淫欲之罪能令衆生墮于地獄餓鬼受苦若在畜生則受鴿音爵鴛鴦等身若生人中妻不貞良得不隨意眷屬淫欲既有如此惡果是故今日至誠求哀懺悔淫欲四過一遠離三寶二不孝父母三恆多邪見四虗誑求財因日子王淫恚佛為説女人虗誑大人之過鴿是鵓鴿唐明皇呼為飛奴是燕依人小鳥鴛鴦匹鳥雌雄未嘗離人得其一一思而死等字等取烏鵲鳩等妻不二句是淫報之二貞清白守節也不隨意者不廉不潔愚蒙難化事事不遂心也淫欲下結懺淫欲報竟下廣舉淫之罪相而懺之某甲等從無始以來至于今日或偷人妻妾奪他婦女侵陵貞潔汙比丘尼破他梵行逼迫不道濁心邪視言語嘲調梵行淨戒行也逼是軀義迫是逼迫心懷淫穢曰濁心邪眼偷觀曰邪視潮調戲謔之謂大經菩薩自言淨戒雖不與女人和合見女人時或共嘲調言語戲笑或壁障外聞女人鐶釧等聲心生愛著乃至隨逐等皆不得名淨戒具足或復耻他門戶汙去聲賢善名或於男子五種人所起不淨行如是等罪無量無邊今日至誠皆悉懺悔五種是生劇妒變半大經佛敘阿難具足八種不可思議中第四云隨我入出二十餘年于諸王剎利豪貴大姓見諸女人及天龍女不生欲心何況耻他門戶等懺悔竟下發願成德願承是懺悔淫欲等罪所生功德生生世世自然化生不由胞胎清淨皎潔相好光明胞胎衣也母孕三月曰胎詩小辨箋獨不處母之胞胎乎若生西方及十方淨土常得蓮華化生不同五濁惡世胞胎受生也無汙穢故清淨翻前濁心無障故皎潔相好光明釋現讚佛偈中六情開朗聰利明達了悟恩愛猶如桎梏觀彼六塵如幻如化於五欲境決定厭離乃至夢中不起邪想內外因緣永不能動懺悔發願已歸命禮三寶具足六神通故六情開不為六塵惑故六情朗願六識成妙觀察智常行六妙行故耳聰鼻舌身利眼明意達即三慧明三達朗矣開朗字翻前關獄沒河文在手曰桎在足曰梏觀塵如幻等者如五百太子一時集坐蓮華池邊各見形容水底影現頓悟諸法如幻如化如夢所見水中形體無有真實出家修道皆得道果前云五欲因緣至此離矣不邪想翻前邪視前已懺悔身三業竟今當次第懺悔口四惡業先結前身三今當下起後口四惡口妄言綺語兩舌也報恩經云夫口舌者鑿身之斧滅身之禍應知一切衆禍皆從口出持口戒有三等上非法不言中下不犯口四業若向三寶邊造其罪更重報恩云父母者三界內最勝福田衆僧者出三界之福田如昔維那因病僧索酥油那便罵言汝何不噉屎尿因此九十億劫墮作汪水中蟲餘如梵網經説經中説言口業之罪能令衆生墮于地獄餓鬼受苦若在畜生則受鵂鶹鴝鵅鳥形聞其聲者無不憎惡鵂鶹是食母怪鳥所謂梟也江東呼為鴝鵅一鳴即兩惡聲多淫故聞者皆惡若生人中口氣常臭有所言説人不信受眷屬不和常好鬪諍口業既有如此惡果是故今日至誠歸依三寶皆悉懺悔口讚佛法常出青蓮華香今惡口污人故口氣常臭惡口不信因果令人動念故招報後雖生人中人亦不信其言不惟遠朋近友至親亦不和常好句釋不和義此先明口業之惡果下次第懺悔四初懺惡口先總標某甲等自從無始以來至于今日以惡口業於四生六道造種種罪出言粗獷發語暴橫惡口者怨言毒罵呪咀不可聞之語也犬不可近曰獷喻醜惡粗強語漢敘傳獷獷亡秦滅我聖文顏師古白粗惡貌次別二初人世不問尊卑親疏貴賤稍不如意便懷嗔怒罵詈毀辱猥音委褻音雪穢惡無所不至使彼銜恨終身不忘連禍結讐無有窮已承上兩句來道俗一體若不問尊卑等恣口獷語無禮也親疏是人咸有不問親疏是無仁也貴賤高卑定分不問貴賤無義也略不如意便懷嗔怒不智也因心懷怒口罵詈人則口無信言可知由一口過五常皆喪豈可不慎哉猥雜也褻輕嬻也穢污也難盡形容故云無所不至由此致人之怒也凡口含物曰銜衆生銜恨自害其身如騾懷好自害其軀亦如芭蕉生實則枯連結讐義該橫竪橫則結怨于四方豎則連于曠劫故無窮已又或怨黷音毒天地訶責鬼神貶斥聖賢誣汙良善如是惡口所起罪業無量無邊今日至誠皆悉懺悔二陰間黷垢也如嗔天罵地呪雨訶風等貶謫也斥呵也搆惡捏醜汙人清名故云誣污如是下雙結惡口招多頭報報恩經均提比丘由過去毀罵聖賢墮在白狗聞身子説法尋能改悔發願得遇善友罪畢得生人中遇佛得漏盡是故當念善友及佛恩又鹿母夫人為幼女時以一惡言辱母云喻如畜生以是惡口因緣五百世生鹿腹中佛告阿難人生世間禍從口生當護于口甚于猛火猛火止燒一世惡口熾火燒無數世火燒世財惡口燒聖七財故又復無始以來至于今日以妄語業作種種罪意中希求名譽利養匿情變詐昧心厚顏二妄語業全無影響揑妄造言也希欲也大經云出家人三欲一惡欲欲為一切大衆上首説法信受大得供養等二欲令四衆知我得初住至四無閡智為利養故三欲欲比丘欲生梵天乃至剎利家得自在故匿情藏實也隱其實情矯設虗誑也變詐轉變虗詐也昧心瞞昧天理欺心人也厚顏顏甲堅厚面無慚色者此匿情二句一章大旨下釋文五一總釋指有言空指空言有大經云如人遙見籬間牛角便言見牛見雲便言見雨見身口業便言見心雖不實見牛雨與心俱非虗妄若全無影響而妄造説罪不可勝言戒諸戒諸二約一身六根助成釋見言不見不見言見聞言不聞不聞言聞首二句出梵網經菩薩戒十重中第四妄語是眼根助成妄語也耳未嘗聞聲鼻未嘗聞香皆妄曰聞聞者謬云不聞此耳鼻二根助成妄語也知言不知不知言知作言不作不作言作舌能知味意能知法此舌意二根助妄身根能作善作惡等此身根助妄語也欺誷賢聖誑惑世人結如上六根助妄上以欺誷聖賢下以誑惑凡愚楞嚴經云誑習交欺發于相罔誣罔不止飛心造姦如是故有塵土屎尿穢汙不淨如塵隨風各無所見二習相加故有沒溺騰擲飛墜漂淪諸事是故諸佛色目欺誑同名劫殺菩薩見誑如踐蛇虺至於父子君臣親戚朋舊有所談説未嘗誠實致使他之誤加聽平聲信亡家敗國咸此由之由之南藏作之由三明能害家國至親莫如父子因妄語故從中間隔惑動信從各相加害致亡家之至義莫如君臣因肆姦扇惑玄相加害致敗國之災其餘同姓之親異姓之戚齊心之朋舊交之友無不以妄語鼓動釀成冤也有所二句正妄語有所談説語也未嘗誠實妄也誤謬也荀子誤于亂説是也聽信謂聽信其言以為實也妄語如簧而人不察傾心信之至使大而國天子諸侯境寬為國中而身家卿大夫以下境狹為家小而往來朋舊無不因妄語為端而廢之造妄語本為希求名利小不過利一身大不過肥一家能使天下誤從遂成大患其罪當何如哉或假妖幻每自稱讚謂得四禪四無色定安那般那十六行觀四妄云得世間果妖幻者假借外道妖邪虗幻之術以惑人也每自稱讚直貫到皆至我所謂得二字直貫到不退菩薩得四禪言得四禪天定也色界共十八天初禪至三禪各三天四禪九天宗鏡云一作異計欣上厭下而修是外道禪二信正因果亦以欣厭而修是凡夫禪三了生空理證偏真道而修是小乘禪四達人法二空而修是大乘禪四無色定謂得四空天之禪定也一空無邊處定二識無邊處定三無所有處定四非想非非想處定此四無色界空天故云四無色定安那般那解見前十六行觀者論曰初根處名為暖法是總緣共相法念住差別如是所修能燒煩惱薪聖道火前相如鑽火位初暖相生能具觀察四聖諦境由此具修十六行相能趣四實理故名行或時從理得名即十六諦一觀苦諦下四行相者一無常五陰因緣新新生滅故二苦觀五陰無常所逼故三空五受陰一相異相無故四無我五受中我我所不可得故二觀集諦下四行相者一集煩惱有漏能招苦果二因觀六因生苦果名因行三緣觀四緣生苦果名緣行四生還受後有五陰身故三觀滅諦下四行相者一盡觀涅槃種種苦盡二滅觀涅槃煩惱火滅三妙涅槃于一切法中第一故四離以涅槃是離世間生死法故四觀道諦下四行相者一道即三十七品能至涅槃二正三十七品非顛倒法三迹三十七品是一切聖人去處四乘以道品能運行人至三解脫故總上觀四聖諦修四行相四四成十六行觀行者修此暖已次起頂法猶如山頂人不久住若無諸難必過此山至於彼山若遇諸難即便退還若無諸難必到于忍既入忍位於四諦境極堪忍故次起世第一法世中超勝故如是觀四諦境總修十六行觀漸近見諦善根無即緣欲界聖諦境而生無漏法忍此忍名為法智下第五妄云得出世間果得須陀洹至阿羅漢得辟支佛不退菩薩至字該括二果三果乃至菩薩俱名得果須陀洹此云預流初果斯陀含此云一來二果阿那含此云不來三果阿羅漢此云無生四果辟支佛此云獨覺更侵習氣比四果根偏利不退菩薩轉不退轉法輪之上士也不退有三一位不退不生三惡道二行不退不生邊地根具男身三念不退能知宿命天來龍來鬼來神來旋風土鬼皆至我所顯異惑衆求其恭敬四事供養天謂三界諸天龍雖畜類畢竟成佛佛於方等會授龍王記云第一悲心憐愍者當得作佛稱其意彼等觀察世間已當得作佛號無怨復授迦樓羅王記云彼佛國土無惡趣具足身相離八難彼佛同名普端正其劫名曰須彌幢神鬼可知旋風即鬼陳風土鬼即鄉土中之鬼我字與前每自字呼應末三句結出妄意不過顯異惑衆耳求其二句應上希求名譽利養意四事即飲食衣服臥具醫藥涅槃經名四愛如是妄語所起罪業無量無邊今日至誠皆悉懺悔總結上三節明妄語業竟下懺第三綺語業又復無始以來至于今日以綺語業作種種罪言辭華靡上聲翰墨艷麗文去呼過飾非巧作歌曲形容妖冶模寫淫態使中下之流動心失性耽荒酒色不能自返綺語者巧言善謔淫詞艷曲等華光彩也靡奢侈也翰書詞也精彩動人為艷韓詩光艷萬丈高麗美麗也文過裝飾其過自謂無過也語云小人之過也必文飾非文飾其非也史記商紂智足以拒揀言足以飾非妖女態也冶裝飾也模寫形容也諡法好樂怠政為荒惑恣任私讐忘其公議使彼忠臣孝子志士仁人強平聲作篇章文致其惡後世披覽遂以為然令其抱恨重平聲泉無所明白如是綺語所起罪業無量無邊今日至誠皆悉懺悔因縱私讐用綺語忘公論使設使也強作多作也文致以文法致人于罪也又致至密也言文案整密嚴延年傳云按其獄皆文致不可得反文對義言四句分別有文有義常人用之無文有義智者用之有文無義昧者用之無文無義迷者用之大懺第三九種惡報中云喜作妄語傳人惡者死入地獄煬銅灌口拔出其舌以牛耕之罪畢得出生鴝鵅中人聞其聲無不驚怖皆言變怪呪令其死等如是下結下第四懺兩舌罪又復無始以來至于今日以兩舌業作種種罪面譽背毀巧語百端向彼説此向此説彼唯知利己不顧害他讒間君臣誣毀良善使君臣猜忌面是背非彼此傳言搆釁者皆兩舌也上總明兩舌讒間下別開君臣相合因侫舌讒言以間離之良民本善或誣言以毀壞之猜疑也忌憎惡也父子不和夫妻生離親戚疏曠師資恩喪朋友道絶父慈子孝之家鼓兩舌以鬪之故不和夫婦同心之室扇彼此異語以離之內親外戚本是稠密由讒言中起致親者疏而戚者遠也疏濶也曠遠也資養也師長每事利益於徒智慧與善業皆從師口長養故師恩難報慨古録云昔智正法師住終南山聖相寺二十八年不涉世緣凡所著作弟子智現執紙筆立侍隨出隨書曾不賜坐一日足跛心悶不覺仆地師猶責之曰昔人翹足七日汝今才立顛仆心輕故也今者因師一語呵及則終身不近悲哉昔古靈禪師行腳回值本師浴令其揩背靈撫背曰好座佛殿只是無佛師張目視之靈曰佛雖不靈且能放光師誦經次靈作偈曰世界許大不肯去鑽他故紙亦何為師曰汝發言有異曾見什麼人來靈曰某甲曾見百丈大師師普集大衆請弟子登座靈即升座告曰靈光獨耀迥脫根塵但離妄緣即如如佛本師豁然大悟禮拜起云何期老朽得聞至教如此師資恩豈得喪道絶之道時作義論語朱注朋友有通財之義其義則淺溥該世出世間互相指引實相妙道斯道則弘自讒間至此總一節至于交扇二國渝盟失歡結怨連兵傷殺百姓如是兩舌所起罪業無量無邊今日至誠向十方佛尊法聖衆發露求哀皆悉懺悔上明兩舌動一國一家之此出兩舌動兩國之亂傷戕百姓其何如扇吹揚也動也助也兩國交歡以兩舌風吹動其嗔火發揚鬭語故有渝盟等事或彼此先有不平因兩舌以發動之助成之如蘇秦張儀之類渝變也因兩舌而變前盟約也桓元盟曰渝盟無享國如是下總結披誠懺悔竟下願成口四善業願某甲等承是懺悔口四惡業所生功德生生世世具八音聲得四辨才常説和合利益之語文分四一如實語翻妄言佛有八音出顯揚論一極好音二柔軟音三和適音四尊慧音五不女音六不誤音七深遠音八不竭音四辨者應答如流曰辨有四種一義辨知諸法義了了通達二法辨諸法名字分別無滯三詞辨辨説無閡令各得解四樂説十二部經隨根性為説巧應物機曰才二和合語翻前兩舌昔造口業由無智慧辨才今説和合及利益彼此語耳其聲清雅一切樂聞善解衆生方俗言語三柔軟語二初宮商清雅聞者愛樂二和適語聞者適悅親近四方風俗華夷土音乃至九天禽語九地獸言皆善解之亦能道彼雜言以博濟焉若有所説應時應根令彼聽者即得解悟超凡入聖開發慧眼懺悔發願已歸命禮三寶四正直語能翻綺語華齒菩薩以齒布施不退菩薩及善面王等以舌布施大士尚以齒舌布施寧惜唇吻不隨時隨根令得開悟乎大疏説者聽者有二種四句一唯説無聽離佛心外無別衆生故二惟聽無説離衆生心外無別有佛故三説聽雙存以心佛不閡衆生現故四説聽雙寂生佛相即互奪互亡故又一衆生全體佛心中果門攝法無遺二佛全在衆生心中因門攝法無遺三生佛互縱因果交徹四生佛互奪二位齊融懺悔二句雙結兩文以起歸敬三寶禮合三拜如三皈式三稱三禮今不爾者未達語義故前已懺悔身三口四業竟今當次第懺悔六根所作罪障懺身口惡業竟將完餘障次第舉六根懺悔先結前今當下起後文分六初眼根某甲等無始以來至於今日或眼為色惑愛染玄黃紅緑朱紫珍玩寶飾或取男女長短黑白之相姿熊妖艷起非法想眼所對色二一無情色二有情境珍玩寶飾是尊重色也恣熊句形容女色非法想邪心也心地觀云見色等五塵心即染著是人不知煩惱根本如狂犬被打但逐瓦石不逐于人大經云繫心無常不淨見色不著如虗空於可愛色不貪不愛色不嗔菩薩亦然此是懺法故教人除眼等所對法若論本分對亦不惡古人云真心無住真照獨存真性絶攀緣真見不由境真智無礙真慧無邊上合諸佛本源下契羣生心地所以道處處真處處真塵塵盡是本來人或耳貪好聲宮商絃管妓樂歌唱或取男女音聲語言啼笑之相起非法想耳所聞聲二一無情聲二有情聲宮居中央暢四方唱始施生為四聲綱商金行之音五音中之最清者其氣遒徑雕落萬物妓樂女樂也啼泣也或鼻藉名香沉檀龍麝金蘇合起非法想鼻所嗅香二無情香有情香具法華經六根功德章沉香檀香龍涎香出大石國其龍多蟠于洋中之大石臥而吐涎衆魚聚而𠾱之人設網取焉能發衆香故用之麝如小麋人逐則自升高巖舉爪踢出臍香就繫兩足保其臍以自珍重金芳草也十二葉為百草之英生秦國二三月始華狀如紅蘭四五月採蘇合紫赤色似紫真檀極芬芳重如石燒之灰白者佳或舌貪好味鮮美甘肥衆生血肉資養四大更增苦本起非法想或身樂華綺錦繡繒縠音斛一切細滑七珍麗服起非法想舌貪滋味二一他身血肉二自身四大一地大堅凝質礙二水大潤下滋愛三火大炎上生嗔四風大鼓籥躁動殺他身分養己四大來生益多怨害故曰更增苦本楞嚴云人死為羊羊死為人等身貪細滑綺繒也師古曰細綾也錦織文也以五色線織之繡五彩刺文也縠皺紗也七珍麗服七寶莊嚴美麗之服也或意多亂想觸向乖法由此六根所造罪業無量無邊今日至禱南藏作誠向十方佛尊法聖衆皆悉懺悔意貪法塵亂想則不能入定乖法則不能入妙由此下總結懺六根罪竟下發願求成六種功德願以懺悔眼根功德願令此眼徹見十方諸佛菩薩清淨法身不以二相初眼根大經云見有二種一眼見二聞見諸佛眼見佛性如掌中阿摩勒果十住菩薩聞見佛性故不了了若見如來所有身業是眼見若觀如來所有口業是聞見若見色貌一切衆生無與等者是眼為治聞音聲微妙最勝不同衆生所有音聲是聞見詳如經説不二相者無眼色二相也淨名云有佛世尊得真天眼常在三昧見諸法不以二相釋曰不為色作精粗二相願以懺悔耳根功德願令此耳常聞十方諸佛賢聖所説正法如教奉行二耳根正法即經教也清涼云聞經有十益一見聞二發心三修造四頓得五滅障六攝位七起行八稱性九轉利十速證願以懺悔鼻根功德願令此鼻常聞香積入法位香捨離生死不淨臭穢三鼻根功德維摩經上方界分過四十二恆河沙佛土有國名衆香佛號香積其國香氣比十方諸佛人天之香最為第一香積佛無文字説法但令菩薩坐香樹下聞斯妙香即獲一切德藏三昧故願聞香積入法位香又如來菩薩身諸毛孔皆香願以懺悔舌根功德願令此舌常餐法喜禪悅之食不貪衆生血肉之味四舌根功德五食中法喜禪悅二食為上增一云出世五食禪悅食願食念食解脫食法喜食維摩云雖復飲食而以禪悅為食不貪衆生血肉則穢味除而甘露就也願以懺悔身根功德願令此身披如來衣著忍辱鎧臥無畏床坐法空座五身根功德修如來寂滅法有佩服義故如衣忍辱是堅固義故如鎧鎧金甲也處衆無畏是安樂義故如床法華經法師品云入如來室著如來衣坐如來座爾乃應為四衆廣説斯經如來室者一切衆生大慈悲心是如來衣者柔和忍辱心是如來座者一切法空是大經云大菩薩施床時願令一切衆生得天中天所臥之床得大智慧坐四禪處臥于菩薩所臥之床得安隱床離生死床成大涅槃師子臥床無上床忍辱床無畏床清淨床善法床右脅臥床四空禪是靜定義故如座心地觀云上根菩薩常於露地長坐不臥中根菩薩於枝葉中常坐不臥下根菩薩于石室中常坐不臥如是三根出家菩薩坐三種座餘如經説願以懺悔意根功德願令此意成就十力洞達五明深觀二諦空平等理六意根功德意根暗了如幽室見十力詳現前十力無畏文中願意根成就五明者大論云一聲明釋詁訓字詮目流別二工巧明技術機關陰陽曆數三醫方明禁呪間邪藥石針穴四因明考定邪正研核真偽五內明究暢五乘因果妙理此五明願意根洞徹了達五地菩薩覺內五明若外五明者前四是同第五名符印明二諦者一世俗諦佛事門中不捨一法如勸臣以忠勸子以孝勸國以治勸家以和弘善示天堂之樂治惡顯地獄之苦皆俗諦也二第一義諦彰本寂之理一性混然實際理地不受一塵指萬有即真如會三乘歸實際皆依真諦也此二諦及空平等理俱願深觀大經云二諦實一方便説二如人醉未吐見日月轉謂有轉日及不轉日醒人但見不轉不見於轉轉二為粗不轉為妙空平等理者小乘析觀乃是作意先破人執次破法執然後會入空平等理大乘體觀人法無殊空非前後故曰平等然由平等空方證平等理也若人法雙空謂之俱空俱空亦空即平等空空觀化道帶空入假道觀雙流雙流即平等也涅槃云若諸菩薩修慈悲捨得一子地者修捨心時復得何地答修捨心時得住空平等地如須菩提住空平等地不見有六親知識及怨憎中人乃至陰界入衆生壽命譬如虗空無六親等故一切諸法亦然其心平等如彼虗空何故善修諸法空故從此一空便有十一空等菩薩得十一空即住空平等地華嚴疏云萬行亡照而齊修頓漸無閡而雙入者也從方便慧入法流水念念增明顯發如來大無生忍流通本添起十妙行四字方便是權入法是實由具足十力五明二諦等則為方便慧而非乾慧也十妙行者一色心不二是境妙行二內外不二是智妙行三修性不二是行妙行四因果不二是位妙行五染淨不二是法妙行六依正不二是感應妙行七自他不二是神通妙行八三業不二九權實不二此二皆説法妙行十受潤不二是利益妙行兼眷屬妙行由不二故云妙由妙慧甚深無相般若故能起妙行又慧屬心方便即解脫約人四句料簡慧解脫心不解脫者二乘也心不解脫慧解脫者菩薩也俱解脫者佛也俱不解脫者凡夫也入流法水者楞嚴云欲愛乾枯根境不偶純是智慧乾有其慧名乾慧地欲習初乾未與如來法流水接即以此心流入圓妙妄想滅盡中道純真名信心住便能起十妙行與如來法流水接所謂流入圓妙也大無生忍者無生是不生不滅之法而云忍者此法將證未證如忍事人非懷非出故此無生忍即如來無上之法故曰大由念念增明大無生忍從是顯發矣發願已皈北藏作歸命禮三寶結前性後宣懺文畢即當三歸作結局
